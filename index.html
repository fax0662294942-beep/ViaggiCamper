		function CategoriesView({ expenses, budgets, onCategoryClick, onCategoryLongPress, sortMode, setSortMode, mode = 'expense', totalIncome = 0, totalExpense = 0 }) {
            const [categoryOrder, setCategoryOrder] = React.useState([]);
            const [draggedItem, setDraggedItem] = React.useState(null);
            const [dragOverItem, setDragOverItem] = React.useState(null);
            const [showArchived, setShowArchived] = React.useState(false);
            const [cats, setCats] = React.useState(getCategoriesFromStorage());
            // Touch drag state
            const touchDrag = React.useRef({ active: false, id: null, startY: 0, currentY: 0 });
            // Long press state
            const catPressTimer = React.useRef(null);
            const catLongPressed = React.useRef(false);
            const catPressPos = React.useRef({ x: 0, y: 0 });
            // Modalità riordino: gestita dal genitore via props sortMode/setSortMode

            React.useEffect(() => {
                setCats(getCategoriesFromStorage());
            }, []);

		    const orderKey = mode === 'income' ? 'categoryOrder_income' : 'categoryOrder';

		    React.useEffect(() => {
		        const savedOrder = localStorage.getItem(orderKey);
                if (savedOrder) {
                    setCategoryOrder(JSON.parse(savedOrder));
                } else {
		            setCategoryOrder((cats[mode] || []).map(c => c.id));
                }
		    }, [orderKey, mode]);

		    React.useEffect(() => {
		        if (categoryOrder.length > 0) {
		            localStorage.setItem(orderKey, JSON.stringify(categoryOrder));
		        }
		    }, [categoryOrder, orderKey]);

		    const dataByCategory = expenses || {};
		    const primaryTotal = Object.values(dataByCategory).reduce((acc, val) => acc + val, 0);
		    const totalBudget = mode === 'expense' ? Object.values(budgets || {}).reduce((acc, val) => acc + val, 0) : 0;

		    const activeCats = (cats[mode] || []).filter(c => !c.archived);
		    const archivedCats = (cats[mode] || []).filter(c => c.archived);

            // Ordina le categorie attive
		    const orderedCategories = categoryOrder
		        .map(id => activeCats.find(c => c.id === id))
		        .filter(Boolean);
            activeCats.forEach(cat => {
                if (!categoryOrder.includes(cat.id)) orderedCategories.push(cat);
            });

            // Archivia/ripristina categoria
		    const toggleArchive = (catId) => {
		        const updated = getCategoriesFromStorage();
		        updated[mode] = (updated[mode] || []).map(c =>
		            c.id === catId ? { ...c, archived: !c.archived } : c
		        );
		        saveCategoriestoStorage(updated);
		        setCats(getCategoriesFromStorage());
		    };

		    const isIncomeMode = mode === 'income';
		    const primaryLabel = isIncomeMode ? 'Entrate' : 'Spese';
		    const primaryAmount = isIncomeMode ? totalIncome : totalExpense;
		    const secondaryLabel = isIncomeMode ? 'Spese' : 'Entrate';
		    const secondaryAmount = isIncomeMode ? totalExpense : totalIncome;

            // Desktop drag
            const handleDragStart = (e, categoryId) => {
                setDraggedItem(categoryId);
                e.dataTransfer.effectAllowed = 'move';
            };
            const handleDragOver = (e, targetId) => {
                e.preventDefault();
                setDragOverItem(targetId);
            };
            const handleDrop = (e, targetId) => {
                e.preventDefault();
                if (!draggedItem || draggedItem === targetId) { setDraggedItem(null); setDragOverItem(null); return; }
                const newOrder = [...(categoryOrder.length > 0 ? categoryOrder : orderedCategories.map(c => c.id))];
                const from = newOrder.indexOf(draggedItem);
                const to = newOrder.indexOf(targetId);
                if (from < 0 || to < 0) { setDraggedItem(null); setDragOverItem(null); return; }
                newOrder.splice(from, 1);
                newOrder.splice(to, 0, draggedItem);
                setCategoryOrder(newOrder);
                setDraggedItem(null);
                setDragOverItem(null);
            };

            // Touch drag (mobile)
            const handleTouchStart = (e, catId) => {
                touchDrag.current = { active: true, id: catId, startY: e.touches[0].clientY };
            };
            const handleTouchMove = (e) => {
                if (!touchDrag.current.active) return;
                e.preventDefault();
                touchDrag.current.currentY = e.touches[0].clientY;
                // Trova elemento sotto il tocco
                const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                const card = el && el.closest('[data-catid]');
                if (card) setDragOverItem(card.dataset.catid);
            };
            const handleTouchEnd = () => {
                if (!touchDrag.current.active) return;
                const from = touchDrag.current.id;
                const to = dragOverItem;
                if (from && to && from !== to) {
                    const newOrder = [...(categoryOrder.length > 0 ? categoryOrder : orderedCategories.map(c => c.id))];
                    const fi = newOrder.indexOf(from);
                    const ti = newOrder.indexOf(to);
                    if (fi >= 0 && ti >= 0) {
                        newOrder.splice(fi, 1);
                        newOrder.splice(ti, 0, from);
                        setCategoryOrder(newOrder);
                    }
                }
                touchDrag.current = { active: false, id: null };
                setDraggedItem(null);
                setDragOverItem(null);
            };

            return (
                <div className="dashboard-container">
                    <div className="chart-center-container">
                        <canvas id="categoryChart" style={{ maxHeight: '280px' }}></canvas>
                        <div className="chart-center-info">
		                    <div className="chart-center-label">{primaryLabel}</div>
		                    <div className="chart-center-amount" style={{ color: isIncomeMode ? '#4CAF50' : '#f44336' }}>
		                        {primaryAmount.toFixed(2)} €
		                    </div>
		                    <div className="chart-center-budget" style={{ color: isIncomeMode ? '#f44336' : '#4CAF50' }}>
		                        {secondaryLabel}: {secondaryAmount.toFixed(2)} €
		                    </div>
                        </div>
                    </div>

                    {/* Barra modalità riordino */}
                    {sortMode && (
                        <div style={{ margin: '0 16px 10px', padding: '10px 16px', background: '#667eea', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', color: 'white', fontSize: '13px' }}>
                            <span>✋ Trascina per riordinare</span>
                            <button onClick={() => setSortMode(false)} style={{ background: 'white', color: '#667eea', border: 'none', borderRadius: '6px', padding: '4px 10px', fontWeight: 'bold', cursor: 'pointer', fontSize: '12px' }}>Fine</button>
                        </div>
                    )}

                    {/* Categorie attive */}
                    <div className="categories-grid">
		            {orderedCategories.map(category => {
		                const amount = dataByCategory[category.id] || 0;
		                const budget = (mode === 'expense' && budgets) ? (budgets[category.id] || 0) : 0;
                            const exceeded = budget > 0 && amount > budget;
                            const remaining = budget - amount;
                            const isDragging = draggedItem === category.id;
                            const isOver = dragOverItem === category.id && !isDragging;

                            return (
                                <div
                                    key={category.id}
                                    data-catid={category.id}
                                    className="category-card"
                                    onClick={(e) => {
                                        if (sortMode) return;
                                        if (!catLongPressed.current) onCategoryClick && onCategoryClick(category, e);
                                    }}
                                    onTouchStart={(e) => {
                                        e.stopPropagation();
                                        catLongPressed.current = false;
                                        const t = e.touches[0];
                                        catPressPos.current = { x: t.clientX, y: t.clientY };
                                        if (sortMode) {
                                            handleTouchStart(e, category.id);
                                            return;
                                        }
                                        catPressTimer.current = setTimeout(() => {
                                            catLongPressed.current = true;
                                            if (navigator.vibrate) navigator.vibrate(40);
                                            onCategoryLongPress && onCategoryLongPress(category, e);
                                        }, 500);
                                    }}
                                    onTouchMove={(e) => {
                                        if (sortMode) { handleTouchMove(e); return; }
                                        const t = e.touches[0];
                                        const dx = Math.abs(t.clientX - catPressPos.current.x);
                                        const dy = Math.abs(t.clientY - catPressPos.current.y);
                                        if (dx > 5 || dy > 5) clearTimeout(catPressTimer.current);
                                    }}
                                    onTouchEnd={(e) => {
                                        clearTimeout(catPressTimer.current);
                                        if (sortMode) { handleTouchEnd(e); return; }
                                        // Il click viene gestito da onClick, qui blocchiamo solo il long-press
                                        if (catLongPressed.current) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                        }
                                        catLongPressed.current = false;
                                    }}
                                    style={{
                                        opacity: isDragging ? 0.3 : 1,
                                        transform: isOver ? 'scale(1.06)' : sortMode ? 'scale(1.02)' : 'scale(1)',
                                        border: isOver ? '2px dashed #667eea' : sortMode ? '2px dashed #aaa' : '2px solid transparent',
                                        cursor: sortMode ? 'grab' : 'pointer',
                                        transition: 'transform 0.15s, border 0.15s, opacity 0.15s',
                                        position: 'relative',
                                        userSelect: 'none'
                                    }}
                                >
                                    {/* Tasto archivia — nascosto, accessibile dal menu long-press */}

                                    <div className="category-circle" style={{ background: category.color }}>
                                        {category.icon}
                                    </div>
		                <div className="category-amount" style={{ color: exceeded ? '#f44336' : category.color }}>
                                        {amount.toFixed(0)} €
                                    </div>
                                    <div className="category-name-small">{category.name}</div>
		                {mode === 'expense' && budget > 0 && (
                                        <div style={{ fontSize: exceeded ? '10px' : '9px', color: exceeded ? '#f44336' : '#999', fontWeight: exceeded ? 'bold' : 'normal', marginTop: '2px' }}>
                                            {exceeded
                                                ? <span style={{ color: '#f44336', fontWeight: 'bold' }}>+{Math.abs(remaining).toFixed(0)} €</span>
                                                : <span>{budget.toFixed(0)} €</span>
                                            }
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* Sezione categorie archiviate */}
                    {archivedCats.length > 0 && (
                        <div style={{ marginTop: '20px', padding: '0 5px' }}>
                            <button
                                onClick={() => setShowArchived(!showArchived)}
                                style={{
                                    width: '100%', padding: '10px', background: '#f5f5f5',
                                    border: '1px solid #ddd', borderRadius: '10px',
                                    cursor: 'pointer', fontSize: '13px', color: '#666',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px'
                                }}
                            >
                                📦 {archivedCats.length} {archivedCats.length === 1 ? 'categoria archiviata' : 'categorie archiviate'}
                                <span style={{ fontSize: '10px' }}>{showArchived ? '▲' : '▼'}</span>
                            </button>

                            {showArchived && (
                                <div style={{ marginTop: '10px', display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(80px, 1fr))', gap: '10px' }}>
                                    {archivedCats.map(category => (
                                        <div key={category.id} style={{
                                            background: '#f9f9f9', borderRadius: '12px', padding: '10px 5px',
                                            textAlign: 'center', border: '1px dashed #ccc', position: 'relative', opacity: 0.7
                                        }}>
                                            <button
                                                onClick={() => toggleArchive(category.id)}
                                                title="Ripristina categoria"
                                                style={{
                                                    position: 'absolute', top: '4px', right: '4px',
                                                    background: 'rgba(102,126,234,0.15)', border: 'none',
                                                    borderRadius: '50%', width: '20px', height: '20px',
                                                    fontSize: '10px', cursor: 'pointer', lineHeight: '20px',
                                                    padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center'
                                                }}
                                            >📤</button>
                                            <div style={{ width: '40px', height: '40px', borderRadius: '50%', background: '#ddd', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '20px', margin: '0 auto 6px' }}>
                                                {category.icon}

                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    <div style={{ textAlign: 'center', fontSize: '11px', color: '#bbb', marginTop: '10px', padding: '5px' }}>

        function SetBudgetModal({ onClose, budgets, onSetBudget, onSetAllBudgets, transactions, settings, periodStart, getPrevPeriodBudgets }) {
            const [amounts, setAmounts] = useState({});
            const [copied, setCopied] = useState(false);
            const cats = getCategoriesFromStorage().expense.filter(c => !c.archived);

            // Formato periodo per il titolo
            const periodLabel = (() => {
                if (!periodStart) return '';
                const start = new Date(periodStart);
                const end = new Date(start);
                end.setMonth(end.getMonth() + 1);
                end.setDate(end.getDate() - 1);
                return `${start.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' })} – ${end.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' })}`;
            })();

            useEffect(() => {
                const initial = {};
                cats.forEach(c => {
                    if (budgets[c.id]) initial[c.id] = String(budgets[c.id]);
                });
                setAmounts(initial);
            }, []);

            const handleSave = () => {
                const newBudgets = {};
                cats.forEach(c => {
                    const val = parseFloat(amounts[c.id]);
                    if (!isNaN(val) && val > 0) newBudgets[c.id] = val;
                });
                onSetAllBudgets(newBudgets);
                onClose();
            };

            const handleCopyPrevMonth = () => {
                // Prendi i budget salvati del periodo precedente
                const prevBudgets = getPrevPeriodBudgets ? getPrevPeriodBudgets() : {};
                const hasPrev = Object.keys(prevBudgets).length > 0;

                if (hasPrev) {
                    // Copia i budget del periodo precedente
                    const newAmounts = {};
                    cats.forEach(c => {
                        if (prevBudgets[c.id]) newAmounts[c.id] = String(prevBudgets[c.id]);
                    });
                    setAmounts(newAmounts);
                } else {
                    // Nessun budget precedente: suggerisci basandoti sulle spese del mese prima
                    const start = new Date(periodStart);
                    const prevEnd = new Date(start); prevEnd.setDate(prevEnd.getDate() - 1); prevEnd.setHours(23,59,59,999);
                    const prevStart = new Date(start); prevStart.setMonth(prevStart.getMonth() - 1);
                    const prevSpese = {};
                    transactions
                        .filter(t => t.type === 'expense' && new Date(t.date) >= prevStart && new Date(t.date) <= prevEnd)
                        .forEach(t => { prevSpese[t.category] = (prevSpese[t.category] || 0) + t.amount; });
                    const newAmounts = { ...amounts };
                    cats.forEach(c => {
                        if (prevSpese[c.id]) newAmounts[c.id] = String(Math.ceil(prevSpese[c.id] / 10) * 10);
                    });
                    setAmounts(newAmounts);
                }
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            // Calcola spese del periodo corrente per la progress bar
            const periodEnd = (() => {
                if (!periodStart) return new Date();
                const e = new Date(periodStart);
                e.setMonth(e.getMonth() + 1);
                e.setDate(e.getDate() - 1);
                e.setHours(23,59,59,999);
                return e;
            })();
            const periodTx = transactions.filter(t => {
                const d = new Date(t.date);
                return t.type === 'expense' && d >= new Date(periodStart) && d <= periodEnd;
            });

            const total = cats.reduce((sum, c) => sum + (parseFloat(amounts[c.id]) || 0), 0);

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxHeight: '90vh', display: 'flex', flexDirection: 'column' }}>
                        <div className="modal-header" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: '2px' }}>
                            <div style={{ display: 'flex', width: '100%', alignItems: 'center', justifyContent: 'space-between' }}>
                                <h2 className="modal-title">💰 Budget</h2>
                                <button className="close-btn" onClick={onClose}>×</button>
                            </div>
                            {periodLabel && (
                                <div style={{ fontSize: '12px', color: '#888', paddingLeft: '2px' }}>
                                    📅 {periodLabel}
                                </div>
                            )}
                        </div>

                        {/* Pulsante copia mese precedente */}
                        <div style={{ padding: '0 16px 12px' }}>
                            <button
                                type="button"
                                onClick={handleCopyPrevMonth}
                                style={{
                                    width: '100%', padding: '10px',
                                    background: copied ? '#e8f5e9' : '#f3e5f5',
                                    color: copied ? '#2e7d32' : '#7b1fa2',
                                    border: `2px solid ${copied ? '#4CAF50' : '#ce93d8'}`,
                                    borderRadius: '10px', cursor: 'pointer',
                                    fontWeight: 'bold', fontSize: '14px',
                                    transition: 'all 0.2s'
                                }}
                            >
                                {copied ? '✅ Budget copiati!' : '📋 Copia dal mese precedente'}
                            </button>
                        </div>

                        {/* Lista categorie scrollabile */}
                        <div style={{ overflowY: 'auto', flex: 1, padding: '0 16px' }}>
                            {cats.map(category => {
                                const val = parseFloat(amounts[category.id]) || 0;
                                const spent = periodTx
                                    .filter(t => t.category === category.id)
                                    .reduce((s, t) => s + t.amount, 0);
                                const pct = val > 0 ? Math.min((spent / val) * 100, 100) : 0;
                                const over = val > 0 && spent > val;
                                return (
                                    <div key={category.id} style={{ marginBottom: '14px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '6px' }}>
                                            <div style={{ width: '34px', height: '34px', borderRadius: '8px', background: category.color + '20', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '18px', flexShrink: 0 }}>
                                                {category.icon}
                                            </div>
                                            <div style={{ flex: 1, minWidth: 0 }}>
                                                <div style={{ fontWeight: '600', fontSize: '13px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{category.name}</div>
                                                {val > 0 && (
                                                    <div style={{ fontSize: '11px', color: over ? '#f44336' : '#999' }}>
                                                        speso €{spent.toFixed(0)} {over ? `(+€${(spent-val).toFixed(0)})` : `/ €${val.toFixed(0)}`}
                                                    </div>
                                                )}
                                            </div>
                                            <input
                                                type="number"
                                                step="1"
                                                min="0"
                                                value={amounts[category.id] || ''}
                                                onChange={e => setAmounts(prev => ({ ...prev, [category.id]: e.target.value }))}
                                                placeholder="0"
                                                style={{
                                                    width: '80px', padding: '7px 10px',
                                                    border: '2px solid ' + (val > 0 ? category.color + '80' : '#e0e0e0'),
                                                    borderRadius: '8px', fontSize: '14px',
                                                    textAlign: 'right', fontWeight: '600',
                                                    outline: 'none', flexShrink: 0
                                                }}
                                            />
                                        </div>
                                        {val > 0 && (
                                            <div style={{ height: '4px', background: '#f0f0f0', borderRadius: '2px' }}>
                                                <div style={{
                                                    height: '4px', borderRadius: '2px',
                                                    width: pct + '%',
                                                    background: over ? '#f44336' : category.color,
                                                    transition: 'width 0.3s'
                                                }} />
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {/* Footer con totale e salva */}
                        <div style={{ padding: '14px 16px', borderTop: '1px solid #eee' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                                <span style={{ color: '#666', fontSize: '13px' }}>Totale budget</span>
                                <span style={{ fontWeight: 'bold', fontSize: '18px', color: '#667eea' }}>€ {total.toFixed(0)}</span>
                            </div>
                            <button onClick={handleSave} className="submit-btn" style={{ marginTop: 0 }}>
                                💾 Salva budget {periodLabel ? `(${new Date(periodStart).toLocaleDateString('it-IT', { month: 'short', year: 'numeric' })})` : ''}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============ SQLite IMPORT MODAL ============
        function SQLiteImportModal({ onClose, onImport }) {
            const [status, setStatus] = useState('idle'); // idle | analyzing | preview | importing | success | error
            const [preview, setPreview] = useState(null);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');
            const [selectedFile, setSelectedFile] = useState(null);

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setSelectedFile(file);
                setStatus('analyzing');
                setError('');
                try {
                    const p = await window.analyze1MoneyDB(file);
                    setPreview(p);
                    setStatus('preview');
                } catch(err) {
                    setError(err.message || String(err));
                    setStatus('error');
                }
            };

            const handleConfirmImport = () => {
                if (!selectedFile) return;
                setStatus('importing');
                onImport(selectedFile).then((stats) => {
                    setResult(stats);
                    setStatus('success');
                }).catch((err) => {
                    setError(err.message || String(err));
                    setStatus('error');
                });
            };

            const fmt = (n) => n?.toLocaleString('it-IT') || '0';
            const fmtEur = (n) => '€' + (Math.round(n||0)).toLocaleString('it-IT');

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxHeight: '90vh', overflowY: 'auto' }}>
                        <div className="modal-header">
                            <h2 className="modal-title">🗄️ Import 1Money</h2>
                            <button className="close-btn" onClick={onClose}>×</button>
                        </div>

                        {/* ── IDLE: selezione file ── */}
                        {status === 'idle' && (
                            <div style={{ padding: '16px' }}>
                                <div style={{ background: '#e3f2fd', borderRadius: '10px', padding: '14px', marginBottom: '16px', fontSize: '13px', color: '#1565c0' }}>
                                    <strong>📋 Cosa verrà importato:</strong>
                                    <ul style={{ margin: '8px 0 0 16px', lineHeight: '1.8' }}>
                                        <li>✅ Transazioni (solo l'ultimo backup)</li>
                                        <li>✅ Categorie con gerarchia Padre &gt; Figlio</li>
                                        <li>✅ Conti/wallet (Megliobanca, Contanti…)</li>
                                        <li>⏭️ Trasferimenti: saltati automaticamente</li>
                                    </ul>
                                </div>
                                <label style={{ display:'block', padding:'28px', border:'3px dashed #667eea', borderRadius:'12px', textAlign:'center', cursor:'pointer', background:'#f8f9ff' }}>
                                    <div style={{ fontSize:'40px', marginBottom:'8px' }}>🗄️</div>
                                    <div style={{ fontWeight:'bold', color:'#667eea', marginBottom:'4px' }}>Seleziona file backup 1Money</div>
                                    <div style={{ fontSize:'12px', color:'#999' }}>File SQLite (senza estensione o .db)</div>
                                    <input type="file" accept="*/*" onChange={handleFile} style={{ display:'none' }} />
                                </label>
                            </div>
                        )}

                        {/* ── ANALYZING ── */}
                        {status === 'analyzing' && (
                            <div style={{ textAlign:'center', padding:'40px 20px' }}>
                                <div style={{ fontSize:'48px', marginBottom:'12px' }}>🔍</div>
                                <div style={{ fontWeight:'bold', fontSize:'17px' }}>Analisi in corso…</div>
                                <div style={{ color:'#888', fontSize:'13px', marginTop:'8px' }}>Lettura categorie e transazioni</div>
                            </div>
                        )}

                        {/* ── PREVIEW ── */}
                        {status === 'preview' && preview && (
                            <div style={{ padding:'16px' }}>
                                {/* Header backup */}
                                <div style={{ background:'#f3e5f5', borderRadius:'10px', padding:'12px', marginBottom:'14px', fontSize:'13px' }}>
                                    <div style={{ fontWeight:'700', color:'#6a1b9a', marginBottom:'4px' }}>📦 {preview.bookName}</div>
                                    <div style={{ color:'#888' }}>Aggiornato: {preview.bookDate}</div>
                                </div>

                                {/* Statistiche principali */}
                                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'14px' }}>
                                    {[
                                        { icon:'📊', label:'Transazioni', val: fmt(preview.transactions), color:'#667eea' },
                                        { icon:'📅', label:'Periodo', val: preview.dateFrom + ' → ' + preview.dateTo, color:'#888', small:true },
                                        { icon:'💸', label:'Totale Uscite', val: fmtEur(preview.totalExpense), color:'#f44336' },
                                        { icon:'💚', label:'Totale Entrate', val: fmtEur(preview.totalIncome), color:'#4CAF50' },
                                    ].map(s => (
                                        <div key={s.label} style={{ background:'white', border:'1px solid #f0f0f0', borderRadius:'10px', padding:'12px', textAlign:'center' }}>
                                            <div style={{ fontSize:'20px' }}>{s.icon}</div>
                                            <div style={{ fontSize: s.small ? '11px' : '16px', fontWeight:'700', color:s.color, marginTop:'4px' }}>{s.val}</div>
                                            <div style={{ fontSize:'11px', color:'#aaa' }}>{s.label}</div>
                                        </div>
                                    ))}
                                </div>

                                {/* Wallet/conti */}
                                <div style={{ background:'#fff8e1', borderRadius:'10px', padding:'12px', marginBottom:'12px' }}>
                                    <div style={{ fontWeight:'600', fontSize:'13px', marginBottom:'6px' }}>💳 Conti rilevati ({preview.wallets.length})</div>
                                    <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
                                        {preview.wallets.map((w,i) => (
                                            <span key={i} style={{ background:'#fff3cd', padding:'3px 10px', borderRadius:'20px', fontSize:'12px', border:'1px solid #ffe082' }}>{w}</span>
                                        ))}
                                    </div>
                                </div>

                                {/* Nuove categorie */}
                                {preview.newCategories.length > 0 && (
                                    <div style={{ background:'#e8f5e9', borderRadius:'10px', padding:'12px', marginBottom:'14px' }}>
                                        <div style={{ fontWeight:'600', fontSize:'13px', marginBottom:'6px' }}>
                                            🏷️ Nuove categorie create automaticamente ({preview.newCategories.length})
                                        </div>
                                        <div style={{ maxHeight:'120px', overflowY:'auto' }}>
                                            {preview.newCategories.map((c,i) => (
                                                <div key={i} style={{ fontSize:'12px', padding:'2px 0', color:'#444', borderBottom:'1px solid #f0f0f0' }}>
                                                    {c.type === 'income' ? '💚' : '🔴'} {c.name}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Pulsanti */}
                                <button onClick={handleConfirmImport} style={{
                                    width:'100%', padding:'14px',
                                    background:'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                    color:'white', border:'none', borderRadius:'10px',
                                    fontSize:'16px', fontWeight:'700', cursor:'pointer', marginBottom:'10px'
                                }}>
                                    ✅ Importa {fmt(preview.transactions)} transazioni
                                </button>
                                <button onClick={() => { setStatus('idle'); setPreview(null); setSelectedFile(null); }} style={{
                                    width:'100%', padding:'12px', background:'white',
                                    border:'1px solid #ddd', borderRadius:'10px',
                                    fontSize:'14px', color:'#666', cursor:'pointer'
                                }}>
                                    ← Scegli altro file
                                </button>
                            </div>
                        )}

                        {/* ── IMPORTING ── */}
                        {status === 'importing' && (
                            <div style={{ textAlign:'center', padding:'40px 20px' }}>
                                <div style={{ fontSize:'48px', marginBottom:'12px' }}>⏳</div>
                                <div style={{ fontWeight:'bold', fontSize:'17px' }}>Import in corso…</div>
                                <div style={{ color:'#888', fontSize:'13px', marginTop:'8px' }}>
                                    Creazione categorie e caricamento transazioni
                                </div>
                            </div>
                        )}

                        {/* ── SUCCESS ── */}
                        {status === 'success' && result && (
                            <div style={{ padding:'16px' }}>
                                <div style={{ background:'#e8f5e9', borderRadius:'12px', padding:'20px', textAlign:'center', marginBottom:'14px' }}>
                                    <div style={{ fontSize:'50px', marginBottom:'8px' }}>✅</div>
                                    <div style={{ fontWeight:'bold', fontSize:'20px', color:'#2e7d32' }}>Import Completato!</div>
                                    {result.stats?.bookUsed && (
                                        <div style={{ fontSize:'12px', color:'#888', marginTop:'6px' }}>Da: {result.stats.bookUsed}</div>
                                    )}
                                </div>
                                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'14px' }}>
                                    {[
                                        { label:'Transazioni', value: fmt(result.stats?.transactions), icon:'📊' },
                                        { label:'Categorie',   value: fmt(result.stats?.categories),   icon:'🏷️' },
                                        { label:'Conti',       value: fmt(result.stats?.accounts),     icon:'💳' },
                                        { label:'Saltati',     value: fmt(result.stats?.skipped),      icon:'⏭️' },
                                    ].map(item => (
                                        <div key={item.label} style={{ background:'white', border:'1px solid #e0e0e0', borderRadius:'10px', padding:'14px', textAlign:'center' }}>
                                            <div style={{ fontSize:'22px' }}>{item.icon}</div>
                                            <div style={{ fontSize:'22px', fontWeight:'bold', color:'#667eea' }}>{item.value}</div>
                                            <div style={{ fontSize:'11px', color:'#666' }}>{item.label}</div>
                                        </div>
                                    ))}
                                </div>
                                <button className="submit-btn" onClick={onClose}>✅ Chiudi e Vedi Dati</button>
                            </div>
                        )}

                        {/* ── ERROR ── */}
                        {status === 'error' && (
                            <div style={{ padding:'16px' }}>
                                <div style={{ background:'#ffebee', borderRadius:'12px', padding:'20px', textAlign:'center', marginBottom:'14px' }}>
                                    <div style={{ fontSize:'50px', marginBottom:'8px' }}>❌</div>
                                    <div style={{ fontWeight:'bold', fontSize:'18px', color:'#c62828' }}>Errore Import</div>
                                    <div style={{ color:'#666', fontSize:'13px', marginTop:'8px' }}>{error}</div>
                                </div>
                                <button className="submit-btn" onClick={() => { setStatus('idle'); setError(''); setSelectedFile(null); }}
                                    style={{ background:'#f44336' }}>🔄 Riprova</button>
                            </div>
                        )}
                    </div>
                </div>

        // ============ DEBT VIEW ============
        function DebtView({ debts, onAdd, onEdit, onDelete, onPayment }) {
            const [payingDebt, setPayingDebt] = useState(null); // debt object
            const [payAmount, setPayAmount] = useState('');
            const [payNote, setPayNote] = useState('');

            const devo    = debts.filter(d => d.type === 'devo'      && !d.completed);
            const midevo  = debts.filter(d => d.type === 'mi_devono' && !d.completed);
            const done    = debts.filter(d => d.completed);

            const totalDevo   = devo.reduce((s,d) => s + (d.totalAmount - (d.payments||[]).reduce((x,p)=>x+p.amount,0)), 0);
            const totalMiDevo = midevo.reduce((s,d) => s + (d.totalAmount - (d.payments||[]).reduce((x,p)=>x+p.amount,0)), 0);

            const remaining = (d) => Math.max(0, d.totalAmount - (d.payments||[]).reduce((s,p)=>s+p.amount,0));
            const paidPct   = (d) => Math.min(100, Math.round(((d.payments||[]).reduce((s,p)=>s+p.amount,0)) / d.totalAmount * 100));
            const fmt       = (n) => '€' + (n||0).toLocaleString('it-IT', {minimumFractionDigits:2, maximumFractionDigits:2});

            const DebtCard = ({d, color}) => {
                const rem = remaining(d);
                const pct = paidPct(d);
                return (
                    <div style={{ background:'white', borderRadius:'12px', padding:'14px', marginBottom:'10px', boxShadow:'0 1px 6px rgba(0,0,0,0.08)', border:`2px solid ${color}22` }}>
                        <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
                            <div style={{ width:44, height:44, borderRadius:'50%', background:d.color||color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'20px', flexShrink:0 }}>
                                {d.icon||'💰'}
                            </div>
                            <div style={{ flex:1 }}>
                                <div style={{ fontWeight:'700', fontSize:'15px' }}>{d.name}</div>
                                <div style={{ fontSize:'13px', color: color, fontWeight:'600' }}>{fmt(rem)} rimanenti</div>
                                {d.note && <div style={{ fontSize:'11px', color:'#aaa', marginTop:'2px' }}>{d.note}</div>}
                            </div>
                            {/* Progress circle */}
                            <div style={{ position:'relative', width:48, height:48, flexShrink:0 }}>
                                <svg viewBox="0 0 36 36" style={{ width:48, height:48, transform:'rotate(-90deg)' }}>
                                    <circle cx="18" cy="18" r="15" fill="none" stroke="#f0f0f0" strokeWidth="3"/>
                                    <circle cx="18" cy="18" r="15" fill="none" stroke={color} strokeWidth="3"
                                        strokeDasharray={`${pct * 0.942} 94.2`} strokeLinecap="round"/>
                                </svg>
                                <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', fontWeight:'700', color }}>{pct}%</div>
                            </div>
                        </div>
                        {/* Barra progresso */}
                        <div style={{ marginTop:'10px', height:'4px', background:'#f0f0f0', borderRadius:'2px' }}>
                            <div style={{ width:`${pct}%`, height:'100%', background:color, borderRadius:'2px', transition:'width 0.4s' }}/>
                        </div>
                        <div style={{ display:'flex', justifyContent:'space-between', fontSize:'11px', color:'#aaa', marginTop:'4px' }}>
                            <span>Totale: {fmt(d.totalAmount)}</span>
                            <span>Pagato: {fmt((d.payments||[]).reduce((s,p)=>s+p.amount,0))}</span>
                        </div>
                        {/* Azioni */}
                        <div style={{ display:'flex', gap:'8px', marginTop:'10px' }}>
                            <button onClick={() => { setPayingDebt(d); setPayAmount(''); setPayNote(''); }} style={{
                                flex:2, padding:'8px', background:color, color:'white', border:'none',
                                borderRadius:'8px', fontSize:'13px', fontWeight:'700', cursor:'pointer'
                            }}>💳 Pagamento</button>
                            <button onClick={() => onEdit(d)} style={{
                                flex:1, padding:'8px', background:'#f5f5f5', border:'none',
                                borderRadius:'8px', fontSize:'13px', cursor:'pointer'
                            }}>✏️</button>
                            <button onClick={() => onDelete(d.id)} style={{
                                flex:1, padding:'8px', background:'#fff0f0', border:'none',
                                borderRadius:'8px', fontSize:'13px', cursor:'pointer'
                            }}>🗑️</button>
                        </div>
                    </div>
                );
            };

            return (
                <div style={{ padding:'16px', paddingBottom:'90px' }}>
                    {/* Sommario */}
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'16px' }}>
                        <div style={{ background:'#fff0f0', borderRadius:'12px', padding:'14px', textAlign:'center' }}>
                            <div style={{ fontSize:'12px', color:'#888' }}>Devo</div>
                            <div style={{ fontSize:'20px', fontWeight:'800', color:'#f44336' }}>{fmt(totalDevo)}</div>
                        </div>
                        <div style={{ background:'#e8f5e9', borderRadius:'12px', padding:'14px', textAlign:'center' }}>
                            <div style={{ fontSize:'12px', color:'#888' }}>Mi devono</div>
                            <div style={{ fontSize:'20px', fontWeight:'800', color:'#4CAF50' }}>{fmt(totalMiDevo)}</div>
                        </div>
                    </div>

                    {/* Bottone aggiungi */}
                    <button onClick={onAdd} style={{
                        width:'100%', padding:'12px', marginBottom:'16px',
                        background:'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                        color:'white', border:'none', borderRadius:'10px',
                        fontSize:'15px', fontWeight:'700', cursor:'pointer'
                    }}>+ Nuovo Debito / Credito</button>

                    {/* Devo */}
                    {devo.length > 0 && (<>
                        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'8px' }}>
                            <span style={{ fontWeight:'700', color:'#f44336' }}>Devo</span>
                            <span style={{ fontWeight:'700', color:'#f44336' }}>{fmt(totalDevo)}</span>
                        </div>
                        {devo.map(d => <DebtCard key={d.id} d={d} color="#f44336"/>)}
                    </>)}

                    {/* Mi devono */}
                    {midevo.length > 0 && (<>
                        <div style={{ display:'flex', justifyContent:'space-between', margin:'8px 0', marginTop: devo.length?'16px':'0' }}>
                            <span style={{ fontWeight:'700', color:'#4CAF50' }}>Mi devono</span>
                            <span style={{ fontWeight:'700', color:'#4CAF50' }}>{fmt(totalMiDevo)}</span>
                        </div>
                        {midevo.map(d => <DebtCard key={d.id} d={d} color="#4CAF50"/>)}
                    </>)}

                    {/* Completati */}
                    {done.length > 0 && (<>
                        <div style={{ marginTop:'16px', marginBottom:'8px', fontWeight:'700', color:'#888' }}>✅ Completati ({done.length})</div>
                        {done.map(d => (
                            <div key={d.id} style={{ background:'#f9f9f9', borderRadius:'10px', padding:'12px', marginBottom:'8px', opacity:0.6, display:'flex', alignItems:'center', gap:'10px' }}>
                                <div style={{ fontSize:'20px' }}>{d.icon||'✅'}</div>
                                <div style={{ flex:1 }}>
                                    <div style={{ fontWeight:'600', fontSize:'14px' }}>{d.name}</div>
                                    <div style={{ fontSize:'12px', color:'#888' }}>{d.type==='devo'?'Saldato':'Riscosso'} · {fmt(d.totalAmount)}</div>
                                </div>
                                <button onClick={() => onDelete(d.id)} style={{ background:'none', border:'none', color:'#ccc', cursor:'pointer', fontSize:'18px' }}>×</button>
                            </div>
                        ))}
                    </>)}

                    {debts.length === 0 && (
                        <div style={{ textAlign:'center', padding:'40px 20px', color:'#aaa' }}>
                            <div style={{ fontSize:'48px', marginBottom:'12px' }}>📋</div>
                            <div style={{ fontWeight:'600' }}>Nessun debito registrato</div>
                            <div style={{ fontSize:'13px', marginTop:'6px' }}>Aggiungi un debito o un credito con il bottone sopra</div>
                        </div>
                    )}

                    {/* Payment modal */}
                    {payingDebt && (
                        <div className="modal" onClick={() => setPayingDebt(null)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2 className="modal-title">💳 Registra Pagamento</h2>
                                    <button className="close-btn" onClick={() => setPayingDebt(null)}>×</button>
                                </div>
                                <div style={{ padding:'16px' }}>
                                    <div style={{ marginBottom:'12px', fontSize:'14px', color:'#666' }}>
                                        <strong>{payingDebt.name}</strong> · Rimanente: {fmt(remaining(payingDebt))}
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Importo pagamento €</label>
                                        <input className="form-input" type="number" step="0.01" min="0"
                                            value={payAmount} onChange={e => setPayAmount(e.target.value)}
                                            onFocus={e => e.target.select()}
                                            placeholder={remaining(payingDebt).toFixed(2)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Nota (opzionale)</label>
                                        <input className="form-input" type="text" value={payNote}
                                            onChange={e => setPayNote(e.target.value)} placeholder="es. rata aprile" />
                                    </div>
                                    <button onClick={() => {
                                        if (!payAmount || parseFloat(payAmount) <= 0) return;
                                        onPayment(payingDebt.id, parseFloat(payAmount), payNote);
                                        setPayingDebt(null);
                                    }} className="submit-btn">
                                        ✅ Registra
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============ DEBT MODAL (aggiungi/modifica) ============
        function DebtModal({ debt, onSave, onClose }) {
            const [name, setName]     = useState(debt?.name || '');
            const [type, setType]     = useState(debt?.type || 'devo');
            const [total, setTotal]   = useState(debt?.totalAmount || '');
            const [note, setNote]     = useState(debt?.note || '');
            const [icon, setIcon]     = useState(debt?.icon || '💰');
            const [color, setColor]   = useState(debt?.color || (debt?.type==='mi_devono' ? '#4CAF50' : '#f44336'));

            const ICONS = ['💰','🏦','🏠','🚗','💳','👤','📋','🎓','🏥','💊','🛒','✈️','🚐'];

            const handleSave = () => {
                if (!name.trim() || !total || parseFloat(total) <= 0) return;
                onSave({
                    ...(debt || {}),
                    name: name.trim(), type, totalAmount: parseFloat(total),
                    note: note.trim(), icon, color,
                    payments: debt?.payments || [],
                    completed: debt?.completed || false,
                    startDate: debt?.startDate || new Date().toISOString()
                });
            };

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">{debt ? '✏️ Modifica' : '➕ Nuovo'} Debito</h2>
                            <button className="close-btn" onClick={onClose}>×</button>
                        </div>
                        <div style={{ padding:'16px' }}>
                            {/* Tipo */}
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'16px' }}>
                                {[['devo','🔴 Devo','#f44336'],['mi_devono','🟢 Mi devono','#4CAF50']].map(([val,label,col]) => (
                                    <button key={val} onClick={() => { setType(val); setColor(col); }} style={{
                                        padding:'12px', border:`2px solid ${type===val?col:'#e0e0e0'}`,
                                        borderRadius:'10px', background: type===val ? col+'22' : 'white',
                                        fontWeight:'700', color: type===val ? col : '#888', cursor:'pointer', fontSize:'14px'
                                    }}>{label}</button>
                                ))}
                            </div>
                            <div className="form-group">
                                <label className="form-label">Nome / Creditore</label>
                                <input className="form-input" type="text" value={name}
                                    onChange={e => setName(e.target.value)} placeholder="es. Findomestic, Valentina..." />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Importo totale €</label>
                                <input className="form-input" type="number" step="0.01" min="0"
                                    value={total} onChange={e => setTotal(e.target.value)}
                                    onFocus={e => e.target.select()} />
                            </div>
                            <div className="form-group">
                                <label className="form-label">Icona</label>
                                <div style={{ display:'flex', flexWrap:'wrap', gap:'8px', marginTop:'4px' }}>
                                    {ICONS.map(ic => (
                                        <button key={ic} onClick={() => setIcon(ic)} style={{
                                            width:40, height:40, borderRadius:'50%', border: ic===icon ? '2px solid #667eea' : '1px solid #e0e0e0',
                                            background: ic===icon ? '#f0f0ff' : 'white', fontSize:'20px', cursor:'pointer'
                                        }}>{ic}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Note</label>
                                <input className="form-input" type="text" value={note}
                                    onChange={e => setNote(e.target.value)} placeholder="opzionale" />
                            </div>
                            <button onClick={handleSave} disabled={!name.trim() || !total} className="submit-btn"
                                style={{ opacity: (!name.trim()||!total) ? 0.5 : 1 }}>
                                {debt ? '✅ Salva modifiche' : '➕ Aggiungi'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============ LOGIN MODAL ============
        function LoginModal({ onClose }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isSignup, setIsSignup] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleGoogleLogin = async () => {
                if (!window.FB_READY) return;
                setLoading(true); setError('');
                try {
                    const provider = new window.FB.GoogleAuthProvider();
                    await window.FB.signInWithPopup(window.FB.auth, provider);
                    onClose();
                } catch(e) {
                    setError(e.message || 'Errore login Google');
                } finally { setLoading(false); }
            };

            const handleEmailLogin = async () => {
                if (!window.FB_READY || !email || !password) return;
                setLoading(true); setError('');
                try {
                    if (isSignup) {
                        await window.FB.createUserWithEmailAndPassword(window.FB.auth, email, password);
                    } else {
                        await window.FB.signInWithEmailAndPassword(window.FB.auth, email, password);
                    }
                    onClose();
                } catch(e) {
                    const msgs = {
                        'auth/user-not-found': 'Account non trovato',
                        'auth/wrong-password': 'Password errata',
                        'auth/email-already-in-use': 'Email già registrata',
                        'auth/weak-password': 'Password troppo corta (min 6 caratteri)',
                        'auth/invalid-email': 'Email non valida',
                        'auth/invalid-credential': 'Email o password errati'
                    };
                    setError(msgs[e.code] || e.message);
                } finally { setLoading(false); }
            };

            return (
                <div style={{
                    position: 'fixed', inset: 0, zIndex: 9999,
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    padding: '20px'
                }}>
                    <div style={{
                        background: 'white', borderRadius: '20px',
                        padding: '30px', width: '100%', maxWidth: '360px',
                        boxShadow: '0 20px 60px rgba(0,0,0,0.3)'
                    }}>
                        <div style={{ textAlign: 'center', marginBottom: '24px' }}>
                            <div style={{ fontSize: '48px', marginBottom: '8px' }}>💰</div>
                            <h2 style={{ margin: 0, color: '#333', fontSize: '22px' }}>MoneyTracker 8.0</h2>
                            <p style={{ margin: '6px 0 0', color: '#888', fontSize: '14px' }}>
                                {isSignup ? 'Crea un account' : 'Accedi per sincronizzare i dati'}
                            </p>
                        </div>

                        {/* Google login */}
                        <button onClick={handleGoogleLogin} disabled={loading} style={{
                            width: '100%', padding: '13px', marginBottom: '16px',
                            background: '#fff', border: '2px solid #e0e0e0',
                            borderRadius: '10px', fontSize: '15px', fontWeight: '600',
                            cursor: 'pointer', display: 'flex', alignItems: 'center',
                            justifyContent: 'center', gap: '10px', color: '#333',
                            transition: 'border-color 0.2s'
                        }}>
                            <span style={{ fontSize: '20px' }}>🔵</span>
                            Continua con Google
                        </button>

                        <div style={{
                            display: 'flex', alignItems: 'center', gap: '10px',
                            margin: '16px 0', color: '#bbb', fontSize: '13px'
                        }}>
                            <div style={{ flex: 1, height: '1px', background: '#eee' }} />
                            oppure
                            <div style={{ flex: 1, height: '1px', background: '#eee' }} />
                        </div>

                        {/* Email / Password */}
                        <input type="email" placeholder="Email" value={email}
                            onChange={e => setEmail(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && handleEmailLogin()}
                            style={{
                                width: '100%', padding: '12px', marginBottom: '10px',
                                border: '1px solid #e0e0e0', borderRadius: '8px',
                                fontSize: '14px', boxSizing: 'border-box', outline: 'none'
                            }}
                        />
                        <input type="password" placeholder="Password" value={password}
                            onChange={e => setPassword(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && handleEmailLogin()}
                            style={{
                                width: '100%', padding: '12px', marginBottom: '14px',
                                border: '1px solid #e0e0e0', borderRadius: '8px',
                                fontSize: '14px', boxSizing: 'border-box', outline: 'none'
                            }}
                        />

                        {error && (
                            <div style={{
                                background: '#fff0f0', color: '#c62828', padding: '10px 12px',
                                borderRadius: '8px', fontSize: '13px', marginBottom: '12px',
                                border: '1px solid #ffcdd2'
                            }}>⚠️ {error}</div>
                        )}

                        <button onClick={handleEmailLogin} disabled={loading} style={{
                            width: '100%', padding: '13px',
                            background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                            color: 'white', border: 'none', borderRadius: '10px',
                            fontSize: '15px', fontWeight: '700', cursor: 'pointer',
                            opacity: loading ? 0.7 : 1
                        }}>
                            {loading ? '⏳ Attendi...' : (isSignup ? 'Registrati' : 'Accedi')}
                        </button>

                        <div style={{ textAlign: 'center', marginTop: '16px' }}>
                            <button onClick={() => { setIsSignup(!isSignup); setError(''); }} style={{
                                background: 'none', border: 'none', color: '#667eea',
                                cursor: 'pointer', fontSize: '13px', textDecoration: 'underline'
                            }}>
                                {isSignup ? 'Hai già un account? Accedi' : 'Non hai un account? Registrati'}
                            </button>
                        </div>

                        {/* Opzione offline */}
                        <div style={{ textAlign: 'center', marginTop: '20px', borderTop: '1px solid #f0f0f0', paddingTop: '16px' }}>
                            <button onClick={onClose} style={{
                                background: 'none', border: 'none', color: '#aaa',
                                cursor: 'pointer', fontSize: '12px'
                            }}>
                                Continua senza account (solo locale)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, info: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, info) {
                this.setState({ info });
                console.error('ErrorBoundary:', error, info);
            }
            render() {
                if (this.state.hasError) {
                    return React.createElement('div', {
                        style: { padding: '20px', fontFamily: 'sans-serif', maxWidth: '100%' }
                    },
                        React.createElement('h2', { style: { color: '#f44336' } }, '❌ Errore App'),
                        React.createElement('p', { style: { color: '#666' } }, 'Si è verificato un errore. Copia il testo qui sotto e mandalo allo sviluppatore.'),
                        React.createElement('pre', {
                            style: {
                                background: '#f5f5f5', padding: '15px', borderRadius: '8px',
                                fontSize: '11px', overflow: 'auto', whiteSpace: 'pre-wrap',
                                maxHeight: '60vh', border: '1px solid #ddd'
                            }
                        }, String(this.state.error) + '\n\n' + (this.state.info ? this.state.info.componentStack : '')),
                        React.createElement('button', {
                            onClick: () => window.location.reload(),
                            style: {
                                marginTop: '15px', padding: '12px 24px', background: '#667eea',
                                color: 'white', border: 'none', borderRadius: '8px',
                                cursor: 'pointer', fontSize: '16px', width: '100%'
                            }
                        }, '🔄 Ricarica App')
                    );
                }
                return this.props.children;
            }
        }

        ReactDOM.render(
            React.createElement(ErrorBoundary, null, React.createElement(App, null)),
            document.getElementById('root')
        );

        // Cattura errori globali e mostrali invece di schermata bianca
        window.addEventListener('error', (e) => {
            const root = document.getElementById('root');
            if (root && root.innerHTML.trim() === '') {
                root.innerHTML = `
                    <div style="padding:30px;font-family:sans-serif;max-width:600px;margin:0 auto">
                        <h2 style="color:#f44336">❌ Errore App</h2>
                        <p style="color:#666;margin:10px 0">Si è verificato un errore. Prova a ricaricare la pagina.</p>
                        <pre style="background:#f5f5f5;padding:15px;border-radius:8px;font-size:12px;white-space:pre-wrap;overflow:auto">${e.message}\n${e.filename}:${e.lineno}</pre>
                        <button onclick="location.reload()" style="margin-top:15px;padding:12px 24px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px">🔄 Ricarica</button>
                    </div>`;
            }
        });

        window.addEventListener('unhandledrejection', (e) => {
            console.error('Promise non gestita:', e.reason);
        });
    </script>
</body>
</html>
