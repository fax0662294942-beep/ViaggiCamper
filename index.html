    <!-- Script normale (non Babel) per SQLite - async/await funziona nativamente -->
    <script>
        // ============ FUNZIONI SQLite IMPORT ============
        window.readSQLiteDatabase = async function(file) {
            var SQL;
            try {
                SQL = await initSqlJs({ locateFile: function(f) { return 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/' + f; } });
            } catch(e1) {
                try {
                    SQL = await initSqlJs({ locateFile: function(f) { return 'https://cdn.jsdelivr.net/npm/sql.js@1.8.0/dist/' + f; } });
                } catch(e2) {
                    throw new Error('Impossibile caricare sql.js. Controlla la connessione.\n' + e2.message);
                }
            }
            var arrayBuffer = await file.arrayBuffer();
            var uint8Array = new Uint8Array(arrayBuffer);
            var magic = String.fromCharCode(uint8Array[0],uint8Array[1],uint8Array[2],uint8Array[3],uint8Array[4],uint8Array[5]);
            if (magic !== 'SQLite') throw new Error('File non valido. Seleziona un backup 1Money (.db)');
            return new SQL.Database(uint8Array);
        };

        window.queryDB = function(db, sql, params) {
            var results = [];
            try {
                var stmt = db.prepare(sql, params);
                while (stmt.step()) results.push(stmt.getAsObject());
                stmt.free();
            } catch(e) { console.warn('Query fallita:', sql, e); }
            return results;
        };

        // Helper icone categoria
        window._catIcon = function(name, parent, type) {
            var n = ((name||'') + ' ' + (parent||'')).toLowerCase();
            if (type === 'income') {
                if (n.includes('stipend') || n.includes('salari')) return '💼';
                if (n.includes('franco') || n.includes('valentin')) return '👤';
                if (n.includes('buon') || n.includes('pasto')) return '🎫';
                if (n.includes('banca') || n.includes('meglio') || n.includes('conto')) return '🏦';
                if (n.includes('camper')) return '🚐'; if (n.includes('telepass')) return '🛣️';
                if (n.includes('carta') || n.includes('card')) return '💳';
                if (n.includes('budget') || n.includes('vacanze')) return '✈️';
                return '💰';
            }
            if (n.includes('supermercato') || n.includes('spesa') || n.includes('mercato') || n.includes('detersiv')) return '🛒';
            if (n.includes('benzina') || n.includes('gpl') || n.includes('carburant')) return '⛽';
            if (n.includes('pedaggi') || n.includes('pedaggio') || n.includes('casello') || n.includes('autostr')) return '🛣️';
            if (n.includes('bollette') || n.includes('bolletta') || n.includes('luce') || n.includes('acqua')) return '💡';
            if (n.includes('condomin') || n.includes('supercondomin')) return '🏢';
            if (n.includes('area sosta') || n.includes('campeggio')) return '🏕️';
            if (n.includes('colazion') || n.includes('pranzo') || n.includes('cena') || n.includes('ristorant')) return '🍽️';
            if (n.includes('escursion') || n.includes('visita') || n.includes('museo')) return '🎭';
            if (n.includes('farmacia') || n.includes('salute') || n.includes('medic')) return '💊';
            if (n.includes('abbigliamento') || n.includes('shopping')) return '🛍️';
            if (n.includes('parcheggio')) return '🅿️';
            if (n.includes('camper')) return '🚐'; if (n.includes('auto') || n.includes('macchina')) return '🚗';
            if (n.includes('treno') || n.includes('aereo') || n.includes('volo') || n.includes('trasport')) return '✈️';
            if (n.includes('vacanze') || n.includes('viaggio') || n.includes('viaggi')) return '🏖️';
            if (n.includes('regali') || n.includes('regalo')) return '🎁';
            if (n.includes('lavoro') || n.includes('ufficio')) return '💼';
            if (n.includes('assicuraz') || n.includes('polizz') || n.includes('rimessaggio')) return '📋';
            if (n.includes('telepass')) return '🛣️'; if (n.includes('gas')) return '🔥';
            return '📦';
        };

        // STEP 1: analizza il file e restituisce preview senza importare
        window.analyze1MoneyDB = async function(file) {
            var db = await window.readSQLiteDatabase(file);

            // Trova il book più recente (Backup giornaliero = _ty=4)
            var books = window.queryDB(db, "SELECT _id, _na, _ty, _da FROM ba ORDER BY _da DESC");
            var targetBook = null;
            for (var i = 0; i < books.length; i++) {
                if (books[i]._ty === 4 || books[i]._ty === '4') { targetBook = books[i]; break; }
            }
            if (!targetBook) targetBook = books[0];
            var bookId = targetBook._id;

            // Categorie (deduplicato per _id)
            var rawCats = window.queryDB(db, "SELECT _id, _na, _ty, _pi FROM de GROUP BY _id");
            var catById = {};
            rawCats.forEach(function(r) {
                catById[r._id] = { name:(r._na||'').trim(), type:(r._ty===1||r._ty==='1')?'expense':'income', parentId:r._pi||null };
            });
            // Risolvi parentName
            Object.keys(catById).forEach(function(id) {
                var c = catById[id];
                if (c.parentId && catById[c.parentId]) c.parentName = catById[c.parentId].name;
            });

            // Transazioni del book (no transfer)
            var txRows = window.queryDB(db, "SELECT _id,_ty,_da,_a_i,_d_i,_a_m FROM tr WHERE _b_i="+bookId+" AND _ty!=2");
            var usedCatIds = {}, usedWalletIds = {};
            var minDate = Infinity, maxDate = 0, totalInc = 0, totalExp = 0;
            txRows.forEach(function(t) {
                var ty = parseInt(t._ty);
                var catId = ty===0 ? t._d_i : t._a_i;
                var walId = ty===0 ? t._a_i : t._d_i;
                if (catId) usedCatIds[catId] = true;
                if (walId) usedWalletIds[walId] = true;
                var ts = parseInt(t._da||0);
                if (ts < minDate) minDate = ts;
                if (ts > maxDate) maxDate = ts;
                var amt = parseFloat(t._a_m||0);
                if (ty===1) totalInc += amt; else totalExp += amt;
            });

            // Categorie da creare (non in quelle default di MoneyTracker)
            var defaultNames = ['spesa','ristoranti','trasporti','carburante','bollette','affitto','shopping','salute',
                'svago','viaggi','vacanze','istruzione','per lavoro','famiglia','spese personali','altro',
                'stipendio','freelance','investimenti','rimborsi','regalo'];
            var newCats = [];
            Object.keys(usedCatIds).forEach(function(cid) {
                var c = catById[cid];
                if (!c || !c.name) return;
                var displayName = c.parentName ? c.parentName + ' > ' + c.name : c.name;
                var isDefault = defaultNames.some(function(d) { return c.name.toLowerCase().includes(d); });
                newCats.push({ id: cid, name: displayName, type: c.type, isNew: !isDefault });
            });

            var wallets = [];
            Object.keys(usedWalletIds).forEach(function(wid) {
                var c = catById[wid];
                wallets.push(c ? c.name : 'Conto '+wid);
            });

            var fmt = function(ts) { return ts < Infinity && ts > 0 ? new Date(ts).toLocaleDateString('it-IT') : '?'; };

            db.close();
            return {
                _file: file,
                bookName: targetBook._na || 'Backup',
                bookDate: fmt(parseInt(targetBook._da)),
                bookId: bookId,
                transactions: txRows.length,
                transfers: 0,
                dateFrom: fmt(minDate),
                dateTo: fmt(maxDate),

        // STEP 2: esegui import reale
        window.import1MoneyDB = async function(file) {
            var db = await window.readSQLiteDatabase(file);
            var books = window.queryDB(db, "SELECT _id,_na,_ty,_da FROM ba ORDER BY _da DESC");
            var targetBook = null;
            for (var i=0;i<books.length;i++) { if(books[i]._ty===4||books[i]._ty==='4'){targetBook=books[i];break;} }
            if (!targetBook) targetBook = books[0];
            var bookId = targetBook._id;

            var rawCats = window.queryDB(db, "SELECT _id,_na,_ty,_pi FROM de GROUP BY _id");
            var catById = {};
            rawCats.forEach(function(r) {
                catById[r._id] = { name:(r._na||'').trim(), type:(r._ty===1||r._ty==='1')?'expense':'income', parentId:r._pi||null };
            });
            Object.keys(catById).forEach(function(id) {
                var c = catById[id]; if(c.parentId&&catById[c.parentId]) c.parentName=catById[c.parentId].name;
            });

            var txRows = window.queryDB(db, "SELECT _id,_ty,_da,_a_i,_d_i,_a_m,_co FROM tr WHERE _b_i="+bookId+" AND _ty!=2");

            // Costruisci mappe categoria e wallet
            var CEXP=['#FF6B6B','#4ECDC4','#4DA6FF','#AA96DA','#FFD93D','#FF8E8E','#5ED5D5','#3D8BFF','#FCBAD3','#FFF176','#A8D8EA','#8D6E63','#CE93D8','#FFB74D','#B0BEC5','#F06292','#BA68C8','#64B5F6'];
            var CINC=['#6BCF7F','#4CAF50','#8BC34A','#9CCC65','#AED581','#C5E1A5','#81C784'];
            var WACC=['#4CAF50','#2196F3','#FF9800','#E91E63','#9C27B0','#00BCD4','#FF5722','#607D8B'];

            var usedCatIds={}, usedWalIds={};
            txRows.forEach(function(t) {
                var ty=parseInt(t._ty);
                var cid=ty===0?t._d_i:t._a_i, wid=ty===0?t._a_i:t._d_i;
                if(cid) usedCatIds[cid]=true; if(wid) usedWalIds[wid]=true;
            });

            var catIdToMT={}, mtCatExpense=[], mtCatIncome=[], ce=0, ci=0;
            Object.keys(usedCatIds).forEach(function(cid) {
                var c=catById[cid]; if(!c||!c.name) return;
                var displayName=c.parentName?(c.parentName+' > '+c.name):c.name;
                var mtId='imp_'+String(cid).slice(-8);
                catIdToMT[cid]=mtId;
                if(c.type==='expense'){
                    mtCatExpense.push({id:mtId, name:displayName, icon:window._catIcon(c.name,c.parentName,'expense'), color:CEXP[ce++%CEXP.length]});
                } else {
                    mtCatIncome.push({id:mtId, name:displayName, icon:window._catIcon(c.name,c.parentName,'income'), color:CINC[ci++%CINC.length]});
                }
            });

            var walletMap={}, customAccounts=[], wi=0;
            Object.keys(usedWalIds).forEach(function(wid) {
                var c=catById[wid]; var nm=c?c.name:('Conto '+wid);
                var slug='w_'+String(nm).toLowerCase().replace(/[^a-z0-9]/g,'_').substring(0,18)+'_'+String(wid).slice(-4);
                walletMap[wid]={id:slug, name:nm.trim()};
                customAccounts.push({id:slug, name:nm.trim(), icon:'💳', color:WACC[wi++%WACC.length]});
            });

            // Processa transazioni
            var transactions=[], skipped=0, baseTime=Date.now();
            txRows.forEach(function(row,idx) {
                try {
                    var ty=parseInt(row._ty);
                    var amount=Math.abs(parseFloat(row._a_m||0));
                    if(!amount||amount<=0){skipped++;return;}
                    var type=ty===1?'income':'expense';
                    var ts=parseInt(row._da||0);
                    var d=ts>0?new Date(ts):new Date();
                    // Fix timezone: usa mezzogiorno per evitare shift UTC
                    var dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T12:00:00.000Z';
                    var catId=ty===0?row._d_i:row._a_i;
                    var walId=ty===0?row._a_i:row._d_i;
                    var mtCatId=catIdToMT[catId]||'other';
                    var wal=walletMap[walId];
                    var note=row._co?String(row._co).trim():'';
                    transactions.push({id:baseTime-idx, type:type, amount:amount, category:mtCatId, account:wal?wal.id:'cash', note:note, date:dateStr, importedFrom1Money:true});
                } catch(err){skipped++;}
            });

            // Ordina per data decrescente, riassegna ID
            transactions.sort(function(a,b){return b.date.localeCompare(a.date);});
            transactions.forEach(function(t,i){t.id=baseTime-i;});

            db.close();
            return {
                categories:{expense:mtCatExpense, income:mtCatIncome},
                customAccounts:customAccounts,
                transactions:transactions,
                skipped:skipped,
                stats:{
                    categories:mtCatExpense.length+mtCatIncome.length,
                    accounts:customAccounts.length,
                    transactions:transactions.length,
                    skipped:skipped,
                    bookUsed:(targetBook._na||'Book '+bookId)+' ('+new Date(parseInt(targetBook._da)).toLocaleDateString('it-IT')+')'
                }
            };
        };

    <!-- IndexedDB per transazioni (nessun limite di spazio) -->
    <script>
        window.MT_DB = null;
        window.MT_DB_READY = false;
        window.MT_DB_CALLBACKS = [];

        function openMTDatabase() {
            var req = indexedDB.open('MoneyTracker6', 2);
            req.onupgradeneeded = function(e) {
                var db = e.target.result;
                // Versione 1: indice sbagliato su 'account' (confondeva profilo con conto bancario)
                if (db.objectStoreNames.contains('transactions')) {
                    db.deleteObjectStore('transactions');
                }
                // Versione 2: indice su '_profileId' separato dal campo 'account' (conto bancario)
                var store = db.createObjectStore('transactions', { keyPath: 'id' });
                store.createIndex('_profileId', '_profileId', { unique: false });
            };
            req.onsuccess = function(e) {
                window.MT_DB = e.target.result;
                window.MT_DB_READY = true;
                window.MT_DB_CALLBACKS.forEach(function(cb) { cb(); });
                window.MT_DB_CALLBACKS = [];
                console.log('IndexedDB pronto (v2)');
            };
            req.onerror = function(e) {
                console.error('IndexedDB errore:', e.target.error);
            };
        }
        openMTDatabase();

        function onDBReady(cb) {
            if (window.MT_DB_READY) cb();
            else window.MT_DB_CALLBACKS.push(cb);
        }

        // Salva array transazioni per un account (profilo)
        window.saveTransactionsToDB = function(profileId, transactions) {
            return new Promise(function(resolve, reject) {
                onDBReady(function() {
                    var db = window.MT_DB;
                    var tx = db.transaction('transactions', 'readwrite');
                    var store = tx.objectStore('transactions');
                    // Prima cancella vecchie transazioni di questo profilo
                    var idx = store.index('_profileId');
                    var req = idx.openCursor(IDBKeyRange.only(profileId));
                    var toDelete = [];
                    req.onsuccess = function(e) {
                        var cursor = e.target.result;
                        if (cursor) { toDelete.push(cursor.primaryKey); cursor.continue(); }
                        else {
                            toDelete.forEach(function(k) { store.delete(k); });
                            // Poi inserisci nuove - NON sovrascrivere il campo 'account' (conto bancario)
                            transactions.forEach(function(t) {
                                var obj = Object.assign({}, t);
                                obj._profileId = profileId; // campo separato per indicizzazione
                                store.put(obj);
                            });
                        }
                    };
                    tx.oncomplete = function() { resolve(); };
                    tx.onerror = function(e) { reject(e.target.error); };
                });
            });
        };

        // Carica transazioni per un profilo
        window.loadTransactionsFromDB = function(profileId) {
            return new Promise(function(resolve, reject) {
                onDBReady(function() {
                    var db = window.MT_DB;
                    var tx = db.transaction('transactions', 'readonly');
                    var store = tx.objectStore('transactions');
                    var idx = store.index('_profileId');
                    var req = idx.getAll(IDBKeyRange.only(profileId));
                    req.onsuccess = function(e) { resolve(e.target.result || []); };
                    req.onerror = function(e) { reject(e.target.error); };
                });
            });
        };

        // Cancella tutte le transazioni di un profilo
        window.deleteTransactionsFromDB = function(profileId) {
            return new Promise(function(resolve, reject) {
                onDBReady(function() {
                    var db = window.MT_DB;
                    var tx = db.transaction('transactions', 'readwrite');
                    var store = tx.objectStore('transactions');
                    var idx = store.index('_profileId');
                    var req = idx.openCursor(IDBKeyRange.only(profileId));
                    req.onsuccess = function(e) {
                        var cursor = e.target.result;
                        if (cursor) { cursor.delete(); cursor.continue(); }
                    };
                    tx.oncomplete = function() { resolve(); };
                    tx.onerror = function(e) { reject(e.target.error); };
                });
            });
        };

        // ============ FIRESTORE SYNC ============
        // Salva transazioni su Firestore (chunked, 400 per documento max ~80KB)
        window.syncTransactionsToFirestore = async function(profileId, transactions, uid, sharedProfiles) {
            if (!window.FB_READY || !uid) return;
            const { db, doc, setDoc } = window.FB;
            const isShared = (sharedProfiles || []).includes(profileId);
            const basePath = isShared
                ? ['sharedProfiles', profileId]
                : ['users', uid, 'profiles', profileId];

            const CHUNK = 400;
            const chunks = [];
            for (var i = 0; i < transactions.length; i += CHUNK) {
                chunks.push(transactions.slice(i, i + CHUNK));
            }
            const saves = chunks.map((chunk, idx) =>
                setDoc(doc(db, ...basePath, 'chunks', String(idx)), { transactions: chunk })
            );
            saves.push(setDoc(doc(db, ...basePath), {
                chunkCount: chunks.length,
                updatedAt: Date.now(),
                lastWriterUid: uid,
                uid: uid
            }, { merge: true }));
            await Promise.all(saves);
        };

        // Carica transazioni da Firestore
        window.loadTransactionsFromFirestore = async function(profileId, uid, sharedProfiles) {
            if (!window.FB_READY || !uid) return null;
            const { db, doc, getDoc } = window.FB;
            const isShared = (sharedProfiles || []).includes(profileId);
            const basePath = isShared
                ? ['sharedProfiles', profileId]
                : ['users', uid, 'profiles', profileId];

            try {
                const profileDoc = await getDoc(doc(db, ...basePath));
                if (!profileDoc.exists()) return null;
                const chunkCount = profileDoc.data().chunkCount || 0;
                if (chunkCount === 0) return [];
                const chunkDocs = await Promise.all(
                    Array.from({ length: chunkCount }, function(_, i) {
                        return getDoc(doc(db, ...basePath, 'chunks', String(i)));
                    })
                );
                return chunkDocs.flatMap(function(d) { return d.exists() ? d.data().transactions : []; });
            } catch(e) {
                console.error('loadTransactionsFromFirestore error:', e);
                return null;
            }
        };

        // Salva metadata account su Firestore
        window.syncAccountsToFirestore = async function(uid, accounts, activeAccountId) {
            if (!window.FB_READY || !uid) return;
            const { db, doc, setDoc } = window.FB;
            try {
                await setDoc(doc(db, 'users', uid), {
                    accounts: accounts,
                    activeAccountId: activeAccountId,
                    updatedAt: Date.now()
                }, { merge: true });
            } catch(e) {
                console.error('syncAccountsToFirestore error:', e);
            }
        };

        // Salva budget/settings profilo su Firestore
        window.syncProfileMetaToFirestore = async function(profileId, uid, budgets, settings, sharedProfiles) {
            if (!window.FB_READY || !uid) return;
            const { db, doc, setDoc } = window.FB;
            const isShared = (sharedProfiles || []).includes(profileId);
            const basePath = isShared
                ? ['sharedProfiles', profileId]
                : ['users', uid, 'profiles', profileId];
            try {
                await setDoc(doc(db, ...basePath), {
                    budgets: budgets || {},
                    settings: settings || {},
                    updatedAt: Date.now()
                }, { merge: true });
            } catch(e) {
                console.error('syncProfileMetaToFirestore error:', e);
            }
        };

        // ---- INVITE SYSTEM ----

        // Genera codice invito per un profilo condiviso (valido 7 giorni)
        window.generateInviteCode = async function(profileId, uid) {
            if (!window.FB_READY || !uid) return null;
            const { db, collection, addDoc, query, where, getDocs } = window.FB;
            // Cancella inviti precedenti per questo profilo
            try {
                const q = query(collection(db, 'invites'), where('profileId', '==', profileId), where('ownerId', '==', uid));
                const snap = await getDocs(q);
                snap.forEach(d => window.FB.deleteDoc(d.ref));
            } catch(e) {}
            // Crea nuovo invito
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await addDoc(collection(db, 'invites'), {
                code,
                profileId,
                ownerId: uid,
                createdAt: Date.now(),
                expiresAt: Date.now() + 7 * 24 * 60 * 60 * 1000
            });
            return code;
        };

        // Unisciti a un profilo condiviso con codice invito
        window.joinWithInviteCode = async function(code, uid, userAccounts) {
            if (!window.FB_READY || !uid) return null;
            const { db, collection, query, where, getDocs, doc, getDoc, setDoc } = window.FB;
            const q = query(collection(db, 'invites'), where('code', '==', code.toUpperCase().trim()));
            const snap = await getDocs(q);
            if (snap.empty) throw new Error('Codice non trovato o già usato');
            const invite = snap.docs[0].data();
            if (invite.expiresAt < Date.now()) throw new Error('Codice scaduto (valido 7 giorni)');
            const { profileId } = invite;
            // Ottieni dati profilo dal proprietario
            const ownerUserDoc = await getDoc(doc(db, 'users', invite.ownerId));
            let accountInfo = { id: profileId, name: 'Account condiviso', icon: '👥', color: '#9C27B0', shared: true };
            if (ownerUserDoc.exists()) {
                const ownerAccounts = ownerUserDoc.data().accounts || [];
                const found = ownerAccounts.find(a => a.id === profileId);
                if (found) accountInfo = { ...found, shared: true };
            }
            // Aggiungi uid ai members del profilo condiviso
            const profileRef = doc(db, 'sharedProfiles', profileId);
            const profileSnap = await getDoc(profileRef);
            if (profileSnap.exists()) {
                const members = profileSnap.data().members || [];
                if (!members.includes(uid)) {
                    await setDoc(profileRef, { members: [...members, uid] }, { merge: true });
                }
            } else {
                await setDoc(profileRef, { members: [invite.ownerId, uid], uid: invite.ownerId });
            }
            return accountInfo;
        };

        // Assicura che il creatore del profilo condiviso sia in members
        window.ensureSharedProfileMembers = async function(profileId, uid) {
            if (!window.FB_READY || !uid) return;
            const { db, doc, getDoc, setDoc } = window.FB;
            const ref = doc(db, 'sharedProfiles', profileId);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, { members: [uid], uid });
            } else {
                const members = snap.data().members || [];
                if (!members.includes(uid)) {
                    await setDoc(ref, { members: [...members, uid] }, { merge: true });
                }
            }
        };
    </script>

        function App() {
            // ============ FIREBASE AUTH ============

            // ============ DATI ACCOUNT CORRENTE ============
            const [transactions, setTransactions] = useState([]);
            const [budgets, setBudgets] = useState({});
            const [currentBudgetKey, setCurrentBudgetKey] = useState('');
            const [settings, setSettings] = useState({

            const [selectedAccount, setSelectedAccount] = useState('all');

            const [periodOffset, setPeriodOffset] = useState(0); // 0 = periodo corrente, -1 = precedente, +1 = successivo
            const [customDateRange, setCustomDateRange] = useState({ start: null, end: null });
            const [showModal, setShowModal] = useState(false);

            const [showSettingsModal, setShowSettingsModal] = useState(false);

            const [showEditCategoryModal, setShowEditCategoryModal] = useState(null); // categoryId

            const chartRef = useRef(null);

            // ============ INIT ACCOUNT ============
            useEffect(() => {

                    const defaultAccounts = [

            // Inizializza dati da Firestore al login
            const initFirestoreData = async (firebaseUser) => {

                // Aggiorna sharedProfiles ref basandosi sugli account con shared:true

                    } else {
                        // Primo login: push dati locali → Firestore
                        const savedAccounts = localStorage.getItem('moneyTrackerAccounts');
                        const savedActiveId = localStorage.getItem('moneyTrackerActiveAccount');
                        if (savedAccounts) {
                            await setDoc(doc(db, 'users', firebaseUser.uid), {
                                accounts: JSON.parse(savedAccounts),
                                activeAccountId: savedActiveId,
                                email: firebaseUser.email,

                    // Assicura che l'utente sia registrato come member in tutti i profili condivisi
                    for (const profileId of sharedProfiles.current) {

                    }
                } catch(e) {
                    console.error('initFirestoreData error:', e);
                }
            };

            // ============ DEBITI PERSISTENCE ============
            useEffect(() => {
                const saved = localStorage.getItem('moneyTrackerDebts');
                if (saved) { try { setDebts(JSON.parse(saved)); } catch(e) {} }
            }, []);

            useEffect(() => {
                localStorage.setItem('moneyTrackerDebts', JSON.stringify(debts));
                // Sync Firestore in background
                if (window.FB_READY && userRef.current) {
                    const { db, doc, setDoc } = window.FB;
                    setDoc(doc(db, 'users', userRef.current.uid), { debts, debtsUpdatedAt: Date.now() }, { merge: true })
                        .catch(e => console.error('debts sync error', e));
                }
            }, [debts]);

            const saveDebt = (debtData) => {
                if (debtData.id) {
                    setDebts(prev => prev.map(d => d.id === debtData.id ? debtData : d));
                } else {
                    setDebts(prev => [{ ...debtData, id: Date.now() }, ...prev]);
                }
            };

            const deleteDebt = (debtId) => {
                if (window.confirm('Eliminare questo debito?'))
                    setDebts(prev => prev.filter(d => d.id !== debtId));
            };

            const addDebtPayment = (debtId, amount, note) => {
                setDebts(prev => prev.map(d => {
                    if (d.id !== debtId) return d;
                    const payments = [...(d.payments || []), { date: new Date().toISOString(), amount: parseFloat(amount), note: note || '' }];
                    const paid = payments.reduce((s, p) => s + p.amount, 0);
                    return { ...d, payments, completed: paid >= d.totalAmount };
                }));
            };

            // ============ CARICA DATI ACCOUNT ATTIVO ============
            useEffect(() => {
                if (!activeAccountId) return;
                
                const prefix = `account_${activeAccountId}_`;
                const savedBudgets = localStorage.getItem(prefix + 'budgets');
                const savedSettings = localStorage.getItem(prefix + 'settings');
                
                setBudgets(savedBudgets ? JSON.parse(savedBudgets) : {});
                setSettings(savedSettings ? JSON.parse(savedSettings) : {
                    monthStartDay: 1,
                    weekStartDay: 1,
                    defaultAccount: 'all'
                });
                
                // Carica transazioni da IndexedDB
                isLoadingTransactions.current = true;
                setTransactions([]);
                window.loadTransactionsFromDB(activeAccountId).then(async (txs) => {
                    // Migrazione: se IndexedDB è vuoto, controlla localStorage vecchio
                    if (txs.length === 0) {
                        const old = localStorage.getItem(prefix + 'transactions');
                        if (old) {
                            try {
                                const oldTxs = JSON.parse(old);
                                if (oldTxs.length > 0) {
                                    window.saveTransactionsToDB(activeAccountId, oldTxs).then(() => {
                                        window.deleteTransactionsFromDB(activeAccountId);
                                        isLoadingTransactions.current = false;
                                        setTransactions(oldTxs);
                                    });
                                    return;
                                }
                            } catch(e) {}
                        }
                        // IndexedDB vuoto e localStorage vuoto → prova Firestore
                        if (window.FB_READY && userRef.current) {
                            try {
                                const firestoreTxs = await window.loadTransactionsFromFirestore(
                                    activeAccountId, userRef.current.uid, sharedProfiles.current
                                );
                                if (firestoreTxs && firestoreTxs.length > 0) {
                                    await window.saveTransactionsToDB(activeAccountId, firestoreTxs);
                                    isLoadingTransactions.current = false;
                                    setTransactions(firestoreTxs);
                                    return;
                                }
                            } catch(e) {
                                console.error('Firestore fallback load error:', e);
                            }
                        }
                    }
                    isLoadingTransactions.current = false;
                    setTransactions(txs);
                }).catch((e) => {
                    console.error('Errore caricamento IndexedDB:', e);
                    const old = localStorage.getItem(prefix + 'transactions');
                    setTransactions(old ? JSON.parse(old) : []);
                });
                
                // Reset filtri
                setCategoryFilter(null);
                setTransfersOnlyFilter(false);
                setSelectedAccount('all');
            }, [activeAccountId]);

            // ============ SALVA DATI ACCOUNT ATTIVO ============
            useEffect(() => {
                if (!activeAccountId || transactions.length === 0) return;
                if (isLoadingTransactions.current) return;
                // Salva su IndexedDB (locale)
                window.saveTransactionsToDB(activeAccountId, transactions).catch((e) => {
                    console.error('Errore salvataggio IndexedDB:', e);
