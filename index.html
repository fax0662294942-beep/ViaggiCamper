                // Sync su Firestore in background (se loggato)
                if (window.FB_READY && userRef.current) {
                    window.syncTransactionsToFirestore(
                        activeAccountId, transactions, userRef.current.uid, sharedProfiles.current
                    ).catch(e => console.error('Firestore sync error:', e));
                }
            }, [transactions, activeAccountId]);

            // ============ REAL-TIME LISTENER (profili condivisi) ============
            useEffect(() => {
                // Pulisci listener precedente
                if (snapshotUnsubRef.current) {
                    snapshotUnsubRef.current();
                    snapshotUnsubRef.current = null;
                }
                if (!activeAccountId || !window.FB_READY || !userRef.current) return;
                if (!sharedProfiles.current.includes(activeAccountId)) return; // solo profili condivisi

                const { db, doc, onSnapshot } = window.FB;
                const profileRef = doc(db, 'sharedProfiles', activeAccountId);

                const unsub = onSnapshot(profileRef, async (snapshot) => {
                    if (!snapshot.exists()) return;
                    const data = snapshot.data();
                    // Ignora se siamo stati noi a scrivere (evita loop echo)
                    if (data.lastWriterUid && data.lastWriterUid === userRef.current?.uid) return;
                    if (!data.updatedAt) return;

                    // Ricarica transazioni da Firestore
                    try {
                        const txs = await window.loadTransactionsFromFirestore(
                            activeAccountId, userRef.current.uid, sharedProfiles.current
                        );
                        if (txs && txs.length >= 0) {
                            isLoadingTransactions.current = false;
                            setTransactions(txs);
                            window.saveTransactionsToDB(activeAccountId, txs).catch(() => {});
                        }
                    } catch(e) {
                        console.error('Real-time sync error:', e);
                    }
                });

                snapshotUnsubRef.current = unsub;
                return () => { unsub(); snapshotUnsubRef.current = null; };
            }, [activeAccountId, user]);

            useEffect(() => {
                if (!activeAccountId) return;
                const prefix = `account_${activeAccountId}_`;
                localStorage.setItem(prefix + 'settings', JSON.stringify(settings));
            }, [settings, activeAccountId]);

            // Carica budget del periodo corrente ogni volta che cambia periodo/account/settings
            useEffect(() => {
                if (!activeAccountId || viewMode === 'all' || viewMode === 'custom' || viewMode === 'week') return;
                const { startDate } = getPeriodDates();
                const key = getBudgetKey(startDate);
                if (key === currentBudgetKey) return;
                setCurrentBudgetKey(key);
                setBudgets(getBudgetsForPeriod(startDate));
            }, [activeAccountId, viewMode, periodOffset, settings.monthStartDay]);

            // Funzione per ottenere le date del periodo in base a viewMode e offset
            const getPeriodDates = () => {
                const today = new Date();
                let startDate, endDate;

                if (viewMode === 'all') {
                    return {
                        startDate: new Date(0),
                        endDate: new Date(9999, 11, 31, 23, 59, 59, 999)
                    };
                }

                if (viewMode === 'custom' && customDateRange.start && customDateRange.end) {
                    return {
                        startDate: new Date(customDateRange.start),
                        endDate: new Date(customDateRange.end)
                    };
                }
                
                if (viewMode === 'year') {
                    // Anno solare con offset
                    const year = today.getFullYear() + periodOffset;
                    startDate = new Date(year, 0, 1); // 1 gennaio
                    endDate = new Date(year, 11, 31, 23, 59, 59, 999); // 31 dicembre
                } else if (viewMode === 'week') {
                    // Settimana dal lunedì
                    const currentDay = today.getDay();
                    const daysFromMonday = currentDay === 0 ? 6 : currentDay - 1; // Lunedì = 0
                    
                    startDate = new Date(today);
                    startDate.setDate(today.getDate() - daysFromMonday + (periodOffset * 7));
                    startDate.setHours(0, 0, 0, 0);
                    
                    endDate = new Date(startDate);
                    endDate.setDate(startDate.getDate() + 6);
                    endDate.setHours(23, 59, 59, 999);
                } else {
                    // Mese personalizzato (default)
                    const startDay = settings.monthStartDay;
                    
                    // Calcola il mese con offset
                    let targetDate = new Date(today);
                    targetDate.setMonth(today.getMonth() + periodOffset);
                    
                    if (targetDate.getDate() >= startDay) {
                        startDate = new Date(targetDate.getFullYear(), targetDate.getMonth(), startDay);
                        endDate = new Date(targetDate.getFullYear(), targetDate.getMonth() + 1, startDay - 1);
                    } else {
                        startDate = new Date(targetDate.getFullYear(), targetDate.getMonth() - 1, startDay);
                        endDate = new Date(targetDate.getFullYear(), targetDate.getMonth(), startDay - 1);
                    }
                }
                
                endDate.setHours(23, 59, 59, 999);
                return { startDate, endDate };
            };

            // ============ BUDGET PER PERIODO ============
            // Chiave budget basata sulla data inizio periodo (YYYY-MM-DD)
            const getBudgetKey = (startDate) => {
                if (!startDate) return '';
                const d = startDate instanceof Date ? startDate : new Date(startDate);
                return d.toISOString().split('T')[0];
            };

            const getBudgetsForPeriod = (startDate) => {
                if (!activeAccountId || !startDate) return {};
                const key = `account_${activeAccountId}_budget_${getBudgetKey(startDate)}`;
                try {
                    const stored = localStorage.getItem(key);
                    return stored ? JSON.parse(stored) : {};
                } catch(e) { return {}; }
            };

            const saveBudgetsForPeriod = (startDate, budgetData) => {
                if (!activeAccountId || !startDate) return;
                const key = `account_${activeAccountId}_budget_${getBudgetKey(startDate)}`;
                localStorage.setItem(key, JSON.stringify(budgetData));
            };

            // Ottieni tutte le chiavi budget per questo account
            const getAllBudgetKeys = () => {
                const prefix = `account_${activeAccountId}_budget_`;
                const keys = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k && k.startsWith(prefix)) keys.push(k);
                }
                return keys.sort();
            };

            // Filtra transazioni per conto
            const getFilteredTransactions = () => {
                if (selectedAccount === 'all') {
                    return transactions;
                }
                return transactions.filter(t => t.account === selectedAccount);
            };

            // Calcoli con filtro conto
            const filteredTransactions = getFilteredTransactions();

            // Calcoli mensili con periodo personalizzato
            const getCurrentMonthTransactions = () => {
                const { startDate, endDate } = getPeriodDates();
                
                return filteredTransactions.filter(t => {
                    const tDate = new Date(t.date);
                    return tDate >= startDate && tDate <= endDate;
                });
            };

            // Totali basati sul periodo selezionato (non su tutte le transazioni)
            const periodTransactions = getCurrentMonthTransactions();
            const totalIncome = periodTransactions
                .filter(t => t.type === 'income')
                .reduce((acc, t) => acc + t.amount, 0);
            const totalExpense = periodTransactions
                .filter(t => t.type === 'expense')
                .reduce((acc, t) => acc + t.amount, 0);
            const balance = totalIncome - totalExpense;

            // Funzioni di navigazione periodo
            const goToPreviousPeriod = () => {
                setPeriodOffset(periodOffset - 1);
            };

            const goToNextPeriod = () => {
                setPeriodOffset(periodOffset + 1);
            };

            const goToCurrentPeriod = () => {
                setPeriodOffset(0);
            };

            // ============ SWIPE ORIZZONTALE PER NAVIGARE PERIODI ============
            const swipeContainerRef = React.useRef(null);
            const [swipeAnim, setSwipeAnim] = React.useState(0);
            const swipeState = React.useRef({
                active: false,      // swipe orizzontale confermato
                decided: false,     // abbiamo già deciso orizzontale/verticale
                startX: 0,
                startY: 0,
            });

            React.useEffect(() => {
                const el = swipeContainerRef.current;
                if (!el) return;

                const onStart = (e) => {
                    if (e.touches.length !== 1) return;
                    swipeState.current = {
                        active: false,
                        decided: false,
                        startX: e.touches[0].clientX,
                        startY: e.touches[0].clientY,
                    };
                };

                const onMove = (e) => {
                    if (viewMode === 'all' || viewMode === 'custom') return;
                    const s = swipeState.current;
                    const dx = e.touches[0].clientX - s.startX;
                    const dy = e.touches[0].clientY - s.startY;

                    if (!s.decided) {
                        // Decidi dopo almeno 8px di movimento
                        if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
                        if (Math.abs(dx) > Math.abs(dy)) {
                            s.decided = true;
                            s.active = true;  // è orizzontale
                        } else {
                            s.decided = true;
                            s.active = false; // è verticale, lascia scorrere
                        }
                    }

                    if (!s.active) return;

                    // Blocca lo scroll verticale
                    e.preventDefault();
                    // Feedback visivo con resistenza ai bordi
                    const resistance = 0.35;
                    setSwipeAnim(dx * resistance);
                };

                const onEnd = (e) => {
                    const s = swipeState.current;
                    if (!s.active) { setSwipeAnim(0); return; }
                    const dx = e.changedTouches[0].clientX - s.startX;
                    s.active = false;
                    s.decided = false;
                    setSwipeAnim(0);
                    if (Math.abs(dx) > 50) {
                        if (dx < 0) goToNextPeriod();
                        else goToPreviousPeriod();
                    }
                };

                el.addEventListener('touchstart', onStart, { passive: true });
                el.addEventListener('touchmove', onMove, { passive: false });
                el.addEventListener('touchend', onEnd, { passive: true });

                return () => {
                    el.removeEventListener('touchstart', onStart);
                    el.removeEventListener('touchmove', onMove);
                    el.removeEventListener('touchend', onEnd);
                };
            }, [viewMode, periodOffset, currentPage]);

            const formatPeriodDisplay = () => {
                if (viewMode === 'all') return 'Tutti i movimenti';
                if (viewMode === 'custom' && (!customDateRange.start || !customDateRange.end)) return 'Scegli date...';
                const { startDate, endDate } = getPeriodDates();
                if (viewMode === 'year') return startDate.getFullYear().toString();
                return `${startDate.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' })} - ${endDate.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' })}`;
            };

		    // Focus della schermata categorie: 'expense' (uscite) o 'income' (entrate)
		    const [categoryFocus, setCategoryFocus] = useState('expense');

            const getMonthlyExpensesByCategory = () => {
                const monthlyTransactions = getCurrentMonthTransactions();
                const expenses = {};
                
                monthlyTransactions
                    .filter(t => t.type === 'expense')
                    .forEach(t => {
                        if (!expenses[t.category]) {
                            expenses[t.category] = 0;
                        }
                        expenses[t.category] += t.amount;
                    });
                
                return expenses;
            };

		    const getMonthlyIncomeByCategory = () => {
		        const monthlyTransactions = getCurrentMonthTransactions();
		        const incomes = {};
		        monthlyTransactions
		            .filter(t => t.type === 'income')
		            .forEach(t => {
		                if (!incomes[t.category]) incomes[t.category] = 0;
		                incomes[t.category] += t.amount;
		            });
		        return incomes;
		    };

            const addTransaction = (transaction) => {
                setTransactions([transaction, ...transactions]);
                setShowModal(false);
            };

            const deleteTransaction = (id) => {
                if (window.confirm('Sei sicuro di voler eliminare questa transazione?')) {
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            const editTransaction = (updated) => {
                setTransactions(prev => prev.map(t => t.id === updated.id ? updated : t));
            };

            const setBudget = (category, amount) => {
                const { startDate } = getPeriodDates();
                const newB = { ...budgets, [category]: parseFloat(amount) };
                setBudgets(newB);
                saveBudgetsForPeriod(startDate, newB);
            };

            const setAllBudgets = (newBudgets) => {
                const { startDate } = getPeriodDates();
                setBudgets({ ...newBudgets });
                saveBudgetsForPeriod(startDate, newBudgets);
            };

            const updateSettings = (newSettings) => {
                setSettings({ ...settings, ...newSettings });
                setShowSettingsModal(false);
            };

            // ============ GESTIONE ACCOUNT ============
            const switchAccount = (accountId) => {
                window._activeProfileId = accountId;
                setActiveAccountId(accountId);
                localStorage.setItem('moneyTrackerActiveAccount', accountId);
                setCurrentPage('categories'); // Torna a home quando cambi account
            };

            const getActiveAccount = () => {
                return accounts.find(a => a.id === activeAccountId);
            };

            const createAccount = (accountData) => {
                const newAccount = {
                    id: 'account_' + Date.now(),
                    ...accountData
                };
                const updated = [...accounts, newAccount];
                setAccounts(updated);
                localStorage.setItem('moneyTrackerAccounts', JSON.stringify(updated));
                if (window.FB_READY && userRef.current)
                    window.syncAccountsToFirestore(userRef.current.uid, updated, activeAccountId);
                return newAccount;
            };

            const updateAccount = (accountId, newData) => {
                const updated = accounts.map(a => a.id === accountId ? { ...a, ...newData } : a);
                setAccounts(updated);
                localStorage.setItem('moneyTrackerAccounts', JSON.stringify(updated));
                if (window.FB_READY && userRef.current)
                    window.syncAccountsToFirestore(userRef.current.uid, updated, activeAccountId);
            };

            const deleteAccount = (accountId) => {
                if (accounts.length <= 1) {
                    alert('Non puoi eliminare l\'ultimo account!');
                    return;
                }
                if (!window.confirm('Sei sicuro? Tutti i dati di questo account verranno eliminati!')) return;
                
                // Rimuovi dati account
                const prefix = `account_${accountId}_`;
                window.deleteTransactionsFromDB(accountId);
                localStorage.removeItem(prefix + 'budgets');
                localStorage.removeItem(prefix + 'settings');
                localStorage.removeItem(prefix + 'categoryOrder');
                localStorage.removeItem(prefix + 'customCategories');
                
                // Rimuovi da lista
                const updated = accounts.filter(a => a.id !== accountId);
                setAccounts(updated);
                localStorage.setItem('moneyTrackerAccounts', JSON.stringify(updated));
                if (window.FB_READY && userRef.current)
                    window.syncAccountsToFirestore(userRef.current.uid, updated, activeAccountId);
                
                // Switch a primo account disponibile
                if (activeAccountId === accountId) {
                    switchAccount(updated[0].id);
                }
            };

            // ============ TRASFERIMENTI TRA ACCOUNT ============
            const createTransfer = (transferData) => {
                const { fromAccountId, toAccountId, amount, fromAccountType, toAccountType, note, date } = transferData;
                
                // Crea expense nell'account origine
                const expenseId = Date.now();
                const expense = {
                    id: expenseId,
                    type: 'expense',
                    amount: parseFloat(amount),
                    category: 'other',
                    account: fromAccountType,
                    note: `🔄 Trasferimento → ${accounts.find(a => a.id === toAccountId)?.name || 'Account'} ${note ? '(' + note + ')' : ''}`,
                    date: date,
                    isTransfer: true,
                    transferId: expenseId,
                    linkedAccountId: toAccountId
                };
                
                // Crea income nell'account destinazione
                const income = {
                    id: expenseId + 1,
                    type: 'income',
                    amount: parseFloat(amount),
                    category: 'other',
                    account: toAccountType,
                    note: `🔄 Trasferimento ← ${accounts.find(a => a.id === fromAccountId)?.name || 'Account'} ${note ? '(' + note + ')' : ''}`,
                    date: date,
                    isTransfer: true,
                    transferId: expenseId,
                    linkedAccountId: fromAccountId
                };
                
                // Salva in entrambi gli account tramite IndexedDB
                const loadAndSave = (accountId, newTx) => {
                    return window.loadTransactionsFromDB(accountId).then((existing) => {
                        return window.saveTransactionsToDB(accountId, [newTx, ...existing]);
                    });
                };

                Promise.all([
                    loadAndSave(fromAccountId, expense),
                    loadAndSave(toAccountId, income)
                ]).then(() => {
                    if (activeAccountId === fromAccountId) setTransactions(prev => [expense, ...prev]);
                    else if (activeAccountId === toAccountId) setTransactions(prev => [income, ...prev]);
                });
                
                setShowTransferModal(false);
                alert('✅ Trasferimento completato!');
            };

            // IMPORT DA 1MONEY CSV - versione completa senza perdita dati
            const import1MoneyCSV = (csvText) => {
                try {
                    const lines = csvText.split('\n').filter(line => line.trim());
                    if (lines.length < 2) throw new Error('File CSV vuoto o non valido');

                    // Leggi categorie e conti esistenti
                    const existingCats = getCategoriesFromStorage();
                    const existingAccs = getCustomTransactionAccounts();
                    const newExpenseCats = [];
                    const newIncomeCats = [];
                    const newAccounts = [];

                    // Mappe per lookup rapido nome→id
                    const catExpenseMap = {}; // nome → id
                    const catIncomeMap  = {};
                    const accMap        = {}; // nome → id
                    existingCats.expense.forEach(c => { catExpenseMap[c.name.toLowerCase()] = c.id; });
                    existingCats.income.forEach(c =>  { catIncomeMap[c.name.toLowerCase()]  = c.id; });
                    [...getAccountsFilter()].forEach(a => { accMap[a.name.toLowerCase()] = a.id; });

                    const COLORS = ['#FF6B6B','#4ECDC4','#4DA6FF','#AA96DA','#FFD93D','#95E1D3','#F06292','#BA68C8','#64B5F6','#4DB6AC','#81C784','#FF8A65','#A1887F','#90A4AE','#FFB74D','#AED581','#4CAF50','#FF9800','#E91E63','#9C27B0'];
                    const ACC_COLORS = ['#4CAF50','#2196F3','#FF9800','#E91E63','#9C27B0','#00BCD4','#FF5722','#607D8B','#795548','#FFC107'];
                    let colorIdx = 0;
                    let accColorIdx = 0;

                    // Funzione: trova o crea categoria
                    const getOrCreateCategory = (name, type) => {
                        if (!name || name.trim() === '') return 'other';
                        const key = name.trim().toLowerCase();
                        const map = type === 'income' ? catIncomeMap : catExpenseMap;
                        if (map[key]) return map[key];
                        // Crea nuova categoria
                        const id = 'cat_' + key.replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
                        const icon = type === 'income' ? '💰' : '📦';
                        const color = COLORS[colorIdx++ % COLORS.length];
                        const catObj = { id, name: name.trim(), icon, color, archived: false };
                        map[key] = id;
                        if (type === 'income') newIncomeCats.push(catObj);
                        else newExpenseCats.push(catObj);
                        return id;
                    };

                    // Funzione: trova o crea conto
                    const getOrCreateAccount = (name) => {
                        if (!name || name.trim() === '') return 'cash';
                        const key = name.trim().toLowerCase();
                        if (accMap[key]) return accMap[key];
                        // Crea nuovo conto
                        const id = 'acc_' + key.replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
                        const color = ACC_COLORS[accColorIdx++ % ACC_COLORS.length];
                        const accObj = { id, name: name.trim(), icon: '🏦', color };
                        accMap[key] = id;
                        newAccounts.push(accObj);
                        return id;
                    };

                    const importedTransactions = [];
                    const skippedCount = { trasferimenti: 0, errori: 0 };

                    for (let i = 1; i < lines.length; i++) {
                        try {
                            // Parse CSV robusto (gestisce virgole dentro virgolette)
                            const fields = [];
                            let current = '';
                            let inQuotes = false;
                            const raw = lines[i];
                            for (let j = 0; j < raw.length; j++) {
                                const ch = raw[j];
                                if (ch === '"') {
                                    if (inQuotes && raw[j+1] === '"') { current += '"'; j++; }
                                    else inQuotes = !inQuotes;
                                } else if (ch === ',' && !inQuotes) {
                                    fields.push(current.trim());
                                    current = '';
                                } else {
                                    current += ch;
                                }
                            }
                            fields.push(current.trim());

                            if (fields.length < 5) continue;

                            // Colonne 1Money CSV: Data, Tipologia, Dal conto, Al conto/Categoria, Importo, Valuta, Tasso, Conto2, Tag, Note
                            const data             = fields[0] || '';
                            const tipologia        = fields[1] || '';
                            const dalConto         = fields[2] || '';
                            const alContoCategoria = fields[3] || '';
                            const importo          = fields[4] || '0';
                            const tagRaw           = fields[8] || '';
                            const note             = fields[9] || fields[7] || '';

                            // Salta trasferimenti
                            if (tipologia === 'Trasferimento' || tipologia.toLowerCase().includes('transfer')) {
                                skippedCount.trasferimenti++;
                                continue;
                            }

                            // Parse data (gg/mm/aa o gg/mm/aaaa)
                            let dateObj = new Date();
                            const dateParts = data.split('/');
                            if (dateParts.length === 3) {
                                const giorno = parseInt(dateParts[0]);
                                const mese   = parseInt(dateParts[1]) - 1;
                                const anno   = dateParts[2].length === 2 ? 2000 + parseInt(dateParts[2]) : parseInt(dateParts[2]);
                                dateObj = new Date(anno, mese, giorno);
                            }

                            // Tipo transazione
                            const type = tipologia === 'Entrata' ? 'income' : 'expense';

                            // Estrai categoria (prima delle parentesi) e sottocategoria (dentro parentesi)
                            const catMatch    = alContoCategoria.match(/^([^(]+)/);
                            const catName     = catMatch ? catMatch[1].trim() : alContoCategoria.trim();
                            const subCatMatch = alContoCategoria.match(/\(([^)]+)\)/);
                            const subCat      = subCatMatch ? subCatMatch[1].trim() : '';

                            // Trova o crea categoria
                            const categoryId = getOrCreateCategory(catName, type);

                            // Trova o crea conto
                            const accountId = getOrCreateAccount(dalConto);

                            // Nota: combina sottocategoria + nota originale
                            let finalNote = note || '';
                            if (subCat && subCat.toLowerCase() !== catName.toLowerCase()) {
                                finalNote = subCat + (finalNote ? ' · ' + finalNote : '');
                            }

                            // Tag: possono essere separati da virgola o punto e virgola
                            const tagIds = [];
                            if (tagRaw.trim()) {
                                const tagNames = tagRaw.split(/[,;]/).map(t => t.trim()).filter(Boolean);
                                tagNames.forEach(tagName => {
                                    const tagId = getOrCreateTag(tagName);
                                    if (tagId) tagIds.push(tagId);
                                });
                            }

                            // Importo
                            const amount = Math.abs(parseFloat(importo.replace(',', '.')) || 0);
                            if (amount === 0) continue;

                            importedTransactions.push({
                                id: Date.now() + i + Math.random(),
                                type,
                                amount,
                                category: categoryId,
                                account: accountId,
                                note: finalNote,
                                date: dateObj.toISOString(),
                                tags: tagIds
                            });

                        } catch (err) {
                            console.error('Errore riga', i, err);
                            skippedCount.errori++;
                        }
                    }

                    // Salva nuove categorie
                    if (newExpenseCats.length > 0 || newIncomeCats.length > 0) {
                        saveCategoriestoStorage({
                            expense: [...existingCats.expense, ...newExpenseCats],
                            income:  [...existingCats.income,  ...newIncomeCats]
                        });
                    }

                    // Salva nuovi conti
                    if (newAccounts.length > 0) {
                        saveCustomTransactionAccounts([...existingAccs, ...newAccounts]);
                    }

                    // Aggiungi transazioni (più recenti prima)
                    importedTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setTransactions(prev => [...importedTransactions, ...prev]);

                    // ── PARSING DEBITI (righe finali del CSV) ──
                    // Struttura anomala: nome in col DATA, saldo in col TIPOLOGIA, "EUR" in col DAL CONTO
                    const importedDebts = [];
                    const DEBT_ICONS = {
                        findomestic:'🏦', bbva:'🏦', banca:'🏦', banco:'🏦',
                        valentina:'👤', franco:'👤', cicci:'👤', avvocato:'⚖️',
                        camper:'🚐', fondo:'💰', mutuo:'🏠', casa:'🏠',
                        auto:'🚗', macchina:'🚗', prestito:'💳'
                    };
                    const getDebtIcon = (name) => {
                        const n = name.toLowerCase();
                        for (const [k, icon] of Object.entries(DEBT_ICONS)) {
                            if (n.includes(k)) return icon;
                        }
                        return '💰';
                    };

                    for (let i = 1; i < lines.length; i++) {
                        try {
                            const fields = [];
                            let cur = '', inQ = false;
                            for (let j = 0; j < lines[i].length; j++) {
                                const ch = lines[i][j];
                                if (ch === '"') { if (inQ && lines[i][j+1]==='"'){cur+='"';j++;} else inQ=!inQ; }
                                else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur=''; }
                                else cur += ch;
                            }
                            fields.push(cur.trim());

                            const col0 = fields[0] || ''; // nome del conto/debito
                            const col1 = fields[1] || ''; // saldo (numero)
                            const col2 = fields[2] || ''; // "EUR" o vuoto
                            const col3 = fields[3] || '';

                            // È una riga di saldo se: col2="EUR", col3 vuota, col1 è un numero
                            const isBalanceRow = col2.trim().toUpperCase() === 'EUR' &&
                                                 !col3.trim() &&
                                                 col1.trim() !== '' &&
                                                 !isNaN(parseFloat(col1.replace(',','.')));

                            if (!isBalanceRow) continue;

                            const balance = parseFloat(col1.replace(',','.'));
                            const name = col0.trim();

                            if (!name || balance === 0) continue; // skip vuoti e zero

                            importedDebts.push({
                                id: Date.now() + i,
                                name,
                                type: balance < 0 ? 'devo' : 'mi_devono',
                                totalAmount: Math.abs(balance),
                                payments: [],
                                completed: false,
                                icon: getDebtIcon(name),
                                color: balance < 0 ? '#f44336' : '#4CAF50',
                                startDate: new Date().toISOString(),
                                note: 'Importato da 1Money'
                            });
                        } catch(e) {}
                    }

                    // Merge debiti importati con quelli esistenti (no duplicati per nome)
                    if (importedDebts.length > 0) {
                        setDebts(prev => {
                            const merged = [...prev];
                            importedDebts.forEach(d => {
                                if (!merged.find(e => e.name.toLowerCase() === d.name.toLowerCase())) {
                                    merged.push(d);
                                }
                            });
                            return merged;
                        });
                    }

                    return {
                        success: true,
                        imported: importedTransactions.length,
                        newCategories: newExpenseCats.length + newIncomeCats.length,
                        newAccounts: newAccounts.length,
                        skipped: skippedCount,
                        importedDebts: importedDebts.length
                    };

                } catch (error) {
                    console.error('Errore import CSV:', error);
                    return { success: false, error: error.message };
                }
            };


            // ===== ESPORTA CSV (formato 1Money) =====
            const exportCSV = async () => {
                const profileId = activeAccountId;
                const allTx = await window.loadTransactionsFromDB(profileId);
                const allAccs = getCustomTransactionAccounts();
                const allCats = getCategoriesFromStorage();
                const allTagsList = getTagsFromStorage();

                const getAccName = function(id) {
                    var a = allAccs.find(function(x) { return x.id === id; });
                    return a ? a.name : (id || 'cash');
                };
                const getCatName = function(type, id) {
                    var list = type === 'income' ? allCats.income : allCats.expense;
                    var c = list.find(function(x) { return x.id === id; });
                    return c ? c.name : 'Altro';
                };
                const esc = function(v) {
                    return '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
                };

                var righe = [];
                righe.push([esc('Data'),esc('Tipologia'),esc('Dal conto'),esc('Categoria'),esc('Importo'),esc('Valuta'),esc('Tasso'),esc('Conto2'),esc('Tag'),esc('Note')].join(','));

                allTx.forEach(function(t) {
                    var d = new Date(t.date);
                    var gg = String(d.getDate()).padStart(2,'0');
                    var mm = String(d.getMonth()+1).padStart(2,'0');
                    var yyyy = String(d.getFullYear());
                    var dataStr = gg + '/' + mm + '/' + yyyy;
                    var tipo = t.type === 'income' ? 'Entrata' : 'Uscita';
                    var conto = getAccName(t.account);
                    var cat = getCatName(t.type, t.category);
                    var imp = t.amount.toFixed(2).replace('.', ',');
                    var tags = (t.tags || []).map(function(tid) {
                        var tg = allTagsList.find(function(x) { return x.id === tid; });
                        return tg ? tg.name : tid;
                    }).join(':');
                    var nota = t.note || '';
                    righe.push([esc(dataStr),esc(tipo),esc(conto),esc(cat),esc(imp),esc('EUR'),esc('1'),esc(''),esc(tags),esc(nota)].join(','));
                });

                var csv = '\uFEFF' + righe.join('\r\n');
                var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'moneytracker_' + new Date().toISOString().split('T')[0] + '.csv';
                a.click();
                URL.revokeObjectURL(url);
            };

            // ===== BACKUP COMPLETO JSON =====
            const exportBackup = async () => {
                const profileId = activeAccountId;
                const allTx = await window.loadTransactionsFromDB(profileId);
                const backup = {
                    version: 1,
                    date: new Date().toISOString(),
                    profileId: profileId,
                    transactions: allTx,
                    categories: getCategoriesFromStorage(),
                    accounts: getCustomTransactionAccounts(),
                    budgets: JSON.parse(localStorage.getItem('account_' + profileId + '_budgets') || '{}'),
                    settings: JSON.parse(localStorage.getItem('account_' + profileId + '_settings') || '{}'),
                };
                var json = JSON.stringify(backup, null, 2);
                var blob = new Blob([json], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'backup_' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            // ===== RIPRISTINA BACKUP JSON =====
            const importBackup = function(event) {
                var file = event.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        var backup = JSON.parse(e.target.result);
                        if (!backup.version || !backup.transactions) {
                            alert('File non valido.');
                            return;
                        }
                        var dataStr = new Date(backup.date).toLocaleDateString('it-IT');
                        if (!window.confirm('Ripristinare backup del ' + dataStr + '?\n\nI dati attuali verranno sostituiti!')) return;
                        var profileId = activeAccountId;
                        await window.saveTransactionsToDB(profileId, backup.transactions);
                        if (backup.categories) localStorage.setItem('customCategories_v2', JSON.stringify(backup.categories));
                        if (backup.accounts) localStorage.setItem('customTransactionAccounts_' + profileId, JSON.stringify(backup.accounts));
                        if (backup.budgets) localStorage.setItem('account_' + profileId + '_budgets', JSON.stringify(backup.budgets));
                        if (backup.settings) localStorage.setItem('account_' + profileId + '_settings', JSON.stringify(backup.settings));
                        alert('Backup ripristinato!');
                        window.location.reload();
                    } catch(err) {
                        alert('Errore: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const result = import1MoneyCSV(e.target.result);
                    if (result.success) {
                        let msg = `✅ Import completato!\n\n`;
                        msg += `📥 Transazioni importate: ${result.imported}\n`;
                        if (result.newCategories > 0) msg += `🏷️ Nuove categorie create: ${result.newCategories}\n`;
                        if (result.newAccounts > 0)   msg += `💳 Nuovi conti creati: ${result.newAccounts}\n`;
                        if (result.importedDebts > 0) msg += `📋 Debiti/Crediti importati: ${result.importedDebts}\n`;
                        msg += `⏭️ Trasferimenti saltati: ${result.skipped.trasferimenti}\n`;
                        if (result.skipped.errori > 0) msg += `❌ Righe con errori: ${result.skipped.errori}\n`;
                        if (result.importedDebts > 0) msg += `\n👉 Vai su Conti → Debiti per vederli.`;
                        alert(msg);
                    } else {
                        alert(`❌ Errore durante l'import:\n${result.error}`);
                    }
                };
                reader.readAsText(file);
            };

            // ============ IMPORT SQLITE 1MONEY ============
            const handleSQLiteImport = (file) => {
                return window.import1MoneyDB(file).then((result) => {
                    const existingCats = getCategoriesFromStorage();
                    const mergedExpense = [...existingCats.expense];
                    const mergedIncome = [...existingCats.income];

                    // Mappa: id_importato → id_finale (per correggere le transazioni)
                    const catIdRemap = {};

                    result.categories.expense.forEach(function(cat) {
                        const existing = mergedExpense.find(function(c) {
                            return c.name.trim().toLowerCase() === cat.name.trim().toLowerCase();
                        });
                        if (existing) {
                            catIdRemap[cat.id] = existing.id; // usa l'ID già esistente
                        } else {
                            mergedExpense.push(cat);
                            catIdRemap[cat.id] = cat.id;
                        }
                    });
                    result.categories.income.forEach(function(cat) {
                        const existing = mergedIncome.find(function(c) {
                            return c.name.trim().toLowerCase() === cat.name.trim().toLowerCase();
                        });
                        if (existing) {
                            catIdRemap[cat.id] = existing.id;
                        } else {
                            mergedIncome.push(cat);
                            catIdRemap[cat.id] = cat.id;
                        }
                    });
                    saveCategoriestoStorage({ expense: mergedExpense, income: mergedIncome });

                    const existingAccs = getCustomTransactionAccounts();
                    const mergedAccs = [...existingAccs];
                    result.customAccounts.forEach(function(acc) {
                        if (!mergedAccs.find(function(a) { return a.name === acc.name; })) mergedAccs.push(acc);
                    });
                    saveCustomTransactionAccounts(mergedAccs);

                    // Applica remap categorie alle transazioni importate
                    const remappedTxs = result.transactions.map(function(t) {
                        return catIdRemap[t.category]
                            ? Object.assign({}, t, { category: catIdRemap[t.category] })
                            : t;
                    });

                    setTransactions(function(prev) { return [...remappedTxs, ...prev]; });
                    setCategoriesVersion(function(v) { return v + 1; });

                    return {
                        categories: result.stats.categories,
                        accounts: result.stats.accounts,
                        transactions: result.stats.transactions,
                        skipped: result.stats.skipped
                    };
                });
            };

            // ============ TASTO INDIETRO ANDROID ============
            useEffect(() => {
                let lastBackPress = 0;

                const handleBackButton = (e) => {
                    e.preventDefault();
                    // Reinserisci subito uno stato per la prossima pressione
                    window.history.pushState({ page: 'app' }, '');

                    // Se c'è un modale aperto, chiudilo
                    if (showModal) { setShowModal(false); return; }
                    if (showBudgetModal) { setShowBudgetModal(false); return; }
                    if (showSettingsModal) { setShowSettingsModal(false); return; }
                    if (showAccountModal) { setShowAccountModal(false); return; }
                    if (showTransferModal) { setShowTransferModal(false); return; }
                    if (showSQLiteImportModal) { setShowSQLiteImportModal(false); return; }
                    if (showManageCategoriesModal) { setShowManageCategoriesModal(false); return; }
                    if (showManageAccountsModal) { setShowManageAccountsModal(false); return; }
                    if (showCategoryMenu) { setShowCategoryMenu(null); return; }
                    if (showEditCategoryModal) { setShowEditCategoryModal(null); return; }

                    // Se c'è un filtro categoria attivo, rimuovilo
                    if (categoryFilter) { setCategoryFilter(null); return; }

                    // Naviga tra le pagine: qualsiasi pagina → categories (home)
                    if (currentPage !== 'categories') {
                        setCurrentPage('categories');
                        return;
                    }

                    // Siamo sulla home: doppia pressione per uscire
                    const now = Date.now();
                    if (now - lastBackPress < 2000) {
                        // Lascia uscire l'app
                        window.history.back();
                    } else {
                        lastBackPress = now;
                        // Mostra toast "Premi ancora per uscire"
                        const toast = document.createElement('div');
                        toast.textContent = 'Premi ancora per uscire';
                        toast.style.cssText = `
                            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
                            background: rgba(0,0,0,0.75); color: white; padding: 12px 24px;
                            border-radius: 20px; font-size: 14px; z-index: 99999;
                            animation: fadeIn 0.2s ease;
                        `;
                        document.body.appendChild(toast);
                        setTimeout(() => toast.remove(), 2000);
                    }
                };

                // Aggiungi stato fittizio per intercettare popstate
                window.history.pushState({ page: 'app' }, '');
                window.addEventListener('popstate', handleBackButton);

                return () => {
                    window.removeEventListener('popstate', handleBackButton);
                };
            }, [currentPage, showModal, showBudgetModal, showSettingsModal, showAccountModal,
                showTransferModal, showSQLiteImportModal, showManageCategoriesModal,
                showManageAccountsModal, showCategoryMenu, showEditCategoryModal, categoryFilter]);

                    y: rect.bottom + 5

                customCategories[categoryId] = {

                    ...customData,
                    ...newData

                window.location.reload();
            };

            const exportToExcel = () => {
                let csv = 'Data,Tipo,Categoria,Conto,Importo,Note\n';
                
                filteredTransactions.forEach(t => {
                    const date = new Date(t.date).toLocaleDateString('it-IT');
                    const type = t.type === 'income' ? 'Entrata' : 'Uscita';
                    const cat = getCategoriesFromStorage()[t.type]?.find(c => c.id === t.category);
                    const category = cat ? cat.name : t.category;
                    const acc = getAccountsFilter().find(a => a.id === (t.account || 'cash'));
                    const account = acc ? acc.name : 'Sconosciuto';
                    const amount = t.amount.toFixed(2);
                    const note = t.note || '';
                    
                    csv += `${date},${type},${category},${account},${amount},"${note}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `moneytracker_export_${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Grafico spese per categoria

                if (currentPage === 'stats' && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const expensesByCategory = getMonthlyExpensesByCategory();

                    const labels = Object.keys(expensesByCategory).map(catId => {
                        const cat = getCategoriesFromStorage().expense.find(c => c.id === catId);
                        return cat ? cat.name : catId;
                    });

                    const data = Object.values(expensesByCategory);
                    const colors = Object.keys(expensesByCategory).map(catId => {
                        const cat = getCategoriesFromStorage().expense.find(c => c.id === catId);
                        return cat ? cat.color : '#999';
                    });

                    if (data.length > 0) {
                        chartInstance.current = new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: labels,

		                });

		                const data = Object.values(byCategory);
		                const colors = Object.keys(byCategory).map(catId => {

                                            display: false

                    // Ultimi 6 periodi personalizzati
                    const months = [];
                    const incomeData = [];
                    const expenseData = [];
                    
                    for (let i = 5; i >= 0; i--) {

                        const startDay = settings.monthStartDay;
                        
                        // Calcola il periodo i mesi fa
                        let periodStart, periodEnd;
                        if (today.getDate() >= startDay) {
                            periodStart = new Date(today.getFullYear(), today.getMonth() - i, startDay);
                            periodEnd = new Date(today.getFullYear(), today.getMonth() - i + 1, startDay - 1);
                        } else {
                            periodStart = new Date(today.getFullYear(), today.getMonth() - i - 1, startDay);

                        const periodTransactions = filteredTransactions.filter(t => {

                            return tDate >= periodStart && tDate <= periodEnd;
                        });
                        
                        const income = periodTransactions
                            .filter(t => t.type === 'income')
                            .reduce((acc, t) => acc + t.amount, 0);

                            .filter(t => t.type === 'expense')

                        incomeData.push(income);
                        expenseData.push(expense);

        // ============ ACCOUNTS VIEW ============
        function AccountsView({ transactions, onAdjustBalance, onUpdateAccount, activeProfileId, onAddMovementForAccount, onViewMovementsForAccount }) {
            const [accs, setAccs] = React.useState([]);
            const [selectedAcc, setSelectedAcc] = React.useState(null);
            const [showAdjust, setShowAdjust] = React.useState(false);
            const [showArchived, setShowArchived] = React.useState(false);
            const [draggedId, setDraggedId] = React.useState(null);
            const [dragOverId, setDragOverId] = React.useState(null);
            const touchDrag = React.useRef({ active: false, id: null });
            const [editingAcc, setEditingAcc] = React.useState(null);
            const [accMenu, setAccMenu] = React.useState(null); // {acc, x, y}
            const accPressTimer = React.useRef(null);
            const accLongPressed = React.useRef(false);
            const accPressPos = React.useRef({ x: 0, y: 0 });
            const [accSortMode, setAccSortMode] = React.useState(false);

            const TIPOLOGIE = [
                { id: 'normale', label: 'Normale', icon: '🏦' },
                { id: 'risparmio', label: 'Risparmio', icon: '🐷' },
                { id: 'carta', label: 'Carta', icon: '💳' },
                { id: 'contanti', label: 'Contanti', icon: '💵' },
                { id: 'investimento', label: 'Investimento', icon: '📈' },
                { id: 'debito', label: 'Debito', icon: '⚠️' },
            ];

            const reload = () => setAccs([...getCustomTransactionAccounts()]);

            // Ricarica i conti ogni volta che cambia il profilo attivo
            React.useEffect(() => { reload(); }, [activeProfileId]);

            // Calcola saldo per ogni conto
            const getSaldo = (accId) => {
                return transactions
                    .filter(t => t.account === accId)
                    .reduce((sum, t) => sum + (t.type === 'income' ? t.amount : -t.amount), 0);
            };

            // Saldo totale (solo conti inclusi nel totale, non archiviati)
            const totaleSaldo = accs
                .filter(a => !a.archived && a.includeInTotal !== false)
                .reduce((sum, a) => sum + getSaldo(a.id), 0);

            const activeAccs = accs
                .filter(a => !a.archived)
                .sort((a, b) => (a.order || 999) - (b.order || 999));
            const archivedAccs = accs.filter(a => a.archived);

            // Raggruppa per tipologia
            const byTipologia = {};
            TIPOLOGIE.forEach(t => { byTipologia[t.id] = []; });
            activeAccs.forEach(a => {
                const tip = a.tipologia || 'normale';
                if (!byTipologia[tip]) byTipologia[tip] = [];
                byTipologia[tip].push(a);
            });

            // Drag desktop
            const handleDragStart = (e, id) => { setDraggedId(id); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragOver = (e, id) => { e.preventDefault(); setDragOverId(id); };
            const handleDrop = (e, targetId) => {
                e.preventDefault();
                if (!draggedId || draggedId === targetId) { setDraggedId(null); setDragOverId(null); return; }
                const all = getCustomTransactionAccounts();
                const from = all.findIndex(a => a.id === draggedId);
                const to = all.findIndex(a => a.id === targetId);
                if (from < 0 || to < 0) return;
                const newOrder = [...all];
                const [removed] = newOrder.splice(from, 1);
                newOrder.splice(to, 0, removed);
                newOrder.forEach((a, i) => { a.order = i; });
                saveCustomTransactionAccounts(newOrder);
                reload();
                setDraggedId(null); setDragOverId(null);
            };
            // Touch drag
            const handleTouchStart = (e, id) => { touchDrag.current = { active: true, id }; };
            const handleTouchMove = (e) => {
                if (!touchDrag.current.active) return;
                e.preventDefault();
                const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                const card = el && el.closest('[data-accid]');
                if (card) setDragOverId(card.dataset.accid);
            };
            const handleTouchEnd = () => {
                if (touchDrag.current.active && dragOverId && touchDrag.current.id !== dragOverId) {
                    const all = getCustomTransactionAccounts();
                    const from = all.findIndex(a => a.id === touchDrag.current.id);
                    const to = all.findIndex(a => a.id === dragOverId);
                    if (from >= 0 && to >= 0) {
                        const newOrder = [...all];
                        const [removed] = newOrder.splice(from, 1);
                        newOrder.splice(to, 0, removed);
                        newOrder.forEach((a, i) => { a.order = i; });
                        saveCustomTransactionAccounts(newOrder);
                        reload();
                    }
                }
                touchDrag.current = { active: false, id: null };
                setDraggedId(null); setDragOverId(null);
            };

            const renderAccCard = (acc) => {
                const saldo = getSaldo(acc.id);
                const isDragging = draggedId === acc.id;
                const isOver = dragOverId === acc.id && !isDragging;
                return (
                    <div
                        key={acc.id}
                        data-accid={acc.id}
                        onClick={(e) => {
                            if (accSortMode) return;
                            const rect = e.currentTarget.getBoundingClientRect();
                            setAccMenu({ acc, x: rect.left + rect.width / 2, y: rect.bottom + 5 });
                        }}
                        onTouchStart={(e) => {
                            if (accSortMode) { handleTouchStart(e, acc.id); return; }
                            accPressPos.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                        }}
                        onTouchMove={(e) => {
                            if (accSortMode) { handleTouchMove(e); return; }
                            const t = e.touches[0];
                            if (Math.abs(t.clientX - accPressPos.current.x) > 8 || Math.abs(t.clientY - accPressPos.current.y) > 8) {
                                accLongPressed.current = true; // considera scroll, non tap
                            }
                        }}
                        onTouchEnd={(e) => {
                            if (accSortMode) { handleTouchEnd(e); return; }
                        }}
                        style={{
                            background: 'white',
                            borderRadius: '14px',
                            padding: '14px 16px',
                            marginBottom: '10px',
                            display: 'flex',
                            alignItems: 'center',
                            gap: '14px',
                            boxShadow: '0 2px 8px rgba(0,0,0,0.07)',
                            border: isOver ? '2px dashed #667eea' : '2px solid transparent',
                            transform: isOver ? 'scale(1.02)' : isDragging ? 'scale(0.97)' : 'scale(1)',
                            opacity: isDragging ? 0.4 : 1,
                            cursor: 'pointer',
                            transition: 'transform 0.15s, opacity 0.15s',
                            userSelect: 'none'
                        }}
                    >
                        <div style={{
                            width: '46px', height: '46px', borderRadius: '12px',
                            background: acc.color || '#667eea',
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            fontSize: '22px', flexShrink: 0
                        }}>{acc.icon || '🏦'}</div>
                        <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 'bold', fontSize: '15px' }}>{acc.name}</div>
                            <div style={{ fontSize: '11px', color: '#999', marginTop: '2px' }}>
                                {TIPOLOGIE.find(t => t.id === (acc.tipologia || 'normale'))?.label || 'Normale'}
                            </div>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                            <div style={{ fontWeight: 'bold', fontSize: '16px', color: saldo >= 0 ? '#4CAF50' : '#f44336' }}>
                                {saldo >= 0 ? '' : '-'}€ {Math.abs(saldo).toFixed(2)}
                            </div>
                        </div>
                    </div>
                );
            };

            // Menu contestuale conto
            const AccContextMenu = () => {
                if (!accMenu) return null;
                const { acc, x, y } = accMenu;
                React.useEffect(() => {
                    const close = (e) => setAccMenu(null);
                    const timer = setTimeout(() => document.addEventListener('click', close, { once: true }), 100);
                    return () => { clearTimeout(timer); document.removeEventListener('click', close); };
                }, [accMenu]);
                const menuBtn = (onClick, icon, label) => (
                    <button onClick={onClick} style={{ width:'100%', padding:'12px 16px', border:'none', background:'none', textAlign:'left', cursor:'pointer', display:'flex', alignItems:'center', gap:'12px', fontSize:'14px', transition:'background 0.2s' }}
                        onMouseOver={(e) => e.currentTarget.style.background='#f5f5f5'}
                        onMouseOut={(e) => e.currentTarget.style.background='none'}>
                        <span style={{fontSize:'18px'}}>{icon}</span><span>{label}</span>
                    </button>
                );
                return (
                    <div style={{ position:'fixed', top:y+'px', left:x+'px', transform:'translateX(-50%)', background:'white', borderRadius:'12px', boxShadow:'0 4px 20px rgba(0,0,0,0.25)', zIndex:10000, minWidth:'200px', overflow:'hidden', animation:'menuAppear 0.2s ease-out' }}
                        onClick={(e) => e.stopPropagation()}>
                        <div style={{ padding:'12px 16px', borderBottom:'1px solid #f0f0f0', background:(acc.color||'#667eea')+'20', display:'flex', alignItems:'center', gap:'10px' }}>
                            <span style={{fontSize:'24px'}}>{acc.icon||'🏦'}</span>
                            <span style={{fontWeight:'bold', color:acc.color||'#667eea'}}>{acc.name}</span>
                        </div>
                        <div style={{padding:'8px 0'}}>
                            {menuBtn(() => { setAccMenu(null); onAddMovementForAccount && onAddMovementForAccount(acc.id); }, '➕', 'Aggiungi movimento')}
                            {menuBtn(() => { setAccMenu(null); onViewMovementsForAccount && onViewMovementsForAccount(acc.id); }, '📋', 'Movimenti')}
                            {menuBtn(() => { setAccMenu(null); setEditingAcc(acc); }, '✏️', 'Modifica conto')}
                            {menuBtn(() => { setAccMenu(null); setSelectedAcc(acc); setShowAdjust(true); }, '⚖️', 'Aggiusta saldo')}
                            {menuBtn(() => { setAccMenu(null); setAccSortMode(true); }, '↕️', 'Sposta (riordina)')}
                        </div>
                    </div>
                );
            };

            // Modal dettaglio conto
            const AccDetailModal = () => {
                const [adjustAmt, setAdjustAmt] = React.useState('');
                const [adjustNote, setAdjustNote] = React.useState('');
                const [tab, setTab] = React.useState('detail'); // detail | adjust | edit
                const [editName, setEditName] = React.useState(selectedAcc?.name || '');
                const [editTip, setEditTip] = React.useState(selectedAcc?.tipologia || 'normale');
                const [editInclude, setEditInclude] = React.useState(selectedAcc?.includeInTotal !== false);
                const saldo = getSaldo(selectedAcc?.id);
                const accTx = transactions.filter(t => t.account === selectedAcc?.id)
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .slice(0, 20);

                const saveEdit = () => {
                    const all = getCustomTransactionAccounts();
                    const updated = all.map(a => a.id === selectedAcc.id
                        ? { ...a, name: editName, tipologia: editTip, includeInTotal: editInclude }
                        : a
                    );
                    saveCustomTransactionAccounts(updated);
                    reload();
                    setSelectedAcc(null);
                };

                const archiveAcc = () => {
                    if (!window.confirm(`Archiviare il conto "${selectedAcc.name}"?`)) return;
                    const all = getCustomTransactionAccounts();
                    const updated = all.map(a => a.id === selectedAcc.id ? { ...a, archived: true } : a);
                    saveCustomTransactionAccounts(updated);
                    reload();
                    setSelectedAcc(null);
                };

                const doAdjust = () => {
                    const amt = parseFloat(adjustAmt);
                    if (isNaN(amt) || amt === 0) return;

        function TransactionList({ transactions, onDelete, onEdit, onLongPress }) {
            const [editingTransaction, setEditingTransaction] = React.useState(null);

            const getCategoryInfo = (type, categoryId) => {
                const cats = getCategoriesFromStorage();
                const cat = (cats[type] || []).find(c => c.id === categoryId);
                if (cat) return cat;
                if (categoryId && categoryId.startsWith('imported_cat_')) {
                    return { name: categoryId.replace('imported_cat_', 'Cat.'), icon: '📦', color: '#B0BEC5' };
                }
                return { name: categoryId || 'Sconosciuto', icon: '❓', color: '#999' };
            };

            const getAccountInfo = (accountId) => {
                const allAccs = getAccountsFilter();
                const acc = allAccs.find(a => a.id === accountId);
                return acc || { name: accountId || 'Sconosciuto', icon: '❓' };
            };

            // Long-press logic
            const pressTimer = React.useRef(null);
            const pressStartPos = React.useRef({ x: 0, y: 0 });
            const didLongPress = React.useRef(false);

            const startPress = (e, transaction) => {
                didLongPress.current = false;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                pressStartPos.current = { x: clientX, y: clientY };
                pressTimer.current = setTimeout(() => {
                    didLongPress.current = true;
                    if (navigator.vibrate) navigator.vibrate(40);
                    // Usa il callback esterno se disponibile (evita z-index issues)
                    if (onLongPress) onLongPress(transaction);
                    else setEditingTransaction(transaction);
                }, 500);
            };

            const cancelPress = (e) => {
                if (pressTimer.current) {
                    clearTimeout(pressTimer.current);
                    pressTimer.current = null;
                }
            };

            const movePress = (e) => {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dx = Math.abs(clientX - pressStartPos.current.x);
                const dy = Math.abs(clientY - pressStartPos.current.y);
                // Solo se si sta davvero scrollando (soglia più alta per mobile)
                if (dx > 15 || dy > 15) cancelPress();
            };

            const handleClick = (e) => {
                // Blocca il click normale se era un long-press
                if (didLongPress.current) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            };

            return (
                <>
                <ul className="transaction-list">
                    {transactions.map(transaction => {
                        const category = getCategoryInfo(transaction.type, transaction.category);
                        const account = getAccountInfo(transaction.account || 'cash');
                        return (
                            <li
                                key={transaction.id}
                                className="transaction-item"
                                onMouseDown={e => startPress(e, transaction)}
                                onMouseUp={cancelPress}
                                onMouseLeave={cancelPress}
                                onMouseMove={movePress}
                                onTouchStart={e => startPress(e, transaction)}
                                onTouchEnd={(e) => {
                                    if (didLongPress.current) {
                                        // Era long-press: blocca il click successivo
                                        e.preventDefault();
                                        e.stopPropagation();
                                        didLongPress.current = false;
                                    } else {
                                        // Era tap normale: cancella il timer
                                        cancelPress();
                                    }
                                }}
                                onTouchMove={movePress}
                                onClick={handleClick}
                                style={{ userSelect: 'none', WebkitUserSelect: 'none' }}
                            >
                                <div style={{ display: 'flex', alignItems: 'center', flex: 1 }}>
                                    <div 
                                        className="transaction-icon"
                                        style={{ backgroundColor: category.color + '20' }}
                                    >
                                        {category.icon}
                                    </div>
                                    <div className="transaction-info">
                                        <div className="transaction-category">{category.name}</div>
                                        <div className="transaction-date">
                                            {new Date(transaction.date).toLocaleDateString('it-IT')} • {account.icon} {account.name}
                                        </div>
                                        {transaction.note && (
                                            <div className="transaction-date">{transaction.note}</div>
                                        )}
                                        {transaction.tags && transaction.tags.length > 0 && (
                                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px', marginTop: '3px' }}>
                                                {transaction.tags.map(tagId => {
                                                    const tag = getTagsFromStorage().find(t => t.id === tagId);
                                                    if (!tag) return null;
                                                    return (
                                                        <span key={tagId} style={{
                                                            fontSize: '10px', padding: '1px 7px',
                                                            borderRadius: '10px', background: tag.color + '25',
                                                            color: tag.color, border: '1px solid ' + tag.color + '60',
                                                            fontWeight: 'bold'
                                                        }}>#{tag.name}</span>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div>
                                    <div className={`transaction-amount ${transaction.type}`}>
                                        {transaction.type === 'income' ? '+' : '-'}€ {transaction.amount.toFixed(2)}
                                    </div>
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); onDelete(transaction.id); }}
                                        style={{
                                            background: 'none',
                                            border: 'none',
                                            color: '#f44336',
                                            cursor: 'pointer',
                                            fontSize: '12px',
                                            marginTop: '5px'
                                        }}
                                    >
                                        Elimina
                                    </button>
                                </div>
                            </li>
                        );
                    })}
                </ul>
                {editingTransaction && (
                    <EditTransactionModal
                        transaction={editingTransaction}
                        onClose={() => setEditingTransaction(null)}
                        onSave={(updated) => {
                            if (onEdit) onEdit(updated);
                            setEditingTransaction(null);
                        }}
                        onDelete={(id) => {
                            onDelete(id);
                            setEditingTransaction(null);
                        }}
                    />
                )}
                </>
            );
        }

                    type,

                    account,
                    note,
                    date: new Date(date).toISOString(),
                    tags: selectedTags

                setSelectedTags(prev =>
                    prev.includes(tagId) ? prev.filter(t => t !== tagId) : [...prev, tagId]

            const handleAddNewTag = () => {
                if (!newTagInput.trim()) return;
                const tagId = getOrCreateTag(newTagInput.trim());
                if (tagId && !selectedTags.includes(tagId)) {
                    setSelectedTags(prev => [...prev, tagId]);

                    account,
                    note,
                    date: new Date(date).toISOString(),

                setSelectedTags(prev =>

                if (!newTagInput.trim()) return;
                const tagId = getOrCreateTag(newTagInput.trim());

                                            <div className="category-icon">{cat.icon}</div>
                                            <div className="category-name">{cat.name}</div>
