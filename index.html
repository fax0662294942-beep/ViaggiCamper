<style>
:root{
  --bg:#0c1210; --bg2:#101a16; --card:#16201c; --card2:#1c2a24;
  --border:#243028; --border2:#2e3e36;
  --primary:#4fd8b4; --primary-dim:#2a9e80; --primary-faint:rgba(79,216,180,0.08);
  --accent:#f0a045; --accent-faint:rgba(240,160,69,0.10);
  --red:#f06060; --red-faint:rgba(240,96,96,0.10);
  --green:#52d68a;
  --text:#d8eee4; --text2:#8aaa96; --text3:#4a6a58;
  --col-s0:#18281e; --col-s1:#1c2e24; /* struttura */
  --col-v0:#18222a; --col-v1:#1c2832; /* viaggio */
  --col-c0:#26201a; --col-c1:#2c261e; /* cibo */
  --col-p0:#2a1c1a; --col-p1:#301e1c; /* pagamento */
  --col-b0:#1e2820; --col-b1:#223020; /* budget/calc */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
h1,h2,h3,.syne{font-family:'Syne',sans-serif}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Layout ── */
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;gap:12px}
.app-header .logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--primary);letter-spacing:.5px;display:flex;align-items:center;gap:8px;white-space:nowrap}
.app-header .logo span{opacity:.5;font-weight:400}
.header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.container{padding:20px;max-width:1600px;margin:0 auto}

/* ── Buttons ── */
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;transition:opacity .15s,transform .1s;font-size:13px;font-weight:500}
button:active{transform:scale(.97)}
.btn{background:var(--card2);color:var(--text);padding:8px 14px;border:1px solid var(--border2)}
.btn:hover{border-color:var(--primary-dim);color:var(--primary)}
.btn-primary{background:var(--primary-dim);color:#fff;padding:8px 16px;font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-accent{background:var(--accent);color:#0c1210;padding:8px 14px;font-weight:600}
.btn-accent:hover{opacity:.85}
.btn-danger{background:var(--red-faint);color:var(--red);padding:8px 14px;border:1px solid rgba(240,96,96,.2)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-icon{background:var(--card2);color:var(--text2);padding:7px 10px;border:1px solid var(--border);font-size:15px}
.btn-icon:hover{color:var(--primary);border-color:var(--primary-dim)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-tab{background:transparent;color:var(--text2);padding:8px 16px;border-radius:8px;border:1px solid transparent}
.btn-tab.active{background:var(--primary-faint);color:var(--primary);border-color:var(--primary-dim)}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:16px}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.card-sm{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px}

/* ── Trip cards (home) ── */
.trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:16px}
.trip-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 18px 14px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
.trip-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary-dim),var(--accent))}
.trip-card:hover{border-color:var(--primary-dim);transform:translateY(-2px)}
.trip-card-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:6px;color:var(--text)}
.trip-card-meta{color:var(--text2);font-size:12px;display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.trip-card-budget{font-size:13px;display:flex;align-items:baseline;gap:6px}
.trip-card-budget strong{font-family:'Syne',sans-serif;font-size:18px;color:var(--primary)}
.trip-card-actions{display:flex;gap:6px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.new-card{border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Syne',sans-serif;font-weight:600;color:var(--text3);transition:all .2s;min-height:130px}
.new-card:hover{border-color:var(--primary-dim);color:var(--primary);background:var(--primary-faint)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-bg{align-items:center}}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:18px 18px 0 0;width:100%;max-height:90vh;overflow:auto;animation:slideUp .2s ease}
@media(min-width:600px){.modal-box{border-radius:18px;animation:fadeIn .18s ease}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.modal-header h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.modal-body{padding:20px}
.close-btn{background:var(--card2);border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.close-btn:hover{color:var(--text)}

/* ── Forms ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label,.field-label{font-size:12px;color:var(--text2);font-weight:500}
.field input,.field-input{background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;width:100%}
.field input:focus,.field-input:focus{outline:none;border-color:var(--primary-dim)}
.field input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5)}

/* ── Stats panel ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:12px 0}
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:4px}
.stat-icon{font-size:18px;line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.stat-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.stat-val.pos{color:var(--green)}
.stat-val.neg{color:var(--red)}
.stat-val.accent{color:var(--accent)}
.stat-val.primary{color:var(--primary)}

/* ── Section title ── */
.section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Tappe list ── */
/* ── Tappa budget chain ── */
.tappa-chain{display:flex;flex-direction:column;gap:0;margin-bottom:16px}
.tappa-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:8px}
.tappa-item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px 14px 8px}
.tappa-info{flex:1}
.tappa-name{font-weight:600;font-size:13px}
.tappa-meta{font-size:12px;color:var(--text2);margin-top:3px}
.tappa-budget-bar{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border)}
.tappa-budget-cell{padding:8px 10px;display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--border)}
.tappa-budget-cell:last-child{border-right:none}
.tbc-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.tbc-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.tbc-val.pos{color:var(--green)}
.tbc-val.neg{color:var(--red)}
.tbc-val.primary{color:var(--primary)}
.tbc-val.muted{color:var(--text2);font-size:12px;font-weight:400;font-family:inherit}
.tappa-budget-input{
  background:transparent;border:none;border-bottom:1px dashed var(--border2);
  color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  width:100%;padding:2px 0;
}
.tappa-budget-input:focus{outline:none;border-bottom-color:var(--primary-dim)}
.tappa-riporto{text-align:center;padding:2px 0 6px;font-size:11px;color:var(--text3)}
.budget-unallocated{
  background:var(--accent-faint);border:1px solid rgba(240,160,69,.25);border-radius:10px;
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-top:8px;
}
.badge{display:inline-block;background:var(--primary-faint);color:var(--primary);border:1px solid rgba(79,216,180,.2);border-radius:5px;padding:1px 7px;font-size:11px;font-weight:600}
.badge.accent{background:var(--accent-faint);color:var(--accent);border-color:rgba(240,160,69,.2)}

/* ── Budget chart ── */
.chart-wrap{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;margin:12px 0}
.chart-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}

/* ── Grid ── */
.grid-wrap{overflow:auto;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-top:12px;max-height:calc(100vh - 280px)}
.data-grid{display:grid;min-width:max-content}
.cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 8px;display:flex;align-items:center;justify-content:center;font-size:12px;min-height:34px}
.cell.sticky-l{position:sticky;left:0;z-index:4;background:inherit}
.cell.sticky-l2{position:sticky;left:180px;z-index:4;background:inherit}
.cell.label-cell{justify-content:flex-start;font-size:12px;font-weight:500;color:var(--text2);padding-left:12px;min-width:180px}
.cell.total-cell{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:var(--primary);min-width:90px}
.cell.col-head{flex-direction:column;gap:1px;font-size:11px;font-weight:600;background:var(--card2);color:var(--text2)}
.cell.col-head strong{color:var(--text);font-size:12px}
.cell.input-cell{padding:0}
.cell.input-cell input{width:100%;height:100%;min-width:88px;background:transparent;border:none;color:var(--text);font-size:12px;font-family:inherit;text-align:center;padding:0 4px}
.cell.input-cell input:focus{outline:none;background:rgba(79,216,180,.05)}
.cell.input-cell input[type=text]{text-align:left;padding-left:6px}
.cell.input-cell input::placeholder{color:var(--text3);font-style:italic;font-size:11px}
.cell.derived{font-family:'Syne',sans-serif;font-size:12px;font-weight:600}
.cell.derived.neg{color:var(--red)}
.cell.derived.pos{color:var(--green)}
.group-sep{grid-column:1/-1;height:3px;background:var(--bg2);border-bottom:1px solid var(--border)}

/* ── Tappa calc summary ── */
.tappa-summary{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;flex-wrap:wrap;gap:14px;margin:14px 0 0;font-size:13px}
.tappa-summary>div{display:flex;flex-direction:column;gap:2px}
.tappa-summary span{font-size:11px;color:var(--text2)}
.tappa-summary strong{font-family:'Syne',sans-serif;font-size:15px}
.tappa-summary strong.accent{color:var(--accent)}
.tappa-summary strong.primary{color:var(--primary)}

/* ── Empty / Loading ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* ── Misc ── */
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.grow{flex:1}
.text-muted{color:var(--text2)}
.divider{height:1px;background:var(--border);margin:16px 0}
.collapse-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;padding:2px 6px;font-family:'Noto Sans',sans-serif}
.collapse-btn:hover{color:var(--primary)}

/* ── Toast ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(30,40,35,.95);border:1px solid var(--border2);
  color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;
  z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Panoramica view ── */
.pan-wrap{overflow-x:auto;margin-top:8px;border-radius:14px;border:1px solid var(--border)}
.pan-table{border-collapse:collapse;min-width:100%;background:var(--card)}
.pan-table th{
  background:var(--card2);padding:6px 10px;font-size:10px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;color:var(--text3);
  border-bottom:2px solid var(--border2);white-space:nowrap;text-align:center;
}
.pan-table th.sticky-col{text-align:left;position:sticky;left:0;z-index:3;background:var(--card2)}
.pan-table th.th-date{min-width:110px}
.pan-table td{
  border-bottom:1px solid var(--border);border-right:1px solid var(--border);
  padding:0;white-space:nowrap;
}
.pan-table td.sticky-col{
  position:sticky;left:0;z-index:2;background:var(--card);
  border-right:2px solid var(--border2);
}
.pan-table tr:last-child td{border-bottom:none}
.pan-table tr:hover td{background:rgba(79,216,180,.03)}
.pan-table tr:hover td.sticky-col{background:var(--card)}

/* date cell */
.pan-date-cell{
  display:flex;align-items:center;gap:8px;padding:0 10px;
  cursor:pointer;user-select:none;min-height:42px;
}
.pan-date-cell:active{opacity:.7}
.pan-gnum{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--primary);min-width:24px}
.pan-dow{font-size:11px;color:var(--text3);min-width:22px}
.pan-d{font-size:12px;color:var(--text2);min-width:32px}
.pan-where{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;max-width:120px}
.pan-where.empty{color:var(--text3);font-style:italic}

/* amount cell */
.pan-amt{
  min-width:68px;height:42px;display:flex;align-items:center;justify-content:center;
  font-size:12px;cursor:pointer;transition:filter .12s;position:relative;
}
.pan-amt:active{filter:brightness(1.3)}
.pan-amt.zero{color:var(--text3);font-size:10px}
.pan-amt.has-val{font-weight:600}
/* category color bands */
.pan-amt.cat-struttura{background:rgba(24,40,30,.6);color:#7ec8a0}
.pan-amt.cat-struttura.has-val{background:rgba(24,40,30,1)}
.pan-amt.cat-viaggio{background:rgba(24,34,42,.6);color:#7ab0d4}
.pan-amt.cat-viaggio.has-val{background:rgba(24,34,42,1)}
.pan-amt.cat-cibo{background:rgba(38,32,26,.6);color:#d4a47a}
.pan-amt.cat-cibo.has-val{background:rgba(38,32,26,1)}
/* km special */
.pan-amt.cat-km{background:rgba(24,34,42,.6);color:#7ab0d4}
.pan-amt.cat-km.has-val{background:rgba(18,26,36,1);color:#9bc8e8}

/* total cell */
.pan-total-cell{
  height:42px;padding:0 10px;display:flex;align-items:center;gap:6px;
  cursor:pointer;border-left:2px solid var(--border2);
}
.pan-total-bar{height:6px;border-radius:3px;background:var(--accent);opacity:.7;min-width:2px;max-width:80px;transition:width .2s}
.pan-total-num{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent);min-width:48px;text-align:right}
.pan-total-num.zero{color:var(--text3);font-weight:400}

/* budget residuo cell */
.pan-budget-cell{
  height:42px;padding:0 10px;display:flex;align-items:center;justify-content:flex-end;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:600;min-width:72px;
}
.pan-budget-cell.pos{color:var(--green)}
.pan-budget-cell.neg{color:var(--red)}

/* totals row */
.pan-table tfoot td{
  background:var(--card2);border-top:2px solid var(--border2);
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text);
  padding:8px 10px;text-align:center;
}
.pan-table tfoot td.sticky-col{background:var(--card2);text-align:left;color:var(--text2);font-size:11px}

/* summary/flow cells */
.pan-flow-cell{
  height:42px;padding:0 8px;display:flex;align-items:center;justify-content:flex-end;
  font-size:12px;font-weight:600;min-width:62px;cursor:pointer;
  font-family:'Syne',sans-serif;
}
.pan-flow-cell.day{color:var(--accent)}
.pan-flow-cell.day.zero{color:var(--text3);font-weight:400;font-family:inherit}
.pan-flow-cell.prog{color:var(--text2);font-size:11px;font-weight:500;font-family:inherit}
.pan-flow-cell.cassa-day{color:#c0d080}
.pan-flow-cell.cassa-day.zero{color:var(--text3);font-weight:400}
.pan-flow-cell.cassa-prog{color:var(--text3);font-size:11px;font-weight:500;font-family:inherit}
.pan-flow-cell.budget-pos{color:var(--green)}
.pan-flow-cell.budget-neg{color:var(--red)}
th.th-group-sep{border-left:2px solid var(--border2)!important}

.pan-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;padding:2px 4px}
.pan-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.pan-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── Delta view ── */
.delta-wrap{margin-top:8px;display:flex;flex-direction:column;gap:14px}
.delta-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.delta-table th{
  background:var(--card2);padding:8px 12px;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;color:var(--text3);
  border-bottom:2px solid var(--border2);text-align:right;
}
.delta-table th:first-child{text-align:left}
.delta-table td{
  padding:8px 12px;font-size:13px;border-bottom:1px solid var(--border);
  text-align:right;
}
.delta-table td:first-child{text-align:left;font-weight:500;color:var(--text2)}
.delta-table tr:last-child td{border-bottom:none}
.delta-table tr.total-row td{
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  background:var(--card2);border-top:2px solid var(--border2);color:var(--text);
}
.delta-table tr.total-row td:first-child{color:var(--text)}
.delta-col-prev{color:var(--text2)}
.delta-col-cons{color:var(--text)}

<script>
// ── Back handler system ───────────────────────────────────────────────────
// Stack of close-functions; topmost is called on Android back press.
window._backStack = [];
let _lastBackTime = 0;
let _toastTimer   = null;

function _showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove("show"), 2000);
}

// Always keep one extra history entry so popstate always fires before leaving
window.history.pushState({camper:true}, "");

window.addEventListener("popstate", function(){
  // Re-push so there's always something to intercept next time
  window.history.pushState({camper:true}, "");
  if(window._backStack.length > 0){
    window._backStack[window._backStack.length - 1]();
  } else {
    // Home screen: double-back to exit
    const now = Date.now();
    if(now - _lastBackTime < 2200){
      // Try to close/exit — on Android PWA go back past all our injected states
      window.history.go(-window.history.length);
      setTimeout(()=>window.close(), 100);
    } else {
      _lastBackTime = now;
      _showToast("🔙 Premi ancora per uscire");
    }
  }
});
</script>

function hexRgb(h){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'79,216,180';}

// ── Back hook ──────────────────────────────────────────────────────────────
// Each component that "owns" a back action registers here.
// The hook stacks/unstacks automatically on mount/unmount.
function useBack(fn){
  const fnRef = React.useRef(fn);
  fnRef.current = fn; // always up to date without re-registering
  React.useEffect(()=>{
    const handler = ()=> fnRef.current();
    window._backStack.push(handler);
    return ()=>{
      const idx = window._backStack.lastIndexOf(handler);
      if(idx !== -1) window._backStack.splice(idx, 1);
    };
  }, []); // register once on mount, remove on unmount
}

// ── Constants ──────────────────────────────────────────────────────────────
const SK = "viaggi_camper_v4";
const MAX_DAYS = 90;

// ── Utils ──────────────────────────────────────────────────────────────────
const diffInclusive = (s,e) => {
  if(!s||!e) return 0;
  return Math.max(0, Math.round((new Date(e+"T12:00:00")-new Date(s+"T12:00:00"))/86400000)+1);
};
const addDays = (d,n) => { const dt=new Date(d+"T12:00:00"); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };
const fmtShort = d => { if(!d) return ""; const [,m,dd]=d.split("-"); return `${dd}/${m}`; };
const fmtDate  = d => { if(!d) return ""; const [y,m,dd]=d.split("-"); return `${dd}/${m}/${y}`; };
const n = v => +(v||0);
const fmt2 = v => v.toFixed(2);
const fmtH = h => { if(h==null||isNaN(h)) return ""; const s=h<0?"-":"",a=Math.abs(h); return `${s}${Math.floor(a)}h ${Math.floor((a%1)*60)}m`; };

// ── Data ───────────────────────────────────────────────────────────────────
const makeDay = date => ({
  date, idTappa:"", luogo:"", struttura:"",
  piazzola:0, tassa:0, extraStruttura:0, pagamentoManual:"",
  benzina:0, gasolio:0, pedaggi:0, km:0, velocita:0,
  spesa:0, cena:0, colazione:0, extraVar:0
});
const buildDays = (s,e,old=[]) => {
  const cnt = Math.min(MAX_DAYS, diffInclusive(s,e));
  return Array.from({length:cnt},(_,i) => {
    const date = addDays(s,i), prev=old.find(d=>d.date===date);
    return prev ? {...makeDay(date),...prev} : makeDay(date);
  });
};
const createTrip = ({nome,budget,startDate,endDate,veicolo="",consumoMedio:cm=0,prezzoCarburante:pc=0,status='ipotesi',gruppo=''}) => {
  const days = buildDays(startDate,endDate,[]);
  return {
    id: Date.now()+(Math.random()*999|0), nome,
    budget:n(budget), startDate, endDate,
    veicolo, consumoMedio:n(cm), prezzoCarburante:n(pc),
    status, gruppo,
    preventivo: days, consuntivo: days.map(d=>({...d})),
    tappe:[]
  };
};

// ── Row definitions ─────────────────────────────────────────────────────────
const ROWS = [
  {key:"idTappa",        label:"ID tappa",            type:"text",   group:"struttura"},
  {key:"luogo",          label:"Luogo",               type:"text",   group:"struttura"},
  {key:"struttura",      label:"Struttura",           type:"text",   group:"struttura"},
  {key:"piazzola",       label:"Piazzola €",          type:"num",    group:"struttura"},
  {key:"tassa",          label:"Tassa soggiorno €",   type:"num",    group:"struttura"},
  {key:"extraStruttura", label:"Extra struttura €",   type:"num",    group:"struttura"},
  {key:"pagamentoManual",label:"Pag. manuale € *",    type:"numopt", group:"struttura"},
  {key:"benzina",        label:"Benzina €",           type:"num",    group:"viaggio"},
  {key:"gasolio",        label:"Gasolio €",           type:"num",    group:"viaggio"},
  {key:"pedaggi",        label:"Pedaggi €",           type:"num",    group:"viaggio"},
  {key:"km",             label:"KM",                  type:"num",    group:"viaggio"},
  {key:"velocita",       label:"Velocità media",      type:"num",    group:"viaggio"},
  {key:"spesa",          label:"Spesa €",             type:"num",    group:"cibo"},
  {key:"cena",           label:"Cena €",              type:"num",    group:"cibo"},
  {key:"colazione",      label:"Colazione €",         type:"num",    group:"cibo"},
  {key:"extraVar",       label:"Extra €",             type:"num",    group:"cibo"},
];
const GROUP_COLS = {struttura:["--col-s0","--col-s1"], viaggio:["--col-v0","--col-v1"], cibo:["--col-c0","--col-c1"]};

// ── Calcs ──────────────────────────────────────────────────────────────────
const calcPagamento = (days,idx) => {
  const d=days[idx]; if(!d) return 0;
  const base = n(d.pagamentoCheckoutPrev||0); // checkout tappa precedente sullo stesso giorno
  if(!d.idTappa) return base + n(d.pagamentoManual);
  const next=days[idx+1];
  // Non sparare se il giorno dopo ha già memorizzato il nostro checkout (prevIdTappa)
  // evita il doppio conteggio sul giorno condiviso checkout/checkin
  const isLastDay = next?.idTappa !== d.idTappa && next?.prevIdTappa !== d.idTappa;
  if(isLastDay){
    const sum=days.reduce((a,x)=>x.idTappa===d.idTappa?a+n(x.piazzola)+n(x.tassa):a,0);
    return base + n(d.pagamentoManual!==""?d.pagamentoManual:sum);
  }
  return base + n(d.pagamentoManual);
};
const calcCosto = d => ["piazzola","tassa","extraStruttura","benzina","gasolio","pedaggi","spesa","cena","colazione","extraVar"].reduce((a,k)=>a+n(d[k]),0);
// extraStruttura pagata ogni giorno, piazzola+tassa al checkout tramite calcPagamento
const calcCassa = (days,idx) => { const d=days[idx]; return calcPagamento(days,idx)+["extraStruttura","benzina","gasolio","pedaggi","spesa","cena","colazione","extraVar"].reduce((a,k)=>a+n(d[k]),0); };
const calcBudgetSeries = (days,budget) => { let c=n(budget); return days.map((_,i)=>{c-=calcCassa(days,i);return c;}); };
const calcTempoNum = d => n(d.velocita)>0 ? n(d.km)/n(d.velocita) : null;

const getStats = (data, budget) => {
  const bdg = calcBudgetSeries(data, budget);
  return {
    giorni:  data.length,
    km:      data.reduce((a,d)=>a+n(d.km),0),
    guida:   data.reduce((a,d)=>a+(calcTempoNum(d)||0),0),
    notti:   data.filter(d=>d.idTappa||n(d.piazzola)>0).length,
    struttura: data.reduce((a,d)=>a+n(d.piazzola)+n(d.tassa)+n(d.extraStruttura),0),
    carburante:data.reduce((a,d)=>a+n(d.benzina)+n(d.gasolio),0),
    pedaggi:   data.reduce((a,d)=>a+n(d.pedaggi),0),
    vitto:   data.reduce((a,d)=>a+n(d.spesa)+n(d.cena)+n(d.colazione),0),
    extra:   data.reduce((a,d)=>a+n(d.extraVar),0),
    totale:  data.reduce((a,d)=>a+calcCosto(d),0),
    residuo: bdg.length ? bdg[bdg.length-1] : n(budget),
    media:   data.length ? data.reduce((a,d)=>a+calcCosto(d),0)/data.length : 0,
    bdgSeries: bdg
  };
};

// ── CSV Export ─────────────────────────────────────────────────────────────
const exportCSV = (viaggio, tab) => {
  const data = viaggio[tab];
  const bdg  = calcBudgetSeries(data, viaggio.budget);
  const hdr  = ["Data",...ROWS.map(r=>r.label),"Pagamento €","Costo €","Spesa Cassa €","Budget €"];
  const rows = data.map((d,i) => [
    d.date, ...ROWS.map(r=>d[r.key]??""),
    fmt2(calcPagamento(data,i)), fmt2(calcCosto(d)), fmt2(calcCassa(data,i)), fmt2(bdg[i])
  ]);
  const csv = [hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const a   = document.createElement("a");
  a.href    = URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download= `${viaggio.nome}_${tab}.csv`;
  a.click();
};

// ── Reusable components ────────────────────────────────────────────────────
function Modal({title, onClose, children, width="520px"}){
  useBack(onClose);
  React.useEffect(()=>{
    const fn=e=>e.key==="Escape"&&onClose();
    window.addEventListener("keydown",fn);
    return ()=>window.removeEventListener("keydown",fn);
  },[]);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" style={{maxWidth:width}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h3>{title}</h3>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

function NumField({label, value, onChange, placeholder="0"}){

// ── Budget Chart ───────────────────────────────────────────────────────────
function BudgetChart({days, budget}){
  const series = calcBudgetSeries(days, budget);
  if(series.length < 2) return null;
  const W=800,H=180,PL=68,PR=30,PT=18,PB=36;
  const cW=W-PL-PR, cH=H-PT-PB;
  const maxV=Math.max(n(budget),...series), minV=Math.min(0,...series);
  const rng=maxV-minV||1;
  const toX=i=>PL+(i/(series.length-1))*cW;
  const toY=v=>PT+(1-(v-minV)/rng)*cH;
  const zY=toY(0);
  const pts=series.map((v,i)=>`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(" ");
  const area=`M ${toX(0).toFixed(1)},${toY(series[0]).toFixed(1)} `+
    series.slice(1).map((v,i)=>`L ${toX(i+1).toFixed(1)},${toY(v).toFixed(1)}`).join(" ")+
    ` L ${toX(series.length-1).toFixed(1)},${(PT+cH).toFixed(1)} L ${toX(0).toFixed(1)},${(PT+cH).toFixed(1)} Z`;
  const step=Math.max(1,Math.ceil(series.length/10));
  const lblIdx=series.map((_,i)=>(i%step===0||i===series.length-1)?i:-1).filter(i=>i>=0);
  const lastV=series[series.length-1];
  const yLabels=[];
  [maxV,0,minV<0?minV:null].filter(v=>v!=null).forEach((v,i)=>{
    yLabels.push({v,y:toY(v),neg:v<0});
  });
  return (
    <div className="chart-wrap no-print" style={{display:"block"}}>
      <div className="chart-title">Andamento budget</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#4fd8b4" stopOpacity="0.25"/>
            <stop offset="100%" stopColor="#4fd8b4" stopOpacity="0.0"/>
          </linearGradient>
          <linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f06060" stopOpacity="0.18"/>
            <stop offset="100%" stopColor="#f06060" stopOpacity="0.0"/>
          </linearGradient>
        </defs>
        {/* Grid lines */}
        {[0,.25,.5,.75,1].map((f,i)=>(
          <line key={i} x1={PL} y1={PT+f*cH} x2={W-PR} y2={PT+f*cH} stroke="rgba(255,255,255,.04)" strokeWidth="1"/>
        ))}
        {/* Zero line */}
        {minV<0 && <line x1={PL} y1={zY} x2={W-PR} y2={zY} stroke="#f06060" strokeDasharray="5,4" strokeWidth="1.5" opacity=".7"/>}
        {/* Area */}
        <path d={area} fill={lastV>=0?"url(#cg)":"url(#cg2)"}/>
        {/* Line */}
        <polyline points={pts} fill="none" stroke={lastV>=0?"#4fd8b4":"#f06060"} strokeWidth="2.5" strokeLinejoin="round"/>
        {/* Dots at each point */}
        {series.map((v,i)=>(
          <circle key={i} cx={toX(i)} cy={toY(v)} r="2.5" fill={v>=0?"#4fd8b4":"#f06060"}/>
        ))}
        {/* X labels */}
        {lblIdx.map(i=>(
          <text key={i} x={toX(i)} y={H-6} textAnchor="middle" fontSize="10" fill="#4a6a58">{fmtShort(days[i].date)}</text>
        ))}
        {/* Y labels */}
        {yLabels.map(({v,y,neg},i)=>(
          <text key={i} x={PL-6} y={y+3.5} textAnchor="end" fontSize="10" fill={neg?"#f06060":"#4a6a58"}>
            {v>=0?`€${Math.round(v)}`:`-€${Math.abs(Math.round(v))}`}
          </text>
        ))}
        {/* Last value label */}
        <text x={toX(series.length-1)+8} y={toY(lastV)+4} fontSize="11" fontWeight="700"
          fill={lastV>=0?"#4fd8b4":"#f06060"}>
          {lastV>=0?`€${lastV.toFixed(0)}`:`-€${Math.abs(lastV).toFixed(0)}`}
        </text>
      </svg>
    </div>
  );
}

  {key:"benzina",        label:"Benzina",   cat:"viaggio",   abbr:"Benz"},
  {key:"gasolio",        label:"Gasolio",   cat:"viaggio",   abbr:"Gas"},
  {key:"pedaggi",        label:"Pedaggi",   cat:"viaggio",   abbr:"Ped"},
  // cibo group
  {key:"spesa",          label:"Spesa",     cat:"cibo",      abbr:"Spesa"},

function PanoramicaView({data, budget, onOpenDetail}){
  if(!data.length) return <div className="empty"><div className="empty-icon">📋</div><p>Nessun giorno nel periodo.</p></div>;

  const budgetSeries = calcBudgetSeries(data, budget);
  const maxCosto = Math.max(1, ...data.map(d=>calcCosto(d)));

  // progressivi
  let progCosto = 0, progCassa = 0, progKm = 0;
  const progressivi = data.map((d,i)=>{
    progCosto += calcCosto(d);
    progCassa += calcCassa(data, i);
    progKm    += n(d.km);
    return {costo: calcCosto(d), progCosto, cassa: calcCassa(data,i), progCassa, progKm};
  });

  // column totals (skip virtual cols)
  const colTotals = PAN_COLS.reduce((acc,c)=>c.isProgKm?acc:({...acc,[c.key]:data.reduce((a,d)=>a+n(d[c.key]),0)}), {});

  const amtCell = (d, col, i) => {
    if(col.isProgKm){
      const pkm = progressivi[i].progKm;
      return (
        <td key={col.key} style={{borderLeft:"1px solid var(--border)"}}>
          <div className={`pan-amt cat-km${pkm>0?" has-val":""}`}
            style={{color:"var(--text2)",fontSize:11}}
            onClick={()=>onOpenDetail(i)}
            title={`KM progressivi: ${pkm} km`}>
            {pkm>0?pkm:"·"}
          </div>
        </td>
      );
    }
    const v = n(d[col.key]);
    const hasVal = v > 0;
    const display = col.isKm
      ? (hasVal ? `${v}` : "·")
      : (hasVal ? `${v%1===0?v:v.toFixed(1)}` : "·");
    return (
      <td key={col.key}>
        <div
          className={`pan-amt cat-${col.cat}${hasVal?" has-val":""}`}
          onClick={()=>onOpenDetail(i)}
          title={`${col.label}: ${hasVal?(col.isKm?v+" km":"€"+fmt2(v)):"—"}`}
        >
          {display}
        </div>
      </td>
    );
  };

  return (
    <div>
      <div className="pan-wrap">
        <table className="pan-table">
          <thead>
            <tr>
              <th className="sticky-col th-date">Giorno</th>
              {PAN_COLS.map(c=>(
                <th key={c.key} className={`cat-head-${c.cat}`}
                  style={{borderLeft: c.key==="km"||c.key==="spesa" ? "2px solid var(--border2)" : undefined}}>
                  {c.abbr}
                </th>
              ))}
              <th className="th-group-sep" style={{borderLeft:"2px solid var(--border2)"}}>Costo g.</th>
              <th title="Costo progressivo">∑Costo</th>
              <th className="th-group-sep" style={{borderLeft:"2px solid var(--border2)"}}>Cassa g.</th>
              <th title="Cassa progressiva">∑Cassa</th>
              <th className="th-group-sep" style={{borderLeft:"2px solid var(--border2)"}}>Budget</th>
            </tr>
          </thead>
          <tbody>
            {data.map((d,i)=>{
              const costo  = progressivi[i].costo;
              const pcosto = progressivi[i].progCosto;
              const cassa  = progressivi[i].cassa;
              const pcassa = progressivi[i].progCassa;
              const pKm    = progressivi[i].progKm;
              const resid  = budgetSeries[i];
              const dow    = d.date ? DAYS_OF_WEEK[new Date(d.date+"T12:00:00").getDay()] : "";
              const isSun  = d.date && new Date(d.date+"T12:00:00").getDay()===0;
              const isSat  = d.date && new Date(d.date+"T12:00:00").getDay()===6;
              const isWeekend = isSun||isSat;
              return (
                <tr key={d.date||i} style={isWeekend?{background:"rgba(79,216,180,.02)"}:{}}>
                  {/* sticky date cell */}
                  <td className="sticky-col">
                    <div className="pan-date-cell" onClick={()=>onOpenDetail(i)}>
                      <span className="pan-gnum">G{i+1}</span>
                      <span className="pan-dow" style={isWeekend?{color:"var(--primary)",opacity:.6}:{}}>{dow}</span>
                      <span className="pan-d">{fmtShort(d.date)}</span>
                      <span className={`pan-where${d.luogo?"":" empty"}`}>
                        {d.luogo||"—"}
                        {d.idTappa && <span style={{marginLeft:4,color:"var(--primary)",fontSize:10}}>●</span>}
                      </span>
                    </div>
                  </td>

                  {/* category amount cells */}
                  {PAN_COLS.map(col=>{
                    const borderLeft = col.key==="km"||col.key==="spesa" ? "2px solid var(--border2)" : undefined;
                    const td = amtCell(d, col, i);
                    return React.cloneElement(td, {style:{borderLeft}});
                  })}

                  {/* costo giorno */}
                  <td style={{borderLeft:"2px solid var(--border2)"}}>
                    <div className={`pan-flow-cell day${costo===0?" zero":""}`} onClick={()=>onOpenDetail(i)}>
                      {costo===0?"—":`€${costo%1===0?costo:fmt2(costo)}`}
                    </div>
                  </td>
                  {/* costo progressivo */}
                  <td>
                    <div className="pan-flow-cell prog" onClick={()=>onOpenDetail(i)}>
                      €{pcosto%1===0?pcosto:fmt2(pcosto)}

                  </td>
                  {/* cassa giorno */}
                  <td style={{borderLeft:"2px solid var(--border2)"}}>
                    <div className={`pan-flow-cell cassa-day${cassa===0?" zero":""}`} onClick={()=>onOpenDetail(i)}>
                      {cassa===0?"—":`€${cassa%1===0?cassa:fmt2(cassa)}`}
                    </div>
                  </td>
                  {/* cassa progressiva */}
                  <td>
                    <div className="pan-flow-cell cassa-prog" onClick={()=>onOpenDetail(i)}>

                  {/* budget residuo */}
                  <td style={{borderLeft:"2px solid var(--border2)"}}>
                    <div className={`pan-flow-cell ${resid>=0?"budget-pos":"budget-neg"}`} onClick={()=>onOpenDetail(i)}>

                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr>
              <td className="sticky-col">Totali</td>
              {PAN_COLS.map(c=>(
                <td key={c.key} style={{borderLeft: c.key==="km"||c.key==="spesa"?"2px solid var(--border2)":c.isProgKm?"1px solid var(--border)":undefined}}>
                  <div style={{textAlign:"center",padding:"0 4px",fontSize:11,color:"var(--text2)"}}>
                    {c.isProgKm
                      ? ((progressivi[progressivi.length-1]?.progKm??0)>0 ? `${progressivi[progressivi.length-1].progKm}` : "")
                      : colTotals[c.key]>0 ? (c.isKm?colTotals[c.key]:fmt2(colTotals[c.key])) : ""}
                  </div>
                </td>
              ))}
              {/* costo tot */}
              <td style={{borderLeft:"2px solid var(--border2)"}}>
                <div style={{textAlign:"right",padding:"0 8px",color:"var(--accent)",fontSize:12}}>
                  €{fmt2(progressivi[progressivi.length-1]?.progCosto??0)}
                </div>
              </td>
              {/* ∑costo — same */}
              <td><div style={{textAlign:"right",padding:"0 8px",color:"var(--text3)",fontSize:11}}>—</div></td>
              {/* cassa tot */}
              <td style={{borderLeft:"2px solid var(--border2)"}}>
                <div style={{textAlign:"right",padding:"0 8px",color:"#c0d080",fontSize:12}}>
                  €{fmt2(progressivi[progressivi.length-1]?.progCassa??0)}
                </div>
              </td>
              {/* ∑cassa — same */}
              <td><div style={{textAlign:"right",padding:"0 8px",color:"var(--text3)",fontSize:11}}>—</div></td>
              {/* budget finale */}
              <td style={{borderLeft:"2px solid var(--border2)"}}>
                <div style={{textAlign:"right",padding:"0 8px",
                  color:budgetSeries[budgetSeries.length-1]>=0?"var(--green)":"var(--red)",fontSize:12}}>
                  €{fmt2(budgetSeries[budgetSeries.length-1]??0)}
                </div>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>

      {/* Legend */}
      <div className="pan-legend">
        {[
          {cat:"struttura", label:"Struttura", color:"rgba(24,40,30,1)"},
          {cat:"km",        label:"KM",        color:"rgba(18,26,36,1)"},
          {cat:"viaggio",   label:"Carburante/Pedaggi", color:"rgba(24,34,42,1)"},
          {cat:"cibo",      label:"Cibo & Spese",       color:"rgba(38,32,26,1)"},
        ].map(({cat,label,color})=>(
          <div key={cat} className="pan-legend-item">
            <div className="pan-legend-dot" style={{background:color, border:"1px solid var(--border2)"}}/>
            {label}
          </div>
        ))}
        <div className="pan-legend-item" style={{marginLeft:"auto",color:"var(--text3)",fontSize:10}}>
          · = vuoto &nbsp; tocca cella → modifica giorno
        </div>
      </div>
    </div>
  );
}

// ── Delta View ─────────────────────────────────────────────────────────────
const DELTA_CATS = [
  {key:"struttura", label:"🏕️ Struttura",  keys:["piazzola","tassa","extraStruttura"]},
  {key:"carburante",label:"⛽ Carburante",  keys:["benzina","gasolio"]},
  {key:"pedaggi",   label:"🛣️ Pedaggi",    keys:["pedaggi"]},
  {key:"spesa",     label:"🛒 Spesa",       keys:["spesa"]},
  {key:"cena",      label:"🍽️ Cena",        keys:["cena"]},
  {key:"colazione", label:"☕ Colazione",   keys:["colazione"]},
  {key:"extra",     label:"📦 Extra",       keys:["extraVar"]},
  {key:"km",        label:"🛣️ KM totali",  keys:["km"], isKm:true},
];

function fmtDelta(d, isKm=false){
  if(d===0) return <span className="delta-zero">—</span>;
  const sign = d>0 ? "+" : "−";
  const val  = isKm ? Math.abs(d) : fmt2(Math.abs(d));
  const cls  = isKm ? "" : (d>0?"delta-pos":"delta-neg");
  // for €: negative delta = cons < prev = risparmio (green); positive = sforamento (red)
  // for km: positive = more km (neutral/info, show as plain)
  return <span className={isKm?"":cls}>{sign}{isKm?`${val} km`:`€${val}`}</span>;
}

function DeltaView({viaggio}){
  const prev = viaggio.preventivo || [];
  const cons = viaggio.consuntivo || [];
  const days = Math.max(prev.length, cons.length);

  if(!days) return <div className="empty"><div className="empty-icon">📊</div><p>Nessun dato disponibile.</p></div>;

  const hasPreventivo = prev.some(d=>calcCosto(d)>0);
  const hasConsuntivo = cons.some(d=>calcCosto(d)>0);

  // ── Totals by category ──
  const catRows = DELTA_CATS.map(cat=>{
    const vPrev = prev.reduce((a,d)=>a+cat.keys.reduce((b,k)=>b+n(d[k]),0),0);
    const vCons = cons.reduce((a,d)=>a+cat.keys.reduce((b,k)=>b+n(d[k]),0),0);
    const delta = vPrev - vCons; // positive = cons < prev = risparmio
    return {...cat, vPrev, vCons, delta};
  });

  const totPrevCosto = prev.reduce((a,d)=>a+calcCosto(d),0);
  const totConsCosto = cons.reduce((a,d)=>a+calcCosto(d),0);
  const totPrevCassa = prev.reduce((a,_,i)=>a+calcCassa(prev,i),0);
  const totConsCassa = cons.reduce((a,_,i)=>a+calcCassa(cons,i),0);
  const maxCat = Math.max(1,...catRows.filter(c=>!c.isKm).map(c=>Math.max(c.vPrev,c.vCons)));

  // ── Per-day comparison ──
  const dayRows = Array.from({length:days},(_,i)=>{
    const dp = prev[i], dc = cons[i];
    const vPrev = dp ? calcCosto(dp) : null;
    const vCons = dc ? calcCosto(dc) : null;
    const delta = (vPrev!=null&&vCons!=null) ? vPrev-vCons : null;
    const date  = dp?.date || dc?.date || "";
    const dow   = date ? DAYS_OF_WEEK[new Date(date+"T12:00:00").getDay()] : "";
    return {i, date, dow, vPrev, vCons, delta};
  });
  const maxDay = Math.max(1,...dayRows.map(r=>Math.max(r.vPrev??0,r.vCons??0)));

  return (
    <div className="delta-wrap">

      {(!hasPreventivo||!hasConsuntivo) && (
        <div style={{background:"var(--accent-faint)",border:"1px solid rgba(240,160,69,.2)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"var(--accent)"}}>
          ⚠️ {!hasPreventivo?"Il preventivo è vuoto.":""} {!hasConsuntivo?"Il consuntivo è vuoto — inserisci i dati reali per vedere le differenze.":""}
        </div>
      )}

      {/* ── Riepilogo per categoria ── */}
      <div className="section-title">Riepilogo per categoria</div>
      <div style={{overflow:"auto",borderRadius:12,border:"1px solid var(--border)"}}>
        <table className="delta-table" style={{borderRadius:0,border:"none"}}>
          <thead>
            <tr>
              <th>Categoria</th>
              <th>Preventivo</th>
              <th>Consuntivo</th>
              <th>Δ Differenza</th>
              <th style={{minWidth:100}}>Barre</th>
            </tr>
          </thead>
          <tbody>
            {catRows.map(r=>(
              <tr key={r.key}>
                <td>{r.label}</td>
                <td className="delta-col-prev">
                  {r.vPrev===0?"—":r.isKm?`${r.vPrev} km`:`€${fmt2(r.vPrev)}`}
                </td>
                <td className="delta-col-cons">
                  {r.vCons===0?"—":r.isKm?`${r.vCons} km`:`€${fmt2(r.vCons)}`}
                </td>
                <td>{fmtDelta(r.delta, r.isKm)}</td>
                <td>
                  {!r.isKm && (r.vPrev>0||r.vCons>0) && (
                    <div style={{display:"flex",flexDirection:"column",gap:2,paddingRight:4}}>
                      <div className="delta-bar prev" style={{width:Math.round(r.vPrev/maxCat*90)+"px"}}/>
                      <div className="delta-bar cons" style={{width:Math.round(r.vCons/maxCat*90)+"px"}}/>
                    </div>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr className="total-row">
              <td>💰 Totale costo</td>
              <td>€{fmt2(totPrevCosto)}</td>
              <td>€{fmt2(totConsCosto)}</td>
              <td>{fmtDelta(totPrevCosto-totConsCosto)}</td>
              <td/>
            </tr>
            <tr className="total-row">
              <td>💳 Totale cassa</td>
              <td>€{fmt2(totPrevCassa)}</td>
              <td>€{fmt2(totConsCassa)}</td>
              <td>{fmtDelta(totPrevCassa-totConsCassa)}</td>
              <td/>
            </tr>
          </tfoot>
        </table>
      </div>

      {/* ── Giorno per giorno ── */}
      <div className="section-title">Costo giorno per giorno</div>
      <div style={{overflow:"auto",borderRadius:12,border:"1px solid var(--border)"}}>
        <table className="delta-table" style={{borderRadius:0,border:"none"}}>
          <thead>
            <tr>
              <th style={{minWidth:110}}>Giorno</th>
              <th>Preventivo</th>
              <th>Consuntivo</th>
              <th>Δ Differenza</th>
              <th style={{minWidth:100}}>Barre</th>
            </tr>
          </thead>
          <tbody>
            {dayRows.map(r=>(
              <tr key={r.i}>
                <td>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"var(--primary)",marginRight:6}}>G{r.i+1}</span>
                  <span style={{color:"var(--text3)",fontSize:11}}>{r.dow} {fmtShort(r.date)}</span>
                </td>
                <td className="delta-col-prev">{r.vPrev==null||r.vPrev===0?"—":`€${fmt2(r.vPrev)}`}</td>
                <td className="delta-col-cons">{r.vCons==null||r.vCons===0?"—":`€${fmt2(r.vCons)}`}</td>
                <td>{r.delta!=null&&(r.vPrev>0||r.vCons>0)?fmtDelta(r.delta):<span className="delta-zero">—</span>}</td>
                <td>
                  {(r.vPrev>0||r.vCons>0) && (
                    <div style={{display:"flex",flexDirection:"column",gap:2,paddingRight:4}}>
                      <div className="delta-bar prev" style={{width:Math.round((r.vPrev??0)/maxDay*90)+"px"}}/>
                      <div className="delta-bar cons" style={{width:Math.round((r.vCons??0)/maxDay*90)+"px"}}/>
                    </div>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Legend */}
      <div className="pan-legend">
        <div className="pan-legend-item"><div className="pan-legend-dot" style={{background:"var(--text3)"}}/>Preventivo</div>
        <div className="pan-legend-item"><div className="pan-legend-dot" style={{background:"var(--accent)"}}/>Consuntivo</div>
        <div className="pan-legend-item"><span className="delta-pos">▲ verde</span>&nbsp;= risparmio rispetto al preventivo</div>
        <div className="pan-legend-item"><span className="delta-neg">▼ rosso</span>&nbsp;= sforamento</div>
      </div>
    </div>
  );
}

function GridEditor({data, budget, onChange, fullscreen=false, onToggleFS, onDayClick}){
  if(!data.length) return <div className="empty"><div className="empty-icon">📋</div><p>Nessun giorno nel periodo.</p></div>;
  const budgets = calcBudgetSeries(data, budget);
  const nCols   = data.length;
  const cols    = `180px 90px repeat(${nCols}, 88px)`;
  const groups  = ["struttura","viaggio","cibo"];
  const groupLabels = {struttura:"🏕️  Struttura", viaggio:"🛣️  Viaggio", cibo:"🍽️  Cibo & Spese"};

  const getRowBg = (row, di) => {
    const [c0,c1] = GROUP_COLS[row.group]||["--card","--card"];
    return di%2===0 ? `var(${c0})` : `var(${c1})`;
  };

  const renderInput = (row, d, i) => {
    const bg = getRowBg(row, i);
    const base = {background:bg, padding:0};
    if(row.type==="numopt"){
      return (
        <div key={i} className="cell input-cell" style={base}>
          <input type="number" value={d[row.key]??""} placeholder="auto"
            onChange={e=>onChange(i,row.key,e.target.value===""?"":+e.target.value)}/>
        </div>
      );
    }
    if(row.type==="num"){
      return (
        <div key={i} className="cell input-cell" style={base}>
          <input type="number" value={d[row.key]===0?"":d[row.key]??""} placeholder="0"
            onFocus={e=>e.target.select()}
            onChange={e=>onChange(i,row.key,e.target.value===""?0:+e.target.value)}/>
        </div>
      );
    }
    return (
      <div key={i} className="cell input-cell" style={base}>
        <input type="text" value={d[row.key]??""} onChange={e=>onChange(i,row.key,e.target.value)}/>
      </div>
    );
  };

  const gridContent = (
    <div className="grid-wrap">
      <div className="data-grid" style={{gridTemplateColumns:cols}}>
        {/* Header */}
        <div className="cell sticky-l label-cell" style={{background:"var(--card2)",fontFamily:"'Syne',sans-serif",fontSize:11,letterSpacing:".5px",textTransform:"uppercase"}}>Voce</div>
        <div className="cell sticky-l2 label-cell total-cell" style={{background:"var(--card2)"}}>Totale</div>
        {data.map((d,i)=>(
          <div key={i} className="cell col-head" onClick={()=>onDayClick&&onDayClick(i)}
            style={onDayClick?{cursor:"pointer",userSelect:"none"}:{}}>
            <strong>G{i+1}</strong>
            <span>{fmtShort(d.date)}</span>
            {onDayClick && <span style={{fontSize:9,color:"var(--primary)",opacity:.7,marginTop:1}}>✏️</span>}
          </div>
        ))}

        {/* Groups */}
        {groups.map(grp=>(
          <React.Fragment key={grp}>
            <div className="cell sticky-l" style={{background:"var(--bg2)",fontSize:11,fontFamily:"'Syne',sans-serif",fontWeight:700,color:"var(--text2)",letterSpacing:".5px",gridColumn:"1/2"}}>
              {groupLabels[grp]}
            </div>
            <div className="cell sticky-l2" style={{background:"var(--bg2)"}}></div>
            {data.map((_,i)=><div key={i} className="cell" style={{background:"var(--bg2)"}}></div>)}

            {ROWS.filter(r=>r.group===grp).map((row,ri)=>{
              const isNum = row.type!=="text";
              const total = isNum ? data.reduce((a,d)=>a+n(d[row.key]),0) : null;
              return (
                <React.Fragment key={row.key}>
                  <div className="cell sticky-l label-cell" style={{background:getRowBg(row,ri)}}>{row.label}</div>
                  <div className="cell sticky-l2 total-cell" style={{background:getRowBg(row,ri)}}>
                    {total!=null ? fmt2(total) : ""}
                  </div>
                  {data.map((d,i)=>renderInput(row,d,i))}
                </React.Fragment>
              );
            })}
          </React.Fragment>
        ))}

        {/* Derived rows */}
        {[
          {label:"Pagamento €",      vals:data.map((_,i)=>fmt2(calcPagamento(data,i))),  tot:fmt2(data.reduce((a,_,i)=>a+calcPagamento(data,i),0)), bg0:"--col-p0", bg1:"--col-p1"},
          {label:"Costo giornata €", vals:data.map(d=>fmt2(calcCosto(d))),               tot:fmt2(data.reduce((a,d)=>a+calcCosto(d),0)),            bg0:"--col-b0", bg1:"--col-b1"},
          {label:"Spesa cassa €",    vals:data.map((_,i)=>fmt2(calcCassa(data,i))),      tot:fmt2(data.reduce((a,_,i)=>a+calcCassa(data,i),0)),    bg0:"--col-b0", bg1:"--col-b1"},
          {label:"Budget residuo €", vals:budgets.map(v=>fmt2(v)),                        tot:fmt2(budgets.length?budgets[budgets.length-1]:n(budget)), bg0:"--col-b0", bg1:"--col-b1", isBudget:true},
          {label:"Tempo percorrenza",vals:data.map(d=>{const t=calcTempoNum(d);return t!=null?fmtH(t):"--";}), tot:fmtH(data.reduce((a,d)=>a+(calcTempoNum(d)||0),0)), bg0:"--col-v0", bg1:"--col-v1"},
        ].map(({label,vals,tot,bg0,bg1,isBudget},ri)=>(
          <React.Fragment key={label}>
            {ri===0 && <>
              <div className="cell sticky-l" style={{background:"var(--bg2)",height:4,minHeight:4}}></div>
              <div className="cell sticky-l2" style={{background:"var(--bg2)",height:4,minHeight:4}}></div>
              {data.map((_,i)=><div key={i} className="cell" style={{background:"var(--bg2)",height:4,minHeight:4}}></div>)}
            </>}
            <div className="cell sticky-l label-cell" style={{background:`var(${ri%2===0?bg0:bg1})`,fontWeight:600,color:"var(--text)"}}>
              {label}
            </div>
            <div className="cell sticky-l2 derived" style={{background:`var(${ri%2===0?bg0:bg1})`, color: isBudget && +tot<0 ? "var(--red)" : isBudget ? "var(--green)" : "var(--accent)"}}>
              {tot}
            </div>
            {vals.map((v,i)=>(
              <div key={i} className={`cell derived ${isBudget?(+v<0?"neg":"pos"):""}`}
                style={{background:`var(${i%2===0?bg0:bg1})`}}>
                {v}
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>
    </div>
  );

  if(fullscreen){
    return (
      <GridFSOverlay onToggleFS={onToggleFS}>
        <div className="grid-fs-header">
          <span className="grid-fs-title">📋 Tabella giornaliera</span>
          <span style={{fontSize:12,color:"var(--text2)"}}>← scorri orizzontale per i giorni</span>
          <button className="btn btn-sm" onClick={onToggleFS} title="Esci da schermo intero">✕ Chiudi</button>
        </div>
        <div className="grid-fs-body">{gridContent}</div>
      </GridFSOverlay>
    );
  }

  return gridContent;
}
