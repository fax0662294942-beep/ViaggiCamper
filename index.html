function DayModal({dayIndex, data, budget, onClose, onChange, consumoMedio, prezzoCarburante}){
  const d   = data[dayIndex];
  const tot = calcCosto(d);
  const pag = calcPagamento(data, dayIndex);
  const cas = calcCassa(data, dayIndex);
  const bdg = calcBudgetSeries(data, budget);
  const res = bdg[dayIndex];
  const tpNum = calcTempoNum(d);
  const prevDay = dayIndex>0 ? data[dayIndex-1] : null;
  const nextDay = dayIndex<data.length-1 ? data[dayIndex+1] : null;

  const update = (key, val) => onChange(dayIndex, key, val);

  return (
    <Modal title={`Giorno ${dayIndex+1} — ${fmtDate(d.date)}`} onClose={onClose} width="580px">
      {/* Nav between days */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8}}>
        <button className="btn btn-sm" disabled={!prevDay} onClick={()=>onChange("__nav__",dayIndex-1,null)}
          style={{opacity:prevDay?1:.3}}>← G{dayIndex} {prevDay?fmtShort(prevDay.date):""}</button>
        <span style={{fontSize:12,color:"var(--text2)",textAlign:"center"}}>
          {d.luogo||d.struttura ? <><strong style={{color:"var(--text)"}}>{d.luogo}</strong>{d.struttura&&<span> · {d.struttura}</span>}</> : <span style={{color:"var(--text3)"}}>nessuna tappa</span>}
        </span>
        <button className="btn btn-sm" disabled={!nextDay} onClick={()=>onChange("__nav__",dayIndex+1,null)}
          style={{opacity:nextDay?1:.3}}>G{dayIndex+2} {nextDay?fmtShort(nextDay.date):""} →</button>
      </div>

      {/* Sections */}
      {DAY_SECTIONS.map(sec=>(
        <div key={sec.title} style={{marginBottom:16}}>
          <div className="section-title" style={{marginBottom:8}}>{sec.title}</div>
          <div className="form-grid">
            {sec.fields.map(f=>(
              <div key={f.key} className="field">
                <label className="field-label">{f.label}</label>
                {f.type==="text" ? (
                  <input type="text" className="field-input" value={d[f.key]||""}
                    onChange={e=>update(f.key, e.target.value)}/>
                ) : f.type==="numopt" ? (
                  <input type="number" className="field-input" value={d[f.key]??""} placeholder="auto"
                    onFocus={e=>e.target.select()}
                    onChange={e=>update(f.key, e.target.value===""?"":+e.target.value)}/>
                ) : (
                  <input type="number" className="field-input"
                    value={d[f.key]===0?"":d[f.key]??""} placeholder="0"
                    onFocus={e=>e.target.select()}
                    onChange={e=>update(f.key, e.target.value===""?0:+e.target.value)}/>
                )}
                {f.hint && <span style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{f.hint}</span>}
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* Summary strip */}
      <div className="tappa-summary" style={{marginTop:4}}>
        <div><span>Costo giornata</span><strong className="accent">€ {fmt2(tot)}</strong></div>
        <div><span>Pagamento</span><strong>€ {fmt2(pag)}</strong></div>
        <div><span>Spesa cassa</span><strong>€ {fmt2(cas)}</strong></div>
        <div><span>Budget residuo</span><strong className={res>=0?"primary":""}style={res<0?{color:"var(--red)"}:{}}>{res>=0?"€ ":"-€"}{fmt2(Math.abs(res))}</strong></div>
        {tpNum!=null && <div><span>Tempo guida</span><strong>{fmtH(tpNum)}</strong></div>}
        {n(consumoMedio)>0 && n(d.km)>0 && (() => {
          const litri = n(d.km)*n(consumoMedio)/100;
          const costo = litri*n(prezzoCarburante);
          return (<>
            <div><span>Litri stimati</span><strong style={{color:"var(--accent)"}}>{litri.toFixed(1)} L</strong></div>
            {n(prezzoCarburante)>0 && <div><span>Costo stimato</span><strong style={{color:"var(--accent)"}}>€{fmt2(costo)}</strong></div>}
          </>);
        })()}
      </div>

      <div className="btn-row">
        <button className="btn-primary" onClick={onClose}>✓ Chiudi</button>
      </div>
    </Modal>
  );
}

// ── Tappa Chain ────────────────────────────────────────────────────────────
function TappaChain({tappe, data, tab, budget, onDelete, onUpdateBudget, onEdit}){
  const totalAllocato = tappe.reduce((a,t)=>a+n(t.budgetAllocato),0);
  const nonAllocato   = budget - totalAllocato;

  // Build chain: compute riporto progressively
  let riporto = 0;
  const chain = tappe.map((t, ti) => {
    const allocato    = n(t.budgetAllocato);
    const prevRiporto = riporto;
    const disponibile = allocato + prevRiporto;
    const tappaGiorni = data.filter(d => d.idTappa === t.idTappa);
    const spesoTappa  = tappaGiorni.reduce((a, d) => a + calcCassa(data, data.indexOf(d)), 0);
    const residuo     = disponibile - spesoTappa;
    riporto = residuo;
    return { t, ti, allocato, prevRiporto, disponibile, spesoTappa, residuo };
  });

  return (
    <div style={{marginBottom:16}}>
      <div className="section-title">Tappe {tab}</div>
      <div className="tappa-chain">
        {chain.map(({t, ti, allocato, prevRiporto, disponibile, spesoTappa, residuo}) => {
          const hasAllocato = allocato > 0;
          return (
            <div key={t.id}>
              {ti > 0 && prevRiporto !== 0 && (
                <div className="tappa-riporto">
                  ↓ riporto {prevRiporto >= 0 ? "+" : ""}{fmt2(prevRiporto)} € dalla tappa precedente
                </div>
              )}
              <div className="tappa-item">
                <div className="tappa-item-head">
                  <div className="tappa-info">
                    <div className="tappa-name">
                      <span className="badge">{t.idTappa}</span>&nbsp;
                      {t.luogo} — <span style={{color:"var(--text2)"}}>{t.struttura}</span>
                    </div>
                    <div className="tappa-meta">
                      {fmtDate(t.startDate)} → {fmtDate(t.endDate)} &nbsp;·&nbsp;
                      {Math.max(0, diffInclusive(t.startDate, t.endDate)-1)} notti
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <button className="btn-icon btn-sm" style={{color:"var(--primary)"}} onClick={()=>onEdit&&onEdit(t)} title="Modifica tappa">✏️</button>
                    <button className="btn-icon btn-sm" style={{color:"var(--red)"}} onClick={()=>onDelete(t)} title="Elimina tappa">✕</button>
                  </div>
                </div>
                <div className="tappa-budget-bar">
                  <div className="tappa-budget-cell">
                    <span className="tbc-label">Allocato</span>
                    <input className="tappa-budget-input" type="number"
                      value={allocato === 0 ? "" : allocato} placeholder="—"
                      onFocus={e=>e.target.select()}
                      onChange={e=>onUpdateBudget(t.id, e.target.value===""?0:+e.target.value)}/>
                  </div>
                  <div className="tappa-budget-cell">
                    <span className="tbc-label">Disponibile</span>
                    {hasAllocato || prevRiporto !== 0
                      ? <span className="tbc-val primary">€{fmt2(disponibile)}</span>
                      : <span className="tbc-val muted">—</span>}
                  </div>
                  <div className="tappa-budget-cell">
                    <span className="tbc-label">Speso</span>
                    <span className={`tbc-val${spesoTappa > 0 ? " accent" : ""}`}>
                      {spesoTappa > 0 ? `€${fmt2(spesoTappa)}` : "—"}
                    </span>
                  </div>
                  <div className="tappa-budget-cell">
                    <span className="tbc-label">Residuo</span>
                    {(hasAllocato || prevRiporto !== 0) && spesoTappa > 0
                      ? <span className={`tbc-val ${residuo >= 0 ? "pos" : "neg"}`}>€{fmt2(residuo)}</span>
                      : spesoTappa > 0 && !hasAllocato
                        ? <span className="tbc-val muted">nessun budget</span>
                        : <span className="tbc-val muted">—</span>}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {totalAllocato > 0 && (
        <div className="budget-unallocated">
          <span style={{color:"var(--accent)",fontWeight:600}}>🎯 Buffer non allocato</span>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,
            color:nonAllocato>=0?"var(--accent)":"var(--red)"}}>
            €{fmt2(nonAllocato)}
          </span>
        </div>
      )}
    </div>
  );
}

// ── Tappa Modal ────────────────────────────────────────────────────────────
function TappaModal({viaggio, onClose, onSave, initial}){
  const consumoMedio = n(viaggio.consumoMedio);
  const isEdit = !!initial;
  const [f,setF] = React.useState(initial ? {
    startDate: initial.startDate,
    endDate:   initial.endDate,
    luogo:     initial.luogo||"",
    struttura: initial.struttura||"",
    costoPiazzola: initial.costoPiazzola||0,
    costoPersona:  initial.costoPersona||0,
    numeroPersone: initial.numeroPersone||2,
    elettricita:   initial.elettricita||0,
    moto:          initial.moto||0,
    tassaSoggiorno:initial.tassaSoggiorno||0,
    extraStruttura:initial.extraStruttura||0,
    budgetAllocato:initial.budgetAllocato||0,
    kmTappa:       initial.kmTappa||0,
    prezzoLitro:   initial.prezzoLitro||0,
    costoCarburante:initial.costoCarburante||0,
  } : {
    startDate:viaggio.startDate, endDate:addDays(viaggio.startDate,1),
    luogo:"", struttura:"",
    costoPiazzola:0, costoPersona:0, numeroPersone:2,
    elettricita:0, moto:0, tassaSoggiorno:0, extraStruttura:0,
    budgetAllocato:0, kmTappa:0, prezzoLitro:0, costoCarburante:0
  });
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const notti = Math.max(0, diffInclusive(f.startDate, f.endDate)-1);
  const perNotte = n(f.costoPiazzola)+n(f.costoPersona)*n(f.numeroPersone)+n(f.elettricita)+n(f.moto);
  const tassaN   = n(f.tassaSoggiorno)*n(f.numeroPersone);
  const totale   = (perNotte+tassaN)*notti;
  const litriStimati = consumoMedio>0 && n(f.kmTappa)>0 ? n(f.kmTappa)*consumoMedio/100 : 0;
  const costoStimato = litriStimati>0 && n(f.prezzoLitro)>0 ? litriStimati*n(f.prezzoLitro) : 0;

  // Auto-suggest costoCarburante when it changes
  const onPrezzoLitro = v => {
    u("prezzoLitro", v);
    if(litriStimati>0 && v>0){
      const sug = litriStimati * v;
      setF(p=>({...p, prezzoLitro:v, costoCarburante:Math.ceil(sug)}));
    }
  };
  const onKmChange = v => {
    u("kmTappa", v);
    if(n(f.prezzoLitro)>0 && consumoMedio>0 && v>0){
      const lit = v*consumoMedio/100;
      setF(p=>({...p, kmTappa:v, costoCarburante:Math.ceil(lit*n(p.prezzoLitro))}));
    }
  };

  return (
    <Modal title={isEdit?"✏️ Modifica tappa":"Nuova tappa"} onClose={onClose} width="640px">
      <div className="form-grid" style={{gap:12}}>
        <div className="field">
          <label className="field-label">Check-in</label>
          <input type="date" className="field-input" value={f.startDate} onChange={e=>u("startDate",e.target.value)}/>
        </div>
        <div className="field">
          <label className="field-label">Check-out</label>
          <input type="date" className="field-input" value={f.endDate} onChange={e=>u("endDate",e.target.value)}/>
        </div>
        <div className="field">
          <label className="field-label">Luogo</label>
          <input type="text" className="field-input" value={f.luogo} onChange={e=>u("luogo",e.target.value)} placeholder="es. Roma"/>
        </div>
        <div className="field">
          <label className="field-label">Struttura</label>
          <input type="text" className="field-input" value={f.struttura} onChange={e=>u("struttura",e.target.value)} placeholder="es. Camping Bella Vista"/>
        </div>
        <NumField label="Costo piazzola €/notte"       value={f.costoPiazzola}    onChange={v=>u("costoPiazzola",v)}/>
        <NumField label="Costo a persona €/notte"       value={f.costoPersona}     onChange={v=>u("costoPersona",v)}/>
        <NumField label="Numero persone"                value={f.numeroPersone}    onChange={v=>u("numeroPersone",v)}/>
        <NumField label="Elettricità €/notte"           value={f.elettricita}      onChange={v=>u("elettricita",v)}/>
        <NumField label="Moto €/notte"                  value={f.moto}             onChange={v=>u("moto",v)}/>
        <NumField label="Tassa soggiorno €/persona/notte" value={f.tassaSoggiorno} onChange={v=>u("tassaSoggiorno",v)}/>
        <NumField label="Extra struttura €/notte"       value={f.extraStruttura}   onChange={v=>u("extraStruttura",v)}/>
        <NumField label="Budget allocato € (opzionale)" value={f.budgetAllocato}   onChange={v=>u("budgetAllocato",v)} placeholder="0 = non definito"/>
      </div>

      {/* Sezione carburante */}
      <div style={{marginTop:16}}>
        <div className="section-title" style={{marginBottom:10}}>⛽ Carburante per questa tappa</div>
        <p style={{fontSize:11,color:"var(--text3)",marginBottom:8}}>
          KM e costo verranno inseriti nel giorno di viaggio (il giorno prima del check-in).
        </p>
        <div className="form-grid" style={{gap:10}}>
          <div className="field">
            <label className="field-label">KM da percorrere</label>
            <input type="number" className="field-input" value={f.kmTappa||""} placeholder="es. 250"
              onFocus={e=>e.target.select()} onChange={e=>onKmChange(+e.target.value||0)}/>
          </div>
          <div className="field">
            <label className="field-label">Prezzo diesel €/litro</label>
            <input type="number" className="field-input" value={f.prezzoLitro||""} placeholder="es. 1.72"
              onFocus={e=>e.target.select()} onChange={e=>onPrezzoLitro(+e.target.value||0)}/>
          </div>
        </div>
        {litriStimati>0 && (
          <div className="tappa-summary" style={{marginTop:10}}>
            {consumoMedio>0 && <div><span>Consumo</span><strong>{consumoMedio} l/100km</strong></div>}
            <div><span>KM tappa</span><strong style={{color:"var(--text)"}}>{n(f.kmTappa)} km</strong></div>
            <div><span>Litri stimati</span><strong style={{color:"var(--accent)"}}>{litriStimati.toFixed(1)} L</strong></div>
            {costoStimato>0 && <div><span>Costo stimato</span><strong style={{color:"var(--accent)"}}>€{fmt2(costoStimato)}</strong></div>}
          </div>
        )}
        {costoStimato>0 && (
          <div className="field" style={{marginTop:10}}>
            <label className="field-label">💳 Importo da inserire in tabella (modificabile)</label>
            <input type="number" className="field-input"
              value={f.costoCarburante||""}
              placeholder={fmt2(costoStimato)}
              onFocus={e=>e.target.select()}
              onChange={e=>u("costoCarburante",+e.target.value||0)}
              style={{fontSize:16,fontWeight:700,color:"var(--primary)"}}/>
            <span style={{fontSize:11,color:"var(--text3)",marginTop:4,display:"block"}}>
              Suggerito: €{fmt2(costoStimato)} · puoi arrotondare o modificare
            </span>
          </div>
        )}
      </div>

      <div className="tappa-summary" style={{marginTop:12}}>
        <div><span>Notti</span><strong className="primary">{notti}</strong></div>
        <div><span>Piazzola/notte</span><strong>€ {fmt2(perNotte)}</strong></div>
        <div><span>Tassa/notte</span><strong>€ {fmt2(tassaN)}</strong></div>
        <div><span>Totale struttura</span><strong className="accent">€ {fmt2(totale)}</strong></div>
      </div>
      <div className="btn-row">
        <button className="btn-primary" onClick={()=>onSave(f)}>{isEdit?"✓ Salva modifiche":"✓ Salva tappa"}</button>
        <button className="btn" onClick={onClose}>Annulla</button>
      </div>
    </Modal>
  );
}

// ── New / Edit Trip Modal ─────────────────────────────────────────────────
function TripFormModal({initial, title, onClose, onSave, isCopy, gruppiEsistenti=[]}){
  const today = new Date().toISOString().slice(0,10);
  const [f,setF] = React.useState(initial ? {
    nome: initial.nome||(isCopy?initial.nome+' (copia)':''),
    budget: initial.budget||1000,
    startDate: initial.startDate||today,
    endDate: initial.endDate||addDays(today,6),
    veicolo: initial.veicolo||'',
    consumoMedio: initial.consumoMedio||0,
    status: initial.status||'ipotesi',
    gruppo: initial.gruppo||'',
  } : {nome:'',budget:1000,startDate:today,endDate:addDays(today,6),veicolo:'',consumoMedio:0,status:'ipotesi',gruppo:''});
  const [nuovoGruppo, setNuovoGruppo] = React.useState(
    // Se initial.gruppo esiste ma non è nella lista, parti già in modalità "nuovo"
    !!(initial?.gruppo && !gruppiEsistenti.includes(initial.gruppo))
  );
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const giorni = diffInclusive(f.startDate, f.endDate);
  const save=()=>{
    if(!f.nome.trim()) return alert("Inserisci il nome del viaggio");
    if(giorni<1) return alert("Le date non sono valide");
    onSave(f); onClose();
  };
  const onSelectGruppo = val => {
    if(val==='__nuovo__'){ setNuovoGruppo(true); u('gruppo',''); }
    else { setNuovoGruppo(false); u('gruppo',val); }
  };
  return (
    <Modal title={title} onClose={onClose} width="460px">
      <div className="form-grid">
        {/* Stato */}
        <div className="field" style={{gridColumn:"1/-1"}}>
          <label className="field-label">Stato</label>
          <div style={{display:'flex',gap:8}}>
            {[['ipotesi','💭 Ipotesi'],['confermato','✅ Confermato']].map(([s,l])=>(
              <button key={s} onClick={()=>u('status',s)}
                style={{flex:1,padding:'8px',borderRadius:8,border:'1.5px solid '+(f.status===s?'var(--primary-dim)':'var(--border2)'),
                  background:f.status===s?'var(--primary-faint)':'var(--card)',
                  color:f.status===s?'var(--primary)':'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                {l}
              </button>
            ))}
          </div>
        </div>
        {/* Gruppo / evento */}
        <div className="field" style={{gridColumn:"1/-1"}}>
          <label className="field-label">📁 Gruppo / Evento</label>
          {!nuovoGruppo ? (
            <select className="field-input" value={f.gruppo||''} onChange={e=>onSelectGruppo(e.target.value)}>
              <option value="">— Nessun gruppo —</option>
              {gruppiEsistenti.map(g=><option key={g} value={g}>{g}</option>)}
              <option value="__nuovo__">➕ Crea nuovo gruppo...</option>
            </select>
          ) : (
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input type="text" className="field-input" style={{flex:1}} autoFocus
                value={f.gruppo||''} onChange={e=>u('gruppo',e.target.value)}
                placeholder="es. Ferie agosto, Pasqua, Ponte 1 maggio..."/>
              {gruppiEsistenti.length>0&&(
                <button className="btn" style={{flexShrink:0,padding:'8px 10px',fontSize:12}}
                  onClick={()=>setNuovoGruppo(false)}>← Lista</button>
              )}
            </div>
          )}
        </div>
        <div className="field" style={{gridColumn:"1/-1"}}>
          <label className="field-label">Nome viaggio</label>
          <input type="text" className="field-input" value={f.nome} onChange={e=>u("nome",e.target.value)} placeholder="es. Puglia, Val Gardena, Toscana..."/>
        </div>
        <div className="field" style={{gridColumn:"1/-1"}}>
          <label className="field-label">Budget iniziale €</label>
          <input type="number" className="field-input" value={f.budget} onFocus={e=>e.target.select()} onChange={e=>u("budget",+e.target.value||0)}/>
        </div>
        <div className="field">
          <label className="field-label">Partenza</label>
          <input type="date" className="field-input" value={f.startDate} onChange={e=>u("startDate",e.target.value)}/>
        </div>
        <div className="field">
          <label className="field-label">Rientro</label>
          <input type="date" className="field-input" value={f.endDate} onChange={e=>u("endDate",e.target.value)}/>
        </div>
        <div className="field" style={{gridColumn:"1/-1"}}>
          <label className="field-label">⛽ Veicolo (nome/targa)</label>
          <input type="text" className="field-input" value={f.veicolo||""} onChange={e=>u("veicolo",e.target.value)} placeholder="es. Mobilvetta BP056YC"/>
        </div>
        <div className="field" style={{gridColumn:"1/-1"}}>
          <label className="field-label">Consumo medio (l/100km)</label>
          <input type="number" className="field-input" value={f.consumoMedio||""} placeholder="es. 12"
            onFocus={e=>e.target.select()} onChange={e=>u("consumoMedio",+e.target.value||0)}/>
        </div>
      </div>
      {giorni>0 && <p style={{marginTop:12,fontSize:12,color:"var(--text2)"}}>⏱ {giorni} giorni · max {MAX_DAYS} giorni supportati</p>}
      <div className="btn-row">
        <button className="btn-primary" onClick={save}>✓ Salva</button>
        <button className="btn" onClick={onClose}>Annulla</button>
      </div>
    </Modal>
  );
}

// ── Trip View ──────────────────────────────────────────────────────────────
function TripView({viaggio, updateTrip, back, user, onShare, gruppiEsistenti=[]}){
  useBack(back);
  const [tab, setTab]           = React.useState("preventivo");
  const [showTappa, setTappa]   = React.useState(false);
  const [editingTappa, setEditingTappa] = React.useState(null); // tappa object to edit
  const [showEdit, setEdit]     = React.useState(false);
  const [delTappa, setDelTappa] = React.useState(null);
  const [showStats, setStats]   = React.useState(true);
  const [showChart, setChart]   = React.useState(false);
  const [fsGrid, setFsGrid]     = React.useState(false);
  const [dayModal, setDayModal] = React.useState(null);
  const [viewMode, setViewMode] = React.useState("panoramica"); // "panoramica" | "tabella"
  const data = viaggio[tab];

  const updateCell = (i,k,v) => {
    if(k==="__nav__"){ setDayModal(i); return; } // navigate day in modal
    const copy = {...viaggio,[tab]:[...viaggio[tab]]};
    copy[tab][i] = {...copy[tab][i],[k]:v};
    updateTrip(copy);
  };

  const addTappa = form => {
    const norm = d => (d||"").slice(0,10);
    const sIdx = viaggio[tab].findIndex(d=>norm(d.date)===norm(form.startDate));
    const eIdx = viaggio[tab].findIndex(d=>norm(d.date)===norm(form.endDate));
    if(sIdx===-1||eIdx===-1||eIdx<=sIdx){ alert("Controlla le date della tappa (devono rientrare nel periodo del viaggio)"); return; }
    const copy  = {...viaggio,[tab]:[...viaggio[tab]],tappe:[...(viaggio.tappe||[])]};
    const idN   = (viaggio.tappe||[]).filter(x=>x.target===tab).length+1;
    const idT   = `T${idN}`;
    const piaz  = n(form.costoPiazzola)+n(form.costoPersona)*n(form.numeroPersone)+n(form.elettricita)+n(form.moto);
    const tassa = n(form.tassaSoggiorno)*n(form.numeroPersone);

    // Se sIdx ha già una tappa precedente (giorno condiviso checkout/checkin),
    // salvo il suo pagamento checkout come campo separato prima di sovrascrivere
    const dayAtSIdx = copy[tab][sIdx];
    let pagamentoCheckoutPrev = 0;
    let prevIdTappa = "";
    if(dayAtSIdx.idTappa && dayAtSIdx.idTappa !== idT){
      prevIdTappa = dayAtSIdx.idTappa;
      pagamentoCheckoutPrev = copy[tab].reduce((a,x)=>x.idTappa===prevIdTappa?a+n(x.piazzola)+n(x.tassa):a,0);
    }

    for(let i=sIdx;i<eIdx;i++){
      copy[tab][i]={...copy[tab][i],idTappa:idT,luogo:form.luogo,struttura:form.struttura,piazzola:piaz,tassa,extraStruttura:n(form.extraStruttura),pagamentoCheckoutPrev:0,prevIdTappa:""};
    }
    copy[tab][eIdx]={...copy[tab][eIdx],idTappa:idT,luogo:form.luogo,struttura:form.struttura,piazzola:0,tassa:0,extraStruttura:0,pagamentoCheckoutPrev:0,prevIdTappa:""};

    // Ripristino il pagamento checkout della tappa precedente sul giorno condiviso
    if(pagamentoCheckoutPrev > 0){
      copy[tab][sIdx]={...copy[tab][sIdx], pagamentoCheckoutPrev, prevIdTappa};
    }

    // Km e carburante → giorno di viaggio (giorno prima del check-in se disponibile)
    const fuelIdx = sIdx > 0 ? sIdx - 1 : sIdx;
    if(n(form.kmTappa)>0)         copy[tab][fuelIdx]={...copy[tab][fuelIdx], km:n(form.kmTappa)};
    if(n(form.costoCarburante)>0) copy[tab][fuelIdx]={...copy[tab][fuelIdx], gasolio:n(form.costoCarburante)};

    copy.tappe.push({...form,id:Date.now(),target:tab,idTappa:idT});
    updateTrip(copy);
    setTappa(false);
  };

  const removeTappa = (tappa) => {
    const copy = {...viaggio,[tab]:[...viaggio[tab]],tappe:(viaggio.tappe||[]).filter(t=>t.id!==tappa.id)};
    copy[tab] = copy[tab].map(d => {
      if(d.idTappa !== tappa.idTappa) return d;
      if(d.prevIdTappa){
        // Giorno condiviso: ripristino il checkout della tappa precedente
        const prevT = (viaggio.tappe||[]).find(t=>t.idTappa===d.prevIdTappa);
        return {...d, idTappa:d.prevIdTappa, luogo:prevT?.luogo||"", struttura:prevT?.struttura||"",
          piazzola:0, tassa:0, extraStruttura:0, pagamentoCheckoutPrev:0, prevIdTappa:""};
      }
      return {...d, idTappa:"", luogo:"", struttura:"", piazzola:0, tassa:0, extraStruttura:0, pagamentoCheckoutPrev:0, prevIdTappa:""};
    });
    updateTrip(copy);
  };

  const editTappaFn = (oldTappa, form) => {
    const norm = d => (d||"").slice(0,10);
    const sIdx = viaggio[tab].findIndex(d=>norm(d.date)===norm(form.startDate));
    const eIdx = viaggio[tab].findIndex(d=>norm(d.date)===norm(form.endDate));
    if(sIdx===-1||eIdx===-1||eIdx<=sIdx){ alert("Controlla le date della tappa"); return; }
    // Clear old tappa days (restoring prev tappa checkouts if needed)
    const copy = {...viaggio,[tab]:[...viaggio[tab]].map(d=>{
      if(d.idTappa!==oldTappa.idTappa) return d;
      if(d.prevIdTappa){
        const prevT = (viaggio.tappe||[]).find(t=>t.idTappa===d.prevIdTappa);
        return {...d, idTappa:d.prevIdTappa, luogo:prevT?.luogo||"", struttura:prevT?.struttura||"",
          piazzola:0, tassa:0, extraStruttura:0, pagamentoCheckoutPrev:0, prevIdTappa:""};
      }
      return {...d, idTappa:"", luogo:"", struttura:"", piazzola:0, tassa:0, extraStruttura:0, pagamentoCheckoutPrev:0, prevIdTappa:""};
    }), tappe:(viaggio.tappe||[]).map(t=>t.id===oldTappa.id?{...t,...form,idTappa:oldTappa.idTappa}:t)};

    const piaz  = n(form.costoPiazzola)+n(form.costoPersona)*n(form.numeroPersone)+n(form.elettricita)+n(form.moto);
    const tassa = n(form.tassaSoggiorno)*n(form.numeroPersone);

    // Check shared day
    const dayAtSIdx = copy[tab][sIdx];
    let pagamentoCheckoutPrev = 0, prevIdTappa = "";
    if(dayAtSIdx.idTappa && dayAtSIdx.idTappa !== oldTappa.idTappa){
      prevIdTappa = dayAtSIdx.idTappa;
      pagamentoCheckoutPrev = copy[tab].reduce((a,x)=>x.idTappa===prevIdTappa?a+n(x.piazzola)+n(x.tassa):a,0);
    }

    for(let i=sIdx;i<eIdx;i++){
      copy[tab][i]={...copy[tab][i],idTappa:oldTappa.idTappa,luogo:form.luogo,struttura:form.struttura,piazzola:piaz,tassa,extraStruttura:n(form.extraStruttura),pagamentoCheckoutPrev:0,prevIdTappa:""};
    }
    copy[tab][eIdx]={...copy[tab][eIdx],idTappa:oldTappa.idTappa,luogo:form.luogo,struttura:form.struttura,piazzola:0,tassa:0,extraStruttura:0,pagamentoCheckoutPrev:0,prevIdTappa:""};
    if(pagamentoCheckoutPrev>0) copy[tab][sIdx]={...copy[tab][sIdx], pagamentoCheckoutPrev, prevIdTappa};

    const fuelIdx = sIdx > 0 ? sIdx - 1 : sIdx;
    if(n(form.kmTappa)>0)         copy[tab][fuelIdx]={...copy[tab][fuelIdx], km:n(form.kmTappa)};
    if(n(form.costoCarburante)>0) copy[tab][fuelIdx]={...copy[tab][fuelIdx], gasolio:n(form.costoCarburante)};
    updateTrip(copy);
    setEditingTappa(null);
  };

  const updateTappaBudget = (tappaId, val) => {
    const copy = {...viaggio, tappe:(viaggio.tappe||[]).map(t=>t.id===tappaId?{...t,budgetAllocato:val}:t)};
    updateTrip(copy);
  };

  const editTrip = form => {
    const newPreventivo = buildDays(form.startDate, form.endDate, viaggio.preventivo);
    const newConsuntivo = buildDays(form.startDate, form.endDate, viaggio.consuntivo);
    updateTrip({...viaggio,...form,budget:n(form.budget),
      veicolo:form.veicolo||"",
      consumoMedio:n(form.consumoMedio),
      prezzoCarburante:n(form.prezzoCarburante),
      status:form.status||viaggio.status||'ipotesi',
      gruppo:form.gruppo||'',
      preventivo:newPreventivo,consuntivo:newConsuntivo});
  };

  const tappe = (viaggio.tappe||[]).filter(t=>t.target===tab);

  return (
    <div>
      <div className="app-header" style={{height:"auto",flexDirection:"column",alignItems:"stretch",padding:"8px 12px",gap:6}}>
        {/* Row 1: back + title */}
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <button className="btn-icon" onClick={back} title="Torna alla lista" style={{flexShrink:0}}>←</button>
          <div style={{minWidth:0,flex:1,overflow:"hidden"}}>
            <div className="logo" style={{fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{viaggio.nome}</div>
            <div style={{fontSize:10,color:"var(--text2)"}}>
              {fmtDate(viaggio.startDate)} → {fmtDate(viaggio.endDate)} · {data.length}g
              &nbsp;·&nbsp;<span style={{color:"var(--primary)",fontWeight:600}}>€{fmt2(n(viaggio.budget))}</span>
            </div>
          </div>
        </div>
        {/* Row 2: tabs + actions */}
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"nowrap",overflowX:"auto",paddingBottom:2}}>
          <button className={`btn-tab ${tab==="preventivo"?"active":""}`} onClick={()=>setTab("preventivo")} style={{flexShrink:0,padding:"5px 10px",fontSize:12}}>Preventivo</button>
          <button className={`btn-tab ${tab==="consuntivo"?"active":""}`} onClick={()=>setTab("consuntivo")} style={{flexShrink:0,padding:"5px 10px",fontSize:12}}>Consuntivo</button>
          <div style={{marginLeft:"auto",display:"flex",gap:5,flexShrink:0}}>
            <button className="btn-icon no-print" onClick={()=>setTappa(true)} title="Aggiungi tappa" style={{padding:"5px 8px",fontSize:12}}>＋ Tappa</button>
            <button className="btn-icon no-print" onClick={()=>exportCSV(viaggio,tab)} title="Esporta CSV" style={{padding:"5px 8px",fontSize:11}}>CSV</button>
            <button className="btn-icon no-print" onClick={()=>window.print()} title="Stampa" style={{padding:"5px 8px"}}>🖨</button>
            {onShare && <button className="btn-icon no-print" onClick={onShare} title="Condividi" style={{padding:"5px 8px"}}>👥</button>}
            <button className="btn-icon no-print" onClick={()=>setEdit(true)} title="Modifica" style={{padding:"5px 8px"}}>✏️</button>
          </div>
        </div>
      </div>

      <div className="container">
        {/* Tappe budget chain */}
        {tappe.length>0 && (
          <TappaChain
            tappe={tappe} data={data} tab={tab}
            budget={n(viaggio.budget)}
            onDelete={t=>setDelTappa(t)}
            onUpdateBudget={updateTappaBudget}
            onEdit={t=>setEditingTappa(t)}
          />
        )}

        {/* Stats toggle */}
        <div style={{display:"flex",gap:12,marginBottom:4}}>
          <button className="collapse-btn" onClick={()=>setStats(p=>!p)}>{showStats?"▾":"▸"} Statistiche</button>
          <button className="collapse-btn" onClick={()=>setChart(p=>!p)}>{showChart?"▾":"▸"} Grafico budget</button>
        </div>

        {showStats && <StatsPanel data={data} budget={viaggio.budget}/>}
        {showChart && <BudgetChart days={data} budget={viaggio.budget}/>}

        {/* Calcolatore carburante */}
        {n(viaggio.consumoMedio)>0 && (() => {
          const kmTot    = data.reduce((a,d)=>a+n(d.km),0);
          const litri    = kmTot * n(viaggio.consumoMedio) / 100;
          const costoEst = litri * n(viaggio.prezzoCarburante);
          const gasolio  = data.reduce((a,d)=>a+n(d.gasolio)+n(d.benzina),0);
          return (
            <div className="card-sm" style={{marginBottom:12,display:"flex",flexWrap:"wrap",gap:12,alignItems:"center"}}>
              <span style={{fontSize:12,color:"var(--text2)"}}>⛽ {viaggio.veicolo||"Veicolo"} · {n(viaggio.consumoMedio)} l/100km</span>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:12}}><span style={{color:"var(--text3)"}}>KM: </span><strong>{kmTot}</strong></span>
                <span style={{fontSize:12}}><span style={{color:"var(--text3)"}}>Litri stimati: </span><strong style={{color:"var(--accent)"}}>{litri.toFixed(1)}</strong></span>
                {n(viaggio.prezzoCarburante)>0 && <span style={{fontSize:12}}><span style={{color:"var(--text3)"}}>Costo stimato: </span><strong style={{color:"var(--accent)"}}>€{fmt2(costoEst)}</strong></span>}
                {gasolio>0 && <span style={{fontSize:12}}><span style={{color:"var(--text3)"}}>Inserito: </span><strong style={{color:"var(--primary)"}}>€{fmt2(gasolio)}</strong></span>}
              </div>
            </div>
          );
        })()}

        {/* View toggle + section header */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginTop:16,marginBottom:8,flexWrap:"wrap"}}>
          <div className="section-title" style={{margin:0,flex:1,minWidth:120}}>
            {viewMode==="panoramica"?"Panoramica":viewMode==="delta"?"Preventivo vs Consuntivo":"Tabella dettaglio"}
            {viewMode!=="delta" && <span style={{color:"var(--text3)",fontWeight:400}}> — {tab}</span>}
          </div>
          <div className="view-toggle no-print">
            <button className={viewMode==="panoramica"?"active":""} onClick={()=>setViewMode("panoramica")}>📅 Panoramica</button>
            <button className={viewMode==="tabella"?"active":""} onClick={()=>setViewMode("tabella")}>📊 Tabella</button>
            <button className={viewMode==="delta"?"active":""} onClick={()=>setViewMode("delta")}>Δ Delta</button>
          </div>
          {viewMode==="tabella" && (
            <button className="btn btn-sm no-print" onClick={()=>setFsGrid(true)}
              style={{display:"flex",alignItems:"center",gap:5,color:"var(--primary)",borderColor:"var(--primary-dim)"}}>
              ⛶ Schermo intero
            </button>
          )}
        </div>

        {viewMode==="panoramica" && (
          <PanoramicaView data={data} budget={viaggio.budget} onOpenDetail={i=>setDayModal(i)}/>
        )}
        {viewMode==="tabella" && (
          <>
            <p style={{fontSize:11,color:"var(--text3)",margin:"0 0 6px"}}>* Pag. manuale: lascia vuoto per calcolo automatico al checkout della tappa.</p>
            <GridEditor data={data} budget={viaggio.budget} onChange={updateCell} onDayClick={i=>setDayModal(i)}/>
          </>
        )}
        {viewMode==="delta" && (
          <DeltaView viaggio={viaggio}/>
        )}
      </div>

      {showTappa && <TappaModal viaggio={viaggio} onClose={()=>setTappa(false)} onSave={addTappa}/>}
      {editingTappa && <TappaModal viaggio={viaggio} initial={editingTappa} onClose={()=>setEditingTappa(null)} onSave={form=>editTappaFn(editingTappa,form)}/>}
      {showEdit  && <TripFormModal initial={viaggio} title="Modifica viaggio" onClose={()=>setEdit(false)} onSave={editTrip} gruppiEsistenti={gruppiEsistenti}/>}
      {delTappa  && <Confirm msg={`Elimina la tappa "${delTappa.luogo}" e tutti i suoi dati struttura?`} onOk={()=>removeTappa(delTappa)} onClose={()=>setDelTappa(null)}/>}
      {fsGrid && <GridEditor data={data} budget={viaggio.budget} onChange={updateCell} fullscreen={true} onToggleFS={()=>setFsGrid(false)} onDayClick={i=>setDayModal(i)}/>}
      {dayModal!==null && <DayModal dayIndex={dayModal} data={data} budget={viaggio.budget} onClose={()=>setDayModal(null)} onChange={updateCell} consumoMedio={n(viaggio.consumoMedio)} prezzoCarburante={n(viaggio.prezzoCarburante)}/>}
    </div>
  );
}

// ── Firebase error → Italian ─────────────────────────────────────────────
const FB_ERR = {
  'auth/user-not-found':'Email non trovata',
  'auth/wrong-password':'Password errata',
  'auth/email-already-in-use':'Email già registrata',
  'auth/weak-password':'Password troppo corta (min. 6 caratteri)',
  'auth/invalid-email':'Email non valida',
  'auth/invalid-credential':'Email o password errati',
  'auth/too-many-requests':'Troppi tentativi, riprova tra qualche minuto',
  'auth/popup-closed-by-user':'Accesso Google annullato',
};
function fbErr(e){ const code=e?.code||''; return FB_ERR[code]||e?.message||'Errore sconosciuto'; }

// ── Login Screen ─────────────────────────────────────────────────────────
function LoginScreen(){
  const [mode,setMode]   = React.useState("login");
  const [email,setEmail] = React.useState("");
  const [pass,setPass]   = React.useState("");
  const [err,setErr]     = React.useState("");
  const [load,setLoad]   = React.useState(false);

  const handle = async () => {
    if(!email.trim()||!pass.trim()){ setErr("Compila email e password"); return; }
    setErr(""); setLoad(true);
    try {
      if(mode==="login"){
        await firebase.auth().signInWithEmailAndPassword(email.trim(), pass);
      } else {
        await firebase.auth().createUserWithEmailAndPassword(email.trim(), pass);
      }
    } catch(e){ setErr(fbErr(e)); }
    setLoad(false);
  };

  const googleLogin = async () => {
    setErr(""); setLoad(true);
    try {
      await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
    } catch(e){ setErr(fbErr(e)); }
    setLoad(false);
  };

  return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-logo">🚐</div>
        <h1 className="login-title">Viaggi Camper</h1>
        <p className="login-sub">v6.0 — sincronizzato nel cloud</p>

        <button className="btn-google" onClick={googleLogin} disabled={load}>
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>

// ── Share Modal ───────────────────────────────────────────────────────────
function ShareModal({viaggio, user, onClose}){
  const [email,setEmail] = React.useState("");
  const [status,setStatus] = React.useState(""); // ""|"loading"|"ok"|"err"
  const [msg,setMsg]     = React.useState("");
  const memberEmails     = viaggio.memberEmails || [user.email];
  const members          = viaggio.members || [user.uid];
  const isOwner          = viaggio.ownerId === user.uid;

  const addUser = async () => {
    const em = email.trim().toLowerCase();
    if(!em){ setErr("Inserisci un'email"); return; }
    if(memberEmails.includes(em)){ setStatus("err"); setMsg("Utente già presente"); return; }
    setStatus("loading"); setMsg("");
    try {
      const snap = await firebase.firestore().collection('users')
        .where('email','==',em).limit(1).get();
      if(snap.empty){ setStatus("err"); setMsg("Utente non trovato — deve prima registrarsi nell'app"); return; }
      const uid = snap.docs[0].id;
      await firebase.firestore().collection('viaggi').doc(viaggio.id).update({
        members:      firebase.firestore.FieldValue.arrayUnion(uid),
        memberEmails: firebase.firestore.FieldValue.arrayUnion(em),
      });
      setStatus("ok"); setMsg(`✓ ${em} aggiunto!`); setEmail("");
    } catch(e){ setStatus("err"); setMsg(fbErr(e)); }
  };

  const removeUser = async (uid, em) => {
    await firebase.firestore().collection('viaggi').doc(viaggio.id).update({
      members:      firebase.firestore.FieldValue.arrayRemove(uid),
      memberEmails: firebase.firestore.FieldValue.arrayRemove(em),
    });
  };

  return (
    <Modal title={`👥 Condividi — ${viaggio.nome}`} onClose={onClose} width="460px">
      <div className="section-title" style={{marginBottom:8}}>Partecipanti</div>
      {memberEmails.map((em,i)=>(
        <div key={em} className="share-member">
          <span style={{flex:1,fontSize:13,color:"var(--text)"}}>{em}</span>
          {em===user.email && <span className="badge">tu</span>}
          {i===0 && <span className="badge accent">owner</span>}
          {isOwner && em!==user.email && (
            <button className="btn-icon btn-sm" style={{color:"var(--red)"}}
              onClick={()=>removeUser(members[i],em)}>✕</button>
          )}
        </div>
      ))}

      <div className="section-title" style={{marginTop:20,marginBottom:8}}>Aggiungi persona</div>
      <p style={{fontSize:12,color:"var(--text2)",marginBottom:10}}>
        L'altra persona deve prima registrarsi nell'app con la stessa email.
      </p>
      <div style={{display:"flex",gap:8}}>
        <input type="email" className="field-input" value={email}
          onChange={e=>setEmail(e.target.value)} placeholder="email@esempio.com"
          onKeyDown={e=>e.key==="Enter"&&addUser()} style={{flex:1}}/>
        <button className="btn-primary" onClick={addUser} disabled={status==="loading"}>
          {status==="loading"?"...":"+ Aggiungi"}
        </button>
      </div>
      {msg && <p style={{fontSize:12,marginTop:8,
        color:status==="ok"?"var(--green)":"var(--red)"}}>{msg}</p>}
      <div className="btn-row"><button className="btn" onClick={onClose}>Chiudi</button></div>
    </Modal>
  );
}

// ── Viaggi Section ───────────────────────────────────────────────────────
function ViaggiaSection({viaggi, onBack, onOpen, signOut, user, showNew, setNew, delId, setDel, showShare, setShare, addTrip, removeTrip, updateTrip}){
  useBack(onBack);
  const [statusFil, setStatusFil] = React.useState('all');
  const [expandedY,  setExpandedY]  = React.useState({});
  const [expandedG,  setExpandedG]  = React.useState({});
  const [copyData,   setCopyData]   = React.useState(null);

  const toggleStatus = (v) => {
    const newStatus = (v.status||'ipotesi')==='ipotesi' ? 'confermato' : 'ipotesi';
    updateTrip({...v, status:newStatus});
  };

  const filtered = viaggi.filter(v =>
    statusFil==='all' || (v.status||'ipotesi')===statusFil
  );

  // Raggruppa per anno → gruppo
  const byYear = {};
  filtered.forEach(v => {
    const year = (v.startDate||'').slice(0,4)||'?';
    const grp  = (v.gruppo||'').trim()||'—';
    if(!byYear[year])      byYear[year]={};
    if(!byYear[year][grp]) byYear[year][grp]=[];
    byYear[year][grp].push(v);
  });
  const years = Object.keys(byYear).sort((a,b)=>b-a);
  const isExpY = y   => expandedY[y]!==false;           // anni: default espanso
  const isExpG = key => expandedG[key]===true;           // gruppi: default collasso
  const togY   = y   => setExpandedY(p=>({...p,[y]:!isExpY(y)}));
  const togG   = key => setExpandedG(p=>({...p,[key]:!isExpG(key)}));

  const totIpotesi  = viaggi.filter(v=>(v.status||'ipotesi')==='ipotesi').length;
  const totConf     = viaggi.filter(v=>(v.status||'ipotesi')==='confermato').length;
  const gruppiEsistenti = [...new Set(viaggi.map(v=>(v.gruppo||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'it'));

  return(
    <div>
      {/* Header */}
      <div className="app-header">
        <div style={{display:'flex',alignItems:'center',gap:8,width:'100%'}}>
          <button className="btn-icon" onClick={onBack} style={{flexShrink:0}}>←</button>
          <div className="logo" style={{fontSize:15,flex:1}}>✈️ <strong>I miei viaggi</strong></div>
          <button className="btn-primary" style={{padding:'6px 12px',fontSize:12,flexShrink:0}} onClick={()=>setNew(true)}>＋ Nuovo</button>
          <button className="btn-icon" onClick={signOut} title="Esci" style={{fontSize:16,flexShrink:0}}>🚪</button>
        </div>
      </div>

      {/* Filtri */}
      <div style={{display:'flex',gap:5,padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--card)',overflowX:'auto'}}>
        {[['all',`Tutti (${viaggi.length})`],['ipotesi',`💭 Ipotesi (${totIpotesi})`],['confermato',`✅ Confermati (${totConf})`]].map(([f,l])=>(
          <button key={f} className={`btn-tab${statusFil===f?' active':''}`}
            style={{padding:'5px 10px',fontSize:11,flexShrink:0}} onClick={()=>setStatusFil(f)}>{l}</button>
        ))}
      </div>

      <div className="container">
        {filtered.length===0&&(
          <div className="empty" style={{paddingTop:50}}>
            <div className="empty-icon">🚐</div>
            <p style={{color:'var(--text2)'}}>Nessun viaggio trovato</p>
            <button className="btn-primary" style={{marginTop:16}} onClick={()=>setNew(true)}>＋ Nuovo viaggio</button>
          </div>
        )}

        {years.map(year=>{
          const expY = isExpY(year);
          const totInYear = Object.values(byYear[year]).flat().length;
          const confInYear = Object.values(byYear[year]).flat().filter(v=>(v.status||'ipotesi')==='confermato').length;
          return(
            <div key={year} style={{marginBottom:20}}>
              {/* Anno header */}
              <div onClick={()=>togY(year)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',cursor:'pointer',borderBottom:'2px solid var(--primary-dim)',marginBottom:expY?12:0}}>
                <span style={{fontSize:22,fontFamily:"'Syne',sans-serif",fontWeight:800,color:'var(--primary)'}}>{year}</span>
                <span style={{fontSize:11,color:'var(--text3)',flex:1}}>
                  {totInYear} {totInYear===1?'viaggio':'viaggi'} · {confInYear} confermati
                </span>
                <span style={{color:'var(--text3)',fontSize:13}}>{expY?'▲':'▼'}</span>
              </div>

              {expY && Object.entries(byYear[year]).sort(([a],[b])=>a.localeCompare(b,'it')).map(([grp,trips])=>{
                const gkey = year+'_'+grp;
                const expG = isExpG(gkey);
                const confInGrp = trips.filter(v=>(v.status||'ipotesi')==='confermato').length;
                const ipotInGrp = trips.filter(v=>(v.status||'ipotesi')==='ipotesi').length;
                return(
                  <div key={grp} style={{marginBottom:10,background:'var(--card)',borderRadius:14,border:'1px solid var(--border2)',overflow:'hidden'}}>
                    {/* Gruppo header — collassabile */}
                    <div onClick={()=>togG(gkey)}
                      style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',cursor:'pointer',
                        background:expG?'var(--card2)':'var(--card)'}}>
                      <span style={{fontSize:18,flexShrink:0}}>📁</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{grp}</div>
                        <div style={{fontSize:11,color:'var(--text3)',marginTop:2,display:'flex',gap:8}}>
                          <span>{trips.length} {trips.length===1?'viaggio':'viaggi'}</span>
                          {confInGrp>0&&<span style={{color:'var(--green)'}}>✅ {confInGrp} confermati</span>}
                          {ipotInGrp>0&&<span style={{color:'var(--primary)'}}>💭 {ipotInGrp} ipotesi</span>}
                        </div>
                      </div>
                      <span style={{color:'var(--text3)',fontSize:13,flexShrink:0}}>{expG?'▲':'▼'}</span>
                    </div>

                    {/* Trip rows dentro il gruppo */}
                    {expG && (
                      <div style={{borderTop:'1px solid var(--border)'}}>
                        {trips.sort((a,b)=>a.startDate>b.startDate?1:-1).map((v,idx)=>{
                          const isConf = (v.status||'ipotesi')==='confermato';
                          const giorni = diffInclusive(v.startDate,v.endDate);
                          const stats  = getStats(v.consuntivo||[], v.budget);
                          const hasData= (v.consuntivo||[]).some(d=>calcCosto(d)>0);
                          return(
                            <div key={v.id} style={{padding:'10px 14px',cursor:'pointer',
                              borderBottom:idx<trips.length-1?'1px solid var(--border)':'none',
                              background:'var(--bg2)'}}
                              onClick={()=>onOpen(v.id)}>
                              <div style={{display:'flex',alignItems:'center',gap:8}}>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                                    <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{v.nome}</span>
                                    <span onClick={e=>{e.stopPropagation();toggleStatus(v);}}
                                      title="Tocca per cambiare stato"
                                      style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:10,cursor:'pointer',
                                        background:isConf?'rgba(82,214,138,.15)':'rgba(79,216,180,.08)',
                                        color:isConf?'var(--green)':'var(--primary)',
                                        border:'1px solid '+(isConf?'var(--green)':'var(--primary)')}}>
                                      {isConf?'✅ Confermato':'💭 Ipotesi'}
                                    </span>
                                  </div>
                                  <div style={{fontSize:11,color:'var(--text3)'}}>
                                    {fmtDate(v.startDate)} → {fmtDate(v.endDate)} · {giorni}g · €{fmt2(n(v.budget))}
                                    {hasData&&<span style={{color:stats.residuo>=0?'var(--green)':'var(--red)',marginLeft:6}}>
                                      res. €{fmt2(stats.residuo)}
                                    </span>}
                                  </div>
                                </div>
                                <div style={{display:'flex',gap:3,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                                  <button className="btn-icon btn-sm" title="Copia"
                                    onClick={()=>setCopyData(v)} style={{fontSize:13,padding:'4px 5px'}}>📋</button>
                                  <button className="btn-icon btn-sm" style={{color:'var(--primary)',padding:'4px 5px'}}
                                    onClick={()=>setShare(v)} title="Condividi">👥</button>
                                  {v.ownerId===user.uid&&
                                    <button className="btn-icon btn-sm" style={{color:'var(--red)',padding:'4px 5px'}}
                                      onClick={()=>setDel(v.id)}>🗑</button>}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {showNew&&<TripFormModal title="Nuovo viaggio" gruppiEsistenti={gruppiEsistenti} onClose={()=>setNew(false)} onSave={f=>{addTrip(f);setNew(false);}}/>}
      {copyData&&<TripFormModal title="📋 Copia viaggio" isCopy gruppiEsistenti={gruppiEsistenti}
        initial={{...copyData, nome:copyData.nome+' (copia)', preventivo:undefined, consuntivo:undefined, tappe:[]}}
        onClose={()=>setCopyData(null)} onSave={f=>{addTrip(f);setCopyData(null);}}/>}
      {delId&&<Confirm msg={`Eliminare "${(viaggi.find(v=>v.id===delId)||{}).nome}"? Tutti i dati andranno persi.`}
        onOk={()=>{removeTrip(delId);setDel(null);}} onClose={()=>setDel(null)}/>}
      {showShare&&<ShareModal viaggio={showShare} user={user} onClose={()=>setShare(null)}/>}
    </div>
  );
}

// ── Dispensa View ─────────────────────────────────────────────────────────
function DispensaView({dispensa, dispensaId, updateDispensa, user, onBack}){
  useBack(onBack);
  const cats        = dispensa.categories     || DISP_CATS_DEFAULT;
  const prods       = dispensa.products       || [];
  const spesa       = dispensa.spesaManuale   || [];
  const persone     = dispensa.persone        || DISP_PERS_DEFAULT;
  const valigie     = dispensa.valigie        || [];
  const valProd     = dispensa.valigieProdotti|| [];

  const [tab,setTab]           = React.useState('inventario');
  const [selCat,setSelCat]     = React.useState('all');
  const [invFil,setInvFil]     = React.useState('all');
  const [portareOk,setPortareOk] = React.useState({});
  const [persId,setPersId]     = React.useState(null);
  const [expandV,setExpandV]   = React.useState(null);
  const [manInp,setManInp]     = React.useState('');
  const [showShare,setShowShare]= React.useState(false);
  // modals: null | {type, data}
  const [modal,setModal]       = React.useState(null);

  const upd = ch => updateDispensa({...dispensa,...ch});
  const activePers = persId || persone.filter(p=>!p.disabled)[0]?.id;

  // ── CRUD helpers ──────────────────────────────────────────────────────
  const saveProd = p => { upd({products: p.id ? prods.map(x=>x.id===p.id?p:x) : [...prods,{...p,id:Date.now()}]}); setModal(null); };
  const delProd  = id => { upd({products:prods.filter(p=>p.id!==id), valigieProdotti:valProd.filter(vp=>vp.productId!==id)}); setModal(null); };
  const setStatus= (id,s) => upd({products:prods.map(p=>p.id===id?{...p,status:s}:p)});
  const toggleBuy= id => upd({products:prods.map(p=>p.id===id?{...p,toBuy:!p.toBuy}:p)});

  const saveCat = c => { upd({categories: c.id&&cats.find(x=>x.id===c.id) ? cats.map(x=>x.id===c.id?c:x) : [...cats,{...c,id:'cat_'+Date.now()}]}); setModal(null); };
  const delCat  = id => { if(prods.some(p=>p.cat===id)){alert('Sposta prima i prodotti da questa categoria.');return;} if(!confirm('Eliminare la categoria?'))return; upd({categories:cats.filter(c=>c.id!==id)}); setModal(null); };

  const saveValigia = v => { upd({valigie: v.id&&valigie.find(x=>x.id===v.id) ? valigie.map(x=>x.id===v.id?v:x) : [...valigie,{...v,id:'v_'+Date.now(),personaId:activePers}]}); setModal(null); };
  const delValigia  = id => { if(!confirm('Eliminare valigia e contenuto?'))return; upd({valigie:valigie.filter(v=>v.id!==id), valigieProdotti:valProd.filter(vp=>vp.valigiaId!==id)}); setModal(null); };

  const saveVP = vp => { upd({valigieProdotti: vp.id&&valProd.find(x=>x.id===vp.id) ? valProd.map(x=>x.id===vp.id?vp:x) : [...valProd,{...vp,id:'vp_'+Date.now()}]}); setModal(null); };
  const delVP  = id => { upd({valigieProdotti:valProd.filter(i=>i.id!==id)}); setModal(null); };
  const toggleVPStatus = (id,s) => upd({valigieProdotti:valProd.map(i=>i.id===id?{...i,status:s}:i)});

  const savePersona = p => { upd({persone: p.id&&persone.find(x=>x.id===p.id) ? persone.map(x=>x.id===p.id?p:x) : [...persone,{...p,id:'p_'+Date.now()}]}); setModal(null); };
  const delPersona  = id => { if(!confirm('Eliminare persona e tutte le sue valigie?'))return; const vids=valigie.filter(v=>v.personaId===id).map(v=>v.id); upd({persone:persone.filter(p=>p.id!==id),valigie:valigie.filter(v=>v.personaId!==id),valigieProdotti:valProd.filter(vp=>!vids.includes(vp.valigiaId))}); setModal(null); };

  const addManual   = () => { if(!manInp.trim())return; upd({spesaManuale:[...spesa,{id:Date.now(),name:manInp.trim(),done:false}]}); setManInp(''); };
  const toggleManual= id => upd({spesaManuale:spesa.map(s=>s.id===id?{...s,done:!s.done}:s)});
  const removeManual= id => upd({spesaManuale:spesa.filter(s=>s.id!==id)});

  // Calcolo diretto senza useMemo per evitare problemi di dipendenze
  const activeProds = prods.filter(p=>!p.disabled);
  let filteredProds = selCat==='all' ? activeProds : activeProds.filter(p=>p.cat===selCat);
  if(invFil==='low')       filteredProds = filteredProds.filter(p=>p.status==='low');

          <button className="btn-primary" style={{padding:'6px 12px',fontSize:12}}

  const TabImpostazioni = () => (

          const d=JSON.stringify({categories:cats,products:prods,spesaManuale:spesa,persone,valigie,valigieProdotti:valProd},null,2);
          const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([d],{type:'application/json'})); a.download='camperhub-dispensa.json'; a.click();
        }}>📤 Esporta dati JSON</button>
        <button className="btn" style={{textAlign:'left',padding:'12px 16px'}} onClick={()=>{

            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=ev=>{
              try{
                const d=JSON.parse(ev.target.result);
                if(!confirm('Importare i dati? Verranno sovrascritti i dati attuali.')) return;
                upd({
                  categories: d.categories || cats,
                  products:   d.products   || prods,
                  spesaManuale: d.spesaManuale || spesa,
                  persone:    d.persone    || persone,
                  valigie:    d.valigie    || valigie,
                  valigieProdotti: d.valigieProdotti || valProd,
                });
                alert('Importazione completata!');

            };
            reader.readAsText(file);
          };
          inp.click();

            <span style={{fontSize:18}}>{c.icon}</span>
            <span style={{flex:1,fontSize:13}}>{c.name}</span>
            <button className="btn-icon btn-sm" onClick={()=>setModal({type:'cat',data:{...c},prev:'catManage'})}>✏️</button>
          </div>
        ))}
        <div className="btn-row" style={{marginTop:12}}>
          <button className="btn-primary" onClick={()=>setModal({type:'cat',data:{id:null,name:'',icon:'📦',color:'#6B7280'},prev:'catManage'})}>+ Nuova</button>
          <button className="btn" onClick={()=>setModal(null)}>Chiudi</button>
        </div>
      </Modal>
    );

    if(type==='cat'){
      const c=data;
      return(
        <Modal title={c.id?'Modifica Categoria':'Nuova Categoria'} onClose={()=>setModal(null)} width="460px">
          <div className="form-grid" style={{gap:10}}>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Nome *</label>
              <input className="field-input" value={c.name} onChange={e=>setData('name')(e.target.value)} placeholder="Nome categoria"/>
            </div>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Icona</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,maxHeight:130,overflowY:'auto'}}>
                {DISP_EMOJIS.map(em=>(
                  <button key={em} onClick={()=>setData('icon')(em)}
                    style={{fontSize:20,padding:'5px',borderRadius:8,border:'2px solid '+(c.icon===em?'var(--primary)':'var(--border)'),background:c.icon===em?'var(--primary-faint)':'var(--card)',cursor:'pointer'}}>
                    {em}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div className="btn-row">
            <button className="btn-primary" onClick={()=>{if(!c.name.trim()){alert('Inserisci il nome');return;}saveCat(c);}}>✓ Salva</button>
            {c.id&&<button className="btn" style={{color:'var(--red)'}} onClick={()=>delCat(c.id)}>🗑️</button>}
            <button className="btn" onClick={()=>modal.prev?setModal({type:modal.prev}):setModal(null)}>← Indietro</button>
          </div>
        </Modal>
      );
    }

    if(type==='persona'){
      const p=data;
      return(
        <Modal title={p.id?'Modifica Persona':'Nuova Persona'} onClose={()=>setModal(null)} width="400px">
          <div className="form-grid" style={{gap:10}}>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Nome *</label>
              <input className="field-input" value={p.nome} onChange={e=>setData('nome')(e.target.value)} placeholder="Nome"/>
            </div>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Colore</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {DISP_COLORS.map(col=>(
                  <div key={col} onClick={()=>setData('colore')(col)}
                    style={{width:28,height:28,borderRadius:14,background:col,cursor:'pointer',
                      border:'3px solid '+(p.colore===col?'#fff':'transparent'),
                      boxShadow:p.colore===col?'0 0 0 2px '+col:'none'}}/>
                ))}
              </div>
            </div>
            {p.id&&<div className="field" style={{gridColumn:'1/-1',display:'flex',alignItems:'center',gap:12}}>
              <label style={{fontSize:13,flex:1}}>Persona attiva</label>
              <button className={`btn${!p.disabled?' btn-primary':''}`} style={{padding:'5px 12px',fontSize:12}} onClick={()=>setData('disabled')(!p.disabled)}>{!p.disabled?'Attiva':'Disattivata'}</button>
            </div>}
          </div>
          <div className="btn-row">
            <button className="btn-primary" onClick={()=>{if(!p.nome.trim()){alert('Inserisci il nome');return;}savePersona(p);}}>✓ Salva</button>
            {p.id&&<button className="btn" style={{color:'var(--red)'}} onClick={()=>delPersona(p.id)}>🗑️</button>}
            <button className="btn" onClick={()=>setModal(null)}>Annulla</button>
          </div>
        </Modal>
      );
    }

    if(type==='valigia'){
      const v=data;
      return(
        <Modal title={v.id?'Modifica Valigia':'Nuova Valigia'} onClose={()=>setModal(null)} width="400px">
          <div className="form-grid" style={{gap:10}}>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Nome *</label>
              <input className="field-input" value={v.nome} onChange={e=>setData('nome')(e.target.value)} placeholder="es. Valigia grande, Zaino..."/>
            </div>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Icona</label>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {DISP_BAG_ICONS.map(ic=>(
                  <button key={ic} onClick={()=>setData('icon')(ic)}
                    style={{fontSize:22,padding:'6px',borderRadius:8,border:'2px solid '+(v.icon===ic?'var(--primary)':'var(--border)'),background:v.icon===ic?'var(--primary-faint)':'var(--card)',cursor:'pointer'}}>
                    {ic}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div className="btn-row">
            <button className="btn-primary" onClick={()=>{if(!v.nome.trim()){alert('Inserisci il nome');return;}saveValigia(v);}}>✓ Salva</button>
            {v.id&&<button className="btn" style={{color:'var(--red)'}} onClick={()=>delValigia(v.id)}>🗑️</button>}
            <button className="btn" onClick={()=>setModal(null)}>Annulla</button>
          </div>
        </Modal>
      );
    }

    if(type==='vpItem'){
      const item=data;
      return(
        <Modal title={item.id?'Modifica Articolo':'Nuovo Articolo'} onClose={()=>setModal(null)} width="400px">
          <div className="form-grid" style={{gap:10}}>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Nome *</label>
              <input className="field-input" value={item.name} onChange={e=>setData('name')(e.target.value)} placeholder="Nome articolo"/>
            </div>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Note</label>
              <input className="field-input" value={item.note||''} onChange={e=>setData('note')(e.target.value)} placeholder="Note opzionali"/>
            </div>
            <div className="field" style={{gridColumn:'1/-1'}}>
              <label className="field-label">Stato</label>
              <div style={{display:'flex',gap:8}}>
                {['ok','low','out'].map(s=>(
                  <button key={s} className={`ds-status ${dsStatusClass(s)}`}
                    style={{flex:1,opacity:item.status===s?1:0.3}} onClick={()=>setData('status')(s)}>
                    {dsStatusLabel(s)}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div className="btn-row">
            <button className="btn-primary" onClick={()=>{if(!item.name.trim()){alert('Inserisci il nome');return;}saveVP(item);}}>✓ Salva</button>
            {item.id&&<button className="btn" style={{color:'var(--red)'}} onClick={()=>delVP(item.id)}>🗑️</button>}
            <button className="btn" onClick={()=>setModal(null)}>Annulla</button>
          </div>
        </Modal>
      );
    }
    return null;
  };

  const TABS=[['inventario','📦','Inventario'],['spesa','🛒','Spesa'],['portare','🏠','Portare'],['valigie','🧳','Valigie'],['impostazioni','⚙️','Impost.']];
  return(
    <div>
      {/* Header */}
      <div className="app-header" style={{height:'auto',flexDirection:'column',alignItems:'stretch',padding:'8px 12px 0',gap:0}}>
        {/* Riga 1: titolo e condividi */}
        <div style={{display:'flex',alignItems:'center',gap:8,paddingBottom:8}}>
          <button className="btn-icon" onClick={onBack} style={{flexShrink:0}}>←</button>
          <div className="logo" style={{fontSize:15,flex:1}}>🏕️ <strong>Dispensa Camper</strong></div>
          <button className="btn-icon" onClick={()=>setShowShare(true)} title="Condividi" style={{flexShrink:0}}>👥</button>
        </div>
        {/* Riga 2: tab con icona sopra e testo sotto */}
        <div style={{display:'flex',borderTop:'1px solid var(--border)'}}>
          {TABS.map(([t,ic,label])=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                gap:2,padding:'8px 2px 6px',border:'none',borderBottom:`2.5px solid ${tab===t?'var(--primary)':'transparent'}`,
                background:'transparent',cursor:'pointer',color:tab===t?'var(--primary)':'var(--text3)',transition:'color .15s'}}>
              <span style={{fontSize:20,lineHeight:1}}>{ic}</span>
              <span style={{fontSize:9,fontWeight:600,letterSpacing:.3}}>{label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div className="container">
        {tab==='inventario' && <TabInventario/>}
        {tab==='spesa'      && <TabSpesa/>}
        {tab==='portare'    && <TabPortare/>}
        {tab==='valigie'    && <TabValigie/>}
        {tab==='impostazioni' && <TabImpostazioni/>}
      </div>

      {/* Modals */}
      {renderModal()}
      {showShare && <DispensaShareModal dispensa={dispensa} dispensaId={dispensaId} user={user} onClose={()=>setShowShare(false)}/>}
    </div>
  );
}

// ── Home View / App ────────────────────────────────────────────────────────
function App(){
  const [user,setUser]         = React.useState(undefined);
  const [viaggi,setViaggi]     = React.useState([]);
  const [dispensa,setDispensa] = React.useState(null);
  const [dispId,setDispId]     = React.useState(null);
  const [activeId,setActiveId] = React.useState(null);
  const [showDisp,setShowDisp]   = React.useState(false);
  const [showViaggi,setShowViaggi] = React.useState(false);
  const [showNew,setNew]       = React.useState(false);
  const [delId,setDel]         = React.useState(null);
  const [showShare,setShare]   = React.useState(null);

  React.useEffect(()=>{
    return firebase.auth().onAuthStateChanged(u=>setUser(u||null));
  },[]);

  React.useEffect(()=>{
    if(user===undefined) return;
    if(!user){ setViaggi([]); setDispensa(null); setDispId(null); return; }
    // Salva profilo utente
    firebase.firestore().collection('users').doc(user.uid)
      .set({email:user.email.toLowerCase(), displayName:user.displayName||user.email},{merge:true});
    // Listener viaggi
    const unsubV = firebase.firestore().collection('viaggi')
      .where('members','array-contains',user.uid)
      .onSnapshot(snap=>{
        const list = snap.docs.map(d=>({...d.data(),id:d.id}));
        list.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        setViaggi(list);
      }, err=>console.error('viaggi err:',err));
    // Listener dispensa
    const unsubD = firebase.firestore().collection('dispensa')
      .where('members','array-contains',user.uid)
      .onSnapshot(async snap=>{
        if(snap.empty){
          try {
            const doc = mkDispensaDoc(user.uid, user.email.toLowerCase());
            const ref = await firebase.firestore().collection('dispensa').add({
              ...doc, createdAt:firebase.firestore.FieldValue.serverTimestamp()
            });
            setDispId(ref.id); setDispensa(doc);
          } catch(e){ console.error('creaDispensa err:',e); }
        } else {
          setDispId(snap.docs[0].id);
          setDispensa(snap.docs[0].data());
        }
      }, err=>console.error('dispensa err:',err));
    return ()=>{ unsubV(); unsubD(); };
  },[user]);

  const updateTrip = t => {
    const {id,...data}=t;
    firebase.firestore().collection('viaggi').doc(id).update(data).catch(e=>console.error(e));
  };
  const addTrip = form => {
    const trip=createTrip(form); const {id:_,...data}=trip;
    firebase.firestore().collection('viaggi').add({
      ...data, ownerId:user.uid, members:[user.uid],
      memberEmails:[user.email.toLowerCase()],
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    }).catch(e=>console.error(e));
  };
  const removeTrip = id => firebase.firestore().collection('viaggi').doc(id).delete().catch(e=>console.error(e));
  const updateDispensa = data => {
    if(!dispId) return;
    const {id:_,createdAt:__,...rest}=data;
    firebase.firestore().collection('dispensa').doc(dispId).update(rest).catch(e=>console.error(e));
  };
  const signOut = () => firebase.auth().signOut();

  // Loading
  if(user===undefined) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14,background:'var(--bg)'}}>
      <div style={{fontSize:40}}>🚐</div>
      <div style={{color:'var(--text2)',fontSize:13}}>Caricamento...</div>
    </div>
  );

  if(!user) return <LoginScreen/>;

  // Dispensa view
  if(showDisp && dispensa) return(
    <DispensaView dispensa={dispensa} dispensaId={dispId} updateDispensa={updateDispensa} user={user} onBack={()=>setShowDisp(false)}/>
  );

  // Trip view
  if(activeId){
    const v=viaggi.find(x=>x.id===activeId);
    if(!v){ setActiveId(null); return null; }
    const gruppiEsistenti = [...new Set(viaggi.map(v=>(v.gruppo||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'it'));
    return <TripView viaggio={v} updateTrip={updateTrip} back={()=>setActiveId(null)} user={user} onShare={()=>setShare(v)} gruppiEsistenti={gruppiEsistenti}/>;
  }

  // Viaggi section
  if(showViaggi) return(
    <ViaggiaSection
      viaggi={viaggi} user={user} signOut={signOut}
      onBack={()=>setShowViaggi(false)}
      onOpen={id=>setActiveId(id)}
      showNew={showNew} setNew={setNew}
      delId={delId} setDel={setDel}
      showShare={showShare} setShare={setShare}
      addTrip={addTrip} removeTrip={removeTrip} updateTrip={updateTrip}
    />
  );

  // Home — due card
  const dispStats = dispensa ? {
    tot:(dispensa.products||[]).filter(p=>!p.disabled).length,
    low:(dispensa.products||[]).filter(p=>!p.disabled&&p.status==='low').length,
    out:(dispensa.products||[]).filter(p=>!p.disabled&&p.status==='out').length,
    buy:(dispensa.products||[]).filter(p=>!p.disabled&&p.toBuy).length,
  } : null;

  return(
    <div>
      <div className="app-header">
        <div className="logo">🚐 <strong>CamperHub</strong> <span>v8.2</span></div>
        <div className="header-actions">
          <button className="btn-icon" onClick={signOut} title="Esci" style={{fontSize:16}}>🚪</button>
        </div>
      </div>

      <div className="container">
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:20,display:'flex',alignItems:'center',gap:6}}>
          <span>👤</span><span>{user.email}</span>
        </div>

        {/* Card Viaggi */}
        <div className="ds-hub-card" onClick={()=>setShowViaggi(true)}
          style={{borderColor: viaggi.length>0 ? 'var(--primary-dim)' : 'var(--border2)'}}>
          <div style={{fontSize:36,flexShrink:0}}>🚐</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:700,color:'var(--primary)',fontFamily:"'Syne',sans-serif"}}>I miei viaggi</div>
            <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>
              {viaggi.length===0 ? 'Nessun viaggio — creane uno!' : `${viaggi.length} ${viaggi.length===1?'viaggio':'viaggi'} in archivio`}
            </div>
          </div>
          <span style={{color:'var(--text3)',fontSize:22}}>›</span>
        </div>

        {/* Card Dispensa */}
        <div className="ds-hub-card" onClick={()=>setShowDisp(true)}>
          <div style={{fontSize:36,flexShrink:0}}>🏕️</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:700,color:'var(--primary)',fontFamily:"'Syne',sans-serif"}}>Dispensa Camper</div>
            {dispStats
              ? <div style={{fontSize:12,color:'var(--text2)',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
                  <span>{dispStats.tot} prodotti</span>
                  {dispStats.low>0&&<span style={{color:'var(--accent)'}}>⚠️ {dispStats.low} scarsi</span>}
                  {dispStats.out>0&&<span style={{color:'var(--red)'}}>❌ {dispStats.out} mancanti</span>}
                  {dispStats.buy>0&&<span style={{color:'var(--primary)'}}>🛒 {dispStats.buy} da comprare</span>}
                </div>
              : <div style={{fontSize:12,color:'var(--text3)'}}>Caricamento...</div>
            }
          </div>
          <span style={{color:'var(--text3)',fontSize:22}}>›</span>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
